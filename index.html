<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a2f66">
<title>Guide de l'interne · Cardiologie Henri Mondor</title>
<style>
:root{
  --bleu:#0a2f66;        /* bleu Mondor profond */
  --bleu-clair:#1857a8;
  --bleu-vif:#2b6fd4;
  --rouge:#c8102e;       /* rouge AP-HP */
  --rouge-fonce:#9d0c24;
  --encre:#111826;
  --gris:#5b6675;
  --gris-clair:#8b95a3;
  --trait:#e3e7ee;
  --trait-fort:#cfd6e2;
  --papier:#ffffff;
  --fond:#f4f6fa;
  --fond-2:#eef2f8;
  --surligne:#fff7d6;
  --ombre:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.06);
  --ombre-forte:0 12px 40px rgba(10,47,102,.18);
  --r:14px;
  --rs:10px;
  --serif:'Iowan Old Style','Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--encre);background:var(--fond);line-height:1.55;font-size:16px;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}

/* ---------- EN-TÊTE ---------- */
.topbar{position:sticky;top:0;z-index:50;background:var(--bleu);
  background:linear-gradient(120deg,var(--bleu) 0%,#0e3a7d 100%);
  color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;box-shadow:0 2px 12px rgba(8,32,72,.28)}
.topbar-row{display:flex;align-items:center;gap:12px;max-width:920px;margin:0 auto}
.crest{width:40px;height:40px;flex-shrink:0;border-radius:9px;background:#fff;display:grid;place-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,.18)}
.crest svg{width:26px;height:26px}
.brand{flex:1;min-width:0}
.brand h1{font-size:15px;font-weight:700;letter-spacing:.1px;line-height:1.2}
.brand p{font-size:11.5px;color:#b9cdf0;font-weight:500;margin-top:1px}
.brand .redbar{display:inline-block;width:26px;height:3px;background:var(--rouge);border-radius:2px;margin-top:5px}

/* ---------- RECHERCHE ---------- */
.searchwrap{max-width:920px;margin:12px auto 0}
.search{position:relative;display:flex;align-items:center}
.search svg{position:absolute;left:13px;width:18px;height:18px;color:#8ba6d4;pointer-events:none}
.search input{width:100%;padding:11px 40px 11px 40px;border:none;border-radius:11px;background:rgba(255,255,255,.14);
  color:#fff;font-size:15px;font-family:var(--sans);outline:none;transition:background .2s}
.search input::placeholder{color:#a8c0e8}
.search input:focus{background:rgba(255,255,255,.22)}
.search .clr{position:absolute;right:8px;width:26px;height:26px;border:none;border-radius:50%;
  background:rgba(255,255,255,.18);color:#fff;font-size:16px;line-height:1;cursor:pointer;display:none;
  align-items:center;justify-content:center}
.search .clr.show{display:flex}

/* ---------- ONGLETS CATÉGORIES ---------- */
.tabs{position:sticky;top:0;z-index:40;background:var(--papier);border-bottom:1px solid var(--trait);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs-inner{display:flex;gap:4px;padding:8px 12px;max-width:920px;margin:0 auto;width:max-content;min-width:100%}
.tab{flex-shrink:0;border:none;background:transparent;color:var(--gris);font-family:var(--sans);
  font-size:13.5px;font-weight:600;padding:8px 13px;border-radius:20px;cursor:pointer;white-space:nowrap;
  transition:all .18s;display:flex;align-items:center;gap:7px}
.tab .dot{width:7px;height:7px;border-radius:50%;background:var(--trait-fort);transition:background .18s}
.tab:hover{background:var(--fond-2);color:var(--encre)}
.tab.active{background:var(--bleu);color:#fff}
.tab.active .dot{background:var(--rouge)}

/* ---------- CONTENEUR ---------- */
.container{max-width:920px;margin:0 auto;padding:0 0 80px}

/* ---------- ÉCRAN LISTE (accueil de catégorie) ---------- */
.cat-head{padding:22px 18px 8px}
.cat-head .kicker{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--rouge)}
.cat-head h2{font-family:var(--serif);font-size:25px;font-weight:600;line-height:1.15;margin-top:6px;color:var(--bleu)}
.cat-head .count{font-size:13px;color:var(--gris-clair);margin-top:6px}

.fiche-list{padding:6px 12px}
.fiche-card{display:flex;align-items:center;gap:13px;background:var(--papier);border:1px solid var(--trait);
  border-radius:var(--rs);padding:14px 15px;margin-bottom:8px;cursor:pointer;transition:all .16s;
  box-shadow:0 1px 2px rgba(16,24,40,.04)}
.fiche-card:hover{border-color:var(--trait-fort);transform:translateX(2px);box-shadow:var(--ombre)}
.fiche-card:active{transform:scale(.99)}
.fiche-num{flex-shrink:0;width:30px;height:30px;border-radius:8px;background:var(--fond-2);color:var(--bleu-clair);
  font-size:13px;font-weight:700;display:grid;place-items:center;font-variant-numeric:tabular-nums}
.fiche-card .ft{flex:1;min-width:0}
.fiche-card .ft b{font-weight:600;font-size:15px;color:var(--encre);display:block;line-height:1.3}
.fiche-card .chev{color:var(--gris-clair);flex-shrink:0}
.fiche-card .chev svg{width:18px;height:18px;display:block}

/* ---------- VUE FICHE (détail) ---------- */
.detail{display:none;padding:0 0 40px;animation:fade .25s ease}
.detail.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.back{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;width:100%;
  background:var(--papier);border:none;border-bottom:1px solid var(--trait);
  padding:12px 16px;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--bleu-clair);cursor:pointer}
.back svg{width:18px;height:18px}
.detail-head{padding:20px 18px 10px}
.detail-head .bc{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--rouge);
  display:flex;align-items:center;gap:6px}
.detail-head h2{font-family:var(--serif);font-size:23px;font-weight:600;line-height:1.2;margin-top:8px;color:var(--bleu)}
.detail-head .rule{height:3px;width:44px;background:var(--rouge);border-radius:2px;margin-top:12px}

/* ---------- CONTENU FICHE (blocs) ---------- */
.body{padding:4px 18px}
.body h4{font-family:var(--sans);font-size:15.5px;font-weight:700;color:var(--bleu);
  margin:22px 0 8px;padding-left:12px;border-left:3px solid var(--bleu-vif);line-height:1.3}
.body h4:first-child{margin-top:8px}
.body p{font-size:15.5px;color:#26303f;margin:9px 0;line-height:1.6}
.body ul{list-style:none;margin:8px 0}
.body li{position:relative;font-size:15px;color:#2b3644;margin:5px 0;padding-left:18px;line-height:1.55}
.body li::before{content:"";position:absolute;left:2px;top:9px;width:6px;height:6px;border-radius:50%;
  background:var(--bleu-vif)}
.body li.l1{margin-left:18px}
.body li.l1::before{background:transparent;border:1.5px solid var(--bleu-vif);top:8px}
.body li.l2{margin-left:36px}
.body li.l2::before{width:8px;height:2px;border-radius:0;background:var(--gris-clair);top:11px;left:1px}
.body li.l3{margin-left:52px}
.body li.l3::before{width:8px;height:2px;border-radius:0;background:var(--trait-fort);top:11px}

/* tableaux */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:14px 0;border:1px solid var(--trait);
  border-radius:var(--rs);box-shadow:var(--ombre)}
table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:min(100%,480px)}
th{background:var(--bleu);color:#fff;font-weight:600;text-align:left;padding:9px 11px;font-size:12.5px;
  vertical-align:top;border-right:1px solid rgba(255,255,255,.12)}
td{padding:8px 11px;border-top:1px solid var(--trait);border-right:1px solid var(--trait);
  vertical-align:top;color:#2b3644}
tbody tr:nth-child(even){background:var(--fond)}
tbody tr:first-child td{border-top:none}
td:last-child,th:last-child{border-right:none}

/* highlight recherche */
mark{background:var(--surligne);color:inherit;padding:0 2px;border-radius:3px;font-weight:600}

/* ---------- RÉSULTATS DE RECHERCHE ---------- */
.search-results{padding:6px 12px}
.sr-empty{text-align:center;padding:60px 24px;color:var(--gris-clair)}
.sr-empty svg{width:44px;height:44px;color:var(--trait-fort);margin-bottom:12px}
.sr-empty b{display:block;color:var(--gris);font-size:16px;margin-bottom:4px}
.sr-cat{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--rouge);
  margin:8px 4px 2px}
.sr-hit .ft small{display:block;font-size:12.5px;color:var(--gris);font-weight:400;margin-top:3px;line-height:1.4}

/* ---------- INTRO / SERVICE ---------- */
.intro-body{padding:4px 18px}
.intro-body h4{font-size:15px;font-weight:700;color:var(--bleu);margin:18px 0 6px}
.intro-body p{font-size:15px;margin:8px 0;color:#26303f}
.intro-body ul{list-style:none;margin:6px 0}
.intro-body li{position:relative;padding-left:16px;margin:4px 0;font-size:14.5px;color:#2b3644}
.intro-body li::before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--rouge)}

/* ---------- PIED ---------- */
.foot{text-align:center;padding:26px 20px 10px;color:var(--gris-clair);font-size:11.5px;line-height:1.6}
.foot .redbar{display:inline-block;width:30px;height:3px;background:var(--rouge);border-radius:2px;margin-bottom:10px}
.foot b{color:var(--gris);font-weight:600}

/* scroll-top */
.toTop{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 16px);width:46px;height:46px;
  border-radius:50%;background:var(--bleu);color:#fff;border:none;box-shadow:var(--ombre-forte);cursor:pointer;
  display:none;place-items:center;z-index:45;transition:transform .2s}
.toTop.show{display:grid}
.toTop:active{transform:scale(.92)}
.toTop svg{width:20px;height:20px}

@media(min-width:720px){
  body{font-size:16px}
  .brand h1{font-size:16px}
  .cat-head h2{font-size:28px}
  .fiche-list,.search-results{padding:8px 16px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}
</style>
</head>
