ale"}, {"t": "p", "x": "Classification de Carpentier : mécanisme de l'IM"}, {"t": "p", "x": "Relation mécanisme et étiologie de l'IM :"}, {"t": "li", "x": "Type I : dilatation de l'anneau, perforation valvulaire", "l": 0}, {"t": "li", "x": "Type II = prolapsus valvulaire par différents mécanismes possibles :", "l": 0}, {"t": "li", "x": "Élongation ou rupture de cordage : IM dégénérative du sujet âgé (= dégénérescence fibro-élastique) ou lésion d'endocardite infectieuse", "l": 1}, {"t": "li", "x": "Excès de tissu valvulaire : IM dystrophique (=myxoïde) dont la forme extrême est la maladie de Barlow, responsable d'un prolapsus bivalvulaire", "l": 1}, {"t": "li", "x": "Rupture de pilier (rare)", "l": 1}, {"t": "li", "x": "Type III :", "l": 0}, {"t": "li", "x": "IIIa : restriction organique par raccourcissement des cordages ou épaississement du feuillet valvulaire (RAA ou valvulopathie toxique, anorexigène, radique)", "l": 1}, {"t": "li", "x": "IIIb : restriction fonctionnelle (hypokinésie segmentaire = insuffisance mitrale ischémique ou dilatation globale du ventriculaire gauche)", "l": 1}, {"t": "table", "rows": [["Critères de sévérité", "Critères de sévérité"], ["Insuffisance mitrale organique", "Insuffisance mitrale secondaire"], ["Critères quantitatifs :\nSOR  0,40 cm2\nVR  60ml", "Critères quantitatifs :\nSOR  0,20 cm2\nVR  30 ml"], ["Critères semi-quantitatifs :\nVC  7mm\nRapport ITV mitrale/aortique > 1,4\nOnde E  1,5 m/s\nInversion systolique du flux veineux pulmonaire\nDilatation ventriculaire gauche\nDilatation oreillette gauche", "Critères semi-quantitatifs :\nVC  7mm\nRapport ITV mitrale/aortique > 1,4\nOnde E  1,5 m/s\nInversion systolique du flux veineux pulmonaire\nDilatation ventriculaire gauche\nDilatation oreillette gauche"], ["Critères qualitatifs :\nMorphologie de la valve : éversion valvulaire, défaut de coaptation\nAspect du flux en doppler couleur : flux large, atteignant la paroi postérieure de l'OG\nAspect du flux en doppler continu : flux dense / triangulaire", "Critères qualitatifs :\nMorphologie de la valve : éversion valvulaire, défaut de coaptation\nAspect du flux en doppler couleur : flux large, atteignant la paroi postérieure de l'OG\nAspect du flux en doppler continu : flux dense / triangulaire"], ["Il faut noter que cette classification européenne de la sévérité de l'IM secondaire est discutée. Il est probablement plus juste d'appliquer la classification de l'IM organique à la secondaire même si on sous-estime sa sévérité en échocardiographie.", "Il faut noter que cette classification européenne de la sévérité de l'IM secondaire est discutée. Il est probablement plus juste d'appliquer la classification de l'IM organique à la secondaire même si on sous-estime sa sévérité en échocardiographie."], ["Indications opératoires urgentes :\nInsuffisance mitrale aiguë symptomatique : perforation et/ou rupture de cordage\nInsuffisance mitrale sévère chronique mal tolérée sur le plan hémodynamique (état de choc cardiogénique) ou respiratoire (oedème aigu pulmonaire réfractaire)", "Indications opératoires urgentes :\nInsuffisance mitrale aiguë symptomatique : perforation et/ou rupture de cordage\nInsuffisance mitrale sévère chronique mal tolérée sur le plan hémodynamique (état de choc cardiogénique) ou respiratoire (oedème aigu pulmonaire réfractaire)"], ["Indications opératoires de l'insuffisance mitrale sévère organique", "Indications opératoires de l'insuffisance mitrale sévère organique"], ["Indications opératoires de l'insuffisance mitrale sévère fonctionnelle = peu d'indications", "Indications opératoires de l'insuffisance mitrale sévère fonctionnelle = peu d'indications"]]}, {"t": "p", "x": "Faisabilité d'une plastie mitrale"}, {"t": "li", "x": "Dépend de la qualité et de la quantité de tissu valvulaire, dont l'évaluation sera mieux réalisée en ETO et surtout par le chirurgien cardiaque en per-opératoire", "l": 0}, {"t": "li", "x": "Forme optimale : IM dégénérative par prolapsus isolé de P2 et/ou A2 +++", "l": 0}, {"t": "li", "x": "Formes réalisables :", "l": 0}, {"t": "li", "x": "Maladie de Barlow avec plusieurs prolapsus valvulaires et/ou commissuraux", "l": 1}, {"t": "li", "x": "Rhumatisme articulaire aigu en l'absence de dilatation de l'anneau et de calcification", "l": 1}, {"t": "li", "x": "Endocardite infectieuse avec perforation localisée (patch péricardique) ou rupture de cordage (néo-cordage)", "l": 1}, {"t": "li", "x": "IM secondaire par dilatation (modérée) de l'anneau ou restriction valvulaire (feuillets souples) en l'absence de calcification et de dilatation sévère du VG", "l": 1}, {"t": "li", "x": "Formes non favorables :", "l": 0}, {"t": "li", "x": "Endocardite avec délabrement valvulaire extensif", "l": 1}, {"t": "li", "x": "IM secondaire avec déformation valvulaire sévère (hauteur de tenting > 10 mm et/ou surface de tenting / 1,5 cm2) et/ou dilatation sévère du VG", "l": 1}, {"t": "li", "x": "RAA avec feuillets rigides et/ou calcifications nombreuses", "l": 1}, {"t": "li", "x": "Barlow sévère avec prolapsus étendus et/ou de la commissure antérieure", "l": 1}, {"t": "p", "x": "Plastie mitrale en pratique"}, {"t": "li", "x": "Mise en place d'un anneau prothétique (quasi-systématique) pour stabiliser la réparation", "l": 0}, {"t": "li", "x": "Mise en place de patch péricardique en cas de perforation", "l": 0}, {"t": "li", "x": "Réparation par néo-cordage en cas de rupture", "l": 0}, {"t": "li", "x": "Diminution de l'excès de tissu valvulaire si nécessaire : résection triangulaire de P2, plicature du bord libre", "l": 0}, {"t": "li", "x": "Voie mini-invasive ou robotisée possible : abord par thoracoscopie latérale droite et canulation de la CEC par voie fémorale.", "l": 0}]}, {"title": "MitraClip", "blocks": [{"t": "p", "x": "But : diminution des symptômes et inverser le remodelage VG"}, {"t": "p", "x": "Indications : en présence d'une IM sévère, sous réserve de la présence des critères de faisabilité dans chaque cas +++"}, {"t": "li", "x": "IM primaire", "l": 0}, {"t": "li", "x": "Symptomatique, réfractaire au traitement médical maximal (y compris CRT)", "l": 1}, {"t": "li", "x": "Plastie difficile/impossible ou haut risque chirurgical ou chirurgie contre-indiquée", "l": 1}, {"t": "li", "x": "IM secondaire", "l": 0}, {"t": "li", "x": "Symptomatique, réfractaire au traitement médical maximal (y compris CRT)", "l": 1}, {"t": "li", "x": "FEVG > 30% et risque chirurgical intermédiaire ou haut et pas d'indication de revascularisation et récusé par Heart Team pour assistance ou transplantation", "l": 1}, {"t": "li", "x": "FEVG < 30% et pas de possibilité de revascularisation", "l": 1}, {"t": "li", "x": "Espérance de vie > 1 an", "l": 1}, {"t": "p", "x": "Bilan pré implantation :"}, {"t": "p", "x": "ETT : IM sévère, FEVG, autres valvulopathies, surface de l'oreillette (suffisamment grande pour le virage du matériel dans l'oreillette après la ponction trans-septale)"}, {"t": "p", "x": "ETO : Critères EVEREST II"}, {"t": "p", "x": "Fuite en A2P2"}, {"t": "li", "x": "IM primaire/organique : largeur de la poche de prolapsus < 15mm, profondeur de prolapsus < 10 mm", "l": 0}, {"t": "li", "x": "IM secondaire/fonctionnelle : hauteur de tenting < 11 mm, coaptation > 2 mm", "l": 0}, {"t": "li", "x": "Surface de la valve mitrale > 4 cm2, PAS de valve rhumatismale", "l": 0}, {"t": "li", "x": "Longueur du feuillet mobile postérieur > 8 mm, épaisseur des feuillets < 5 mm", "l": 0}, {"t": "li", "x": "Pas de fente ni de calcification dans la zone de grasping (pose du clip)", "l": 0}, {"t": "li", "x": "Distance entre la hauteur de la ponction trans-septale théorique et le plan de coaptation > 40 mm", "l": 0}, {"t": "li", "x": "Ponction trans-septale postérieure et supérieure possible = pas d'ASIA, existence d'une zone septale membraneuse", "l": 0}, {"t": "p", "x": "Consultation d'anesthésie"}, {"t": "p", "x": "Contre-indications :"}, {"t": "li", "x": "Fenêtre échographique ETO mauvaise / insuffisante pour suivre la procédure", "l": 0 ticoagulant au long cours : poursuivre l'anticoagulation seule. Arrêt des AOD la veille. Idéalement INR entre 1,5 et 2 pour les AVK.", "l": 0}, {"t": "li", "x": "Si absence d'anticoagulation au long cours : aspirine < 100 mg/j + clopidogrel 75 mg/j pendant 3 mois puis aspirine 75 mg/j pendant 3 mois puis arrêt.", "l": 0}, {"t": "p", "x": "Complications :"}, {"t": "p", "x": "Immédiates :"}, {"t": "li", "x": "Épanchement péricardique ou tamponnade < 3%", "l": 0}, {"t": "li", "x": "Déchirure de valve lors du grasping ou détachement d'un seul feuillet > chirurgie cardiaque urgente dans les 24h = 1%", "l": 0}, {"t": "li", "x": "CIA iatrogène > 10 mm hémodynamiquement significative (shunt gauche-droit causant une insuffisance ventriculaire droite aiguë ou droit-gauche avec désaturation) = rare < 1%", "l": 0}, {"t": "li", "x": "Saignement nécessitant une transfusion ou une intervention chirurgicale = 3%", "l": 0}, {"t": "p", "x": "A 12 mois :"}, {"t": "li", "x": "Fuite résiduelle ≥ grade 2 = 25%", "l": 0}, {"t": "li", "x": "AVC = 4%", "l": 0}, {"t": "li", "x": "Endocardite ou sténose mitrale nécessitant une chirurgie cardiaque <1%", "l": 0}, {"t": "li", "x": "Nécessité d'assistance ou greffe cardiaque = 1%", "l": 0}]}, {"title": "Rétrécissement mitral", "blocks": [{"t": "table", "rows": [["Critères de sévérité"], ["Surface mitrale  1,5cm2\nEn planimétrie+++ : ETO 3D de préférence, ETT 3D/2D para-sternal petit axe sinon\nAutres méthodes (surface mitrale fonctionnelle) : estimation par la PHT (220/PHT) ou par équation de continuité (=Surface CCVGx ITV ss-Ao en PW/ITV mitrale en CW)\nPHT > 200ms (temps de ½ pression de l'onde E en CW) \nGradient moyen  10mmHg (un gradient moyen entre 5 et 10 mmHg n'exclut pas un RM serré)"]]}, {"t": "p", "x": "Indications de prise en charge interventionnelle (chirurgicale ou per-cutanée)"}, {"t": "li", "x": "Patient symptomatique", "l": 0}, {"t": "li", "x": "Faux asymptomatique : symptômes apparaissant à l'épreuve d'effort", "l": 0}, {"t": "li", "x": "Patient asymptomatique :", "l": 0}, {"t": "li", "x": "A haut risque thrombo-embolique : antécédent d'évènement embolique artériel, présence de contraste spontanée dans l'OG, ou FA nouvellement diagnostiquée", "l": 1}, {"t": "li", "x": "A haut risque de décompensation hémodynamique : désir de grossesse, présence d'une PAPs > 50 mmHg, ou en pré-opératoire d'une autre chirurgie non cardiaque", "l": 1}, {"t": "p", "x": "Quel traitement interventionnel proposer ?"}, {"t": "table", "rows": [["Contre-indications à la VMP"]]}, {"t": "li", "x": "Valvuloplastie mitrale per-cutanée (VMP) à proposer systématiquement en l'absence de contre-indication ou en cas de risque chirurgical élevé", "l": 0}, {"t": "li", "x": "Exceptions :", "l": 1}, {"t": "li", "x": "Thrombus de l'auricule gauche : peut-être réévalué à 3 mois d'anticoagulation curative, et une VMP peut être réalisée si disparition", "l": 2}, {"t": "li", "x": "Surface > 1,5 cm2 : présence de symptômes ne pouvant être expliqués autrement que par un RM, en cas d'anatomie favorable", "l": 2}, {"t": "li", "x": "Traitement chirurgical à proposer systématiquement en présence d'une contre-indication formelle à la VMP : remplacement valvulaire mitral généralement", "l": 0}, {"t": "li", "x": "Autres situations à discuter en staff : une VMP peut être envisagée dans un premier temps, même en cas d'anatomie mitrale sub-optimale ou de bas risque chirurgical", "l": 0}, {"t": "p", "x": "Traitement médical des conséquences du rétrécissement mitral modéré à sévère :"}, {"t": "li", "x": "Bêta-bloquants et traitement diurétique", "l": 0}, {"t": "li", "x": "Anticoagulation curative : toujours des AVK - contre-indication formelle aux AOD", "l": 0}, {"t": "li", "x": "Systématique en cas de FA, d'antécédent thrombo-embolique ou de thrombus de l'AG", "l": 1}, {"t": "li", "x": "A considérer en cas de contraste spontané intra-OG ou de dilatation de l'OG > 60 ml/m2, même en l'absence de FA ou de thrombus documenté", "l": 1}]}, {"title": "I uche"]]}, {"t": "table", "rows": [["Indications opératoires de l'insuffisance tricuspide sévère isolée : il y en a peu !"]]}, {"t": "p", "x": "Choix du traitement chirurgical :"}, {"t": "li", "x": "Plastie tricuspide en première intention : dépend de la taille de l'anneau mesurée par le chirurgien en peropératoire et de la hauteur/surface de tenting (< 8 mm/1.63 mm2)", "l": 0}, {"t": "li", "x": "Remplacement valvulaire tricuspide (bioprothèse uniquement) : en cas de réparation impossible, du fait d'une destruction valvulaire importante, de feuillets épaissis/rigides ou de tenting sévère", "l": 0}, {"t": "p", "x": "Traitement médical des conséquences de l'IT : diurétiques"}, {"t": "p", "x": "Que faire de la sonde de PM/DAI ?"}, {"t": "li", "x": "IT sur sonde (15% des PM) : intérêt du retrait de la sonde ventriculaire droite si implantation récente, avec soit une réimplantation sous contrôle échographique ou par voie épicardique", "l": 0}, {"t": "li", "x": "Toutes les chirurgies tricuspides avec sonde VD en place : en fonction de la dépendance à la stimulation, de l'indication et de la FEVG = à discuter en staff", "l": 0}, {"t": "li", "x": "Retrait avec réimplantation épicardique (non possible pour les DAI) ou per-cutané (risque de dégradation de la FEVG)", "l": 1}, {"t": "li", "x": "Sonde plaquée à l'anneau tricuspide : risque de dysfonction de sonde, impossibilité de retrait percutané ultérieur en cas d'endocardite", "l": 1}]}, {"title": "Choix du substitut valvulaire en cas de remplacement valvulaire", "blocks": [{"t": "p", "x": "En faveur de la prothèse mécanique : âge < 65ans"}, {"t": "li", "x": "désir du patient après information et absence de C.I. aux AVK (IC)", "l": 0}, {"t": "li", "x": "patient à risque de détérioration de bioprothèse (jeûne, hyperparathyroïdie) (IC)", "l": 0}, {"t": "li", "x": "patient déjà sous anticoagulant pour une autre prothèse mécanique (IC)", "l": 0}, {"t": "li", "x": "patient déjà sous anticoagulant pour maladie thrombo-embolique (IIaC)", "l": 0}, {"t": "li", "x": "âge < 65ans et espérance de vie longue (IIaC)", "l": 0}, {"t": "li", "x": "patient dont une chirurgie redux est risquée (dysfonction VG, anciens pontages, multiples prothèses valvulaires) (IIaC)", "l": 0}, {"t": "p", "x": "En faveur de la bioprothèse : âge > 65ans"}, {"t": "li", "x": "désir du patient après information (IC)", "l": 0}, {"t": "li", "x": "anticoagulation convenable impossible (C.I., compliance, mode de vie, activité professionnelle…) (IC)", "l": 0}, {"t": "li", "x": "ré-intervention\tpour\tthrombose\tde\tprothèse\tavec\tun\tmauvais niveau d'anticoagulation prouvé (IC)", "l": 0}, {"t": "li", "x": "chirurgie rédux prévisible à bas risque (IIaC)", "l": 0}, {"t": "li", "x": "espérance de vie limitée, comorbidités sévère, âge > 65 ans (IIaC)", "l": 0}, {"t": "li", "x": "femme jeune avec désir de grossesse (IIbC)", "l": 0}, {"t": "p", "x": "INR cible en fonction des prothèses :"}, {"t": "table", "rows": [["Niveaux d'INR cibles", "Facteurs de risque liés au patient", "Facteurs de risque liés au patient"], ["Risque de thrombose inhérent à la prothèse", "Pas de facteur de risque", "Au moins 1 facteur de risque"], ["Bas1", "2.5 (2 à 3)", "3.0 (2.5 à 3.5)"], ["Moyen2", "3.0 (2.5 à 3.5)", "3.5 (3 à 4)"], ["Elevé3", "3.5 (3 à 4)", "4.0 (3.5 à 4.5)"]]}, {"t": "p", "x": "Risque thrombotique des prothèses :"}, {"t": "li", "x": "1 bas : Carbomédics (aortique), Medtronic Hall, St Jude Medical (sans Silzone) ++++", "l": 0}, {"t": "li", "x": "2 moyen : Bjork-Shiley, autres valves à double-ailettes", "l": 0}, {"t": "li", "x": "3 élevé : Lillehei-Kaster, Omniscience, Starr-Edwards", "l": 0}, {"t": "p", "x": "Aujourd'hui seules des valves à basse thrombogénicité sont implantées"}, {"t": "p", "x": "Facteurs de risque liés au patient :"}, {"t": "li", "x": "Prothèse en position mitrale, tricuspide ou pulmonaire", "l": 0}, {"t": "li", "x": "ATCD thromboembolique, fibrillation atriale, contraste spontané dense dans l'OG, dilatation de l'OG > 50 mm de diamètre", "l": 0}, {"t": "li", "x": "Rétrécissement mitral", "l": 0}, {"t": "li", "x": "FE < 35%", "l": 0}, {"t": "li", "x": "Hypercoagulabilité", "l": 0}, {"t": "p", "x": "Ces facteurs ne sont pas additifs !"}]}, {"title": "Thrombose de prothèse valvulaire", "blocks": [{"t": "p", "x": "Toujours y penser chez un porteur de prothèse valvulaire +++"}, {"t": "li", "x": "Signes cliniques : insuffisance cardiaque aiguë, état de choc, syncope", "l": 0}, {"t": "li", "x": "Signes emboliques : AIT, AVC, SCA", "l": 0}, {"t": "p", "x": "Examens à faire :"}, {"t": "li", "x": "ETT +/- ETO en urgence", "l": 0}, {"t": "li", "x": "Radio-cinéma (ou ciné-scanner) si valve mécanique + TDM cardiaque", "l": 0}, {"t": "li", "x": "TDM TAP + cérébral pour rechercher des accidents emboliques s'il y a lieu", "l": 0}, {"t": "li", "x": "Hémocultures de principe (endocardite ?)", "l": 0}, {"t": "li", "x": "Si contexte post-opératoire : dosage des anticorps anti-PF4 (TIH ?)", "l": 0}]}, {"title": "Endocardite infectieuse (prise en charge dans le cadre de SOS endocardites)", "blocks": [{"t": "h4", "x": "Diagnostic positif de l'EI : critères Modifiés de Duke (ETT et ETO systématiques +++)"}, {"t": "table", "rows": [["Critères majeurs", "Critères mineurs"], ["1. Hémocultures positives\n2 hémocultures positives à germes typiques : S. bovis, groupe HACEK, S. aureus, entérocoques\nAutres germes compatibles : 2 hémocultures prélevées à 12h d'intervalles ou 3 hémocultures sur 4 prélevées à 1h d'intervalle \nUne seule hémoculture positive à C. burnetii ou IgG titre > 1/800\n\n2. Démonstration de l'atteinte cardiaque\n- Echographie montrant des lésions caractéristiques d'EI (végétation, abcès, désinsertion prothétique, pseudo-anévrysme, fistule, perforation valvulaire,…)\n- Fixation pathologique au PET-TDM ou à la scintigraphie aux leucocytes marquées autour d'une prothèse valvulaire implantée plus de 3 mois auparavant\n- Abcès ou autre lésion péri-valvulaire typique au scanner cardiaque", "- Facteur prédisposant (valvulopathie, porteur de matériel type PM/DAI, cardiopathie congénitale, toxicomanie intraveineuse)\n- Fièvre  38°C\n- Phénomène vasculaire : emboles septiques, infarctus pulmonaire, anévrysme mycotique, hémorragie intra-crânienne, hémorragie conjonctivale, tâches de Janeway\n- Phénomène immunologique : glomérulonéphrite, faux panaris d'Osler, tâches de Roth au fond d'oeil, facteur rhumatoïde élevé\n- Hémocultures positives en dehors des critères majeurs"], ["L'endocardite infectieuse est confirmée en cas de :\n2 critères majeurs\n1 critère majeur + 3 mineurs\n5 critères mineurs", "L'endocardite infectieuse est possible en cas de :\n1 critère majeur + 1 mineur\n3 critères mineurs"]]}, {"t": "h4", "x": "Bilan d'entrée de l'endocardite infectieuse en USIC"}, {"t": "p", "x": ">> DIAGNOSTIC POSITIF ET D'EXTENSION"}, {"t": "li", "x": "Examen clinique : recherche des gestes invasifs récents, antibiothérapie préalable (dates de début et de fin, durée, molécule, indication, éventuelle documentation microbiologique), examen cutané (points de ponction des VVP), recherche de douleurs osseuses, palpation du rachis (spondylodiscite associée ?)", "l": 0}, {"t": "li", "x": "Biologie : Faire prélever le kit endocardite de l'USIC (bilan d'entrée avec CRP, 2 paires d'hémocultures à l'admission, 1 paire à H1 et une parie à H12, protéinurie sur échantillon, ECBU si > 65 ans, facteur rhumatoïde, 1 tube pour sérologies Bartonelle et Coxielle).", "l": 0}, {"t": "li", "x": "ETT et ETO systématiques sauf cas particuliers. Fait au lit du malade en USIC. Mettre à jeun.", "l": 0}, {"t": "li", "x": "Scanner endocardite (IV+).  Systématique. A demander dès l'arrivée, en urgence, appel du radiologue (DECT : 36030).  Comprend : TAP à la recherche d'embolie, angioTDM cérébral (ischémie ou hémorragie) et un coroscanner. Pour les EI droites, AngioTDM pulmonaire. Si arrivée tardive du patient, appel du radiologue de garde (DECT 36 030) pour le faire (si possible) dans la nuit. Relecture des images, avis radiologues cardiovasculaires référents par DECT ou par mail (si pas dispo) : Pr JF. DEUX (DECT : 36117 , deuxjf@gmail.com), Dr V. TACHER (DECT : 36084, vania.tacher@aphp.fr) ou Dr I. SIFAOUI (DECT : 36457, islem.sifaoui@aphp.fr).", "l": 0}, {"t": "li", "x": "TEP Scanner au 18FDG. Systématique pour les prothèses valvulaires. A discuter pour les EI sur sonde de PM/DAI. Demande à adresser par fax (12787), mettre urgent. Relecture des images par les référents : Dr ABULIZI (DECT : 36370), mukedaisi.abulizi@aphp.fr) ou CCA (DECT 36666). Mettre sous régime coeur TEP : PAS DE G5 EN PERF SVP, pas d'apports glucidiques, faire remplacer tous les solutés par du sérum physiologique, même si dysfonction VG !!", "l": 0}, {"t": "li", "x": "Prévenir les infectiologues le plus rapidement possible dès l'arrivée du patient : Dr LA MARTIRE (DECT : 36696), Dr WEMMERT (DECT : 36764) ou Dr LEPEULE (DECT : 36038).", "l": 0}, {"t": "li", "x": "Anticiper la demande de Picc-Line (faxer la demander au 16601).", "l": 0}, {"t": "p", "x": ">> EXAMENS A DISCUTER AU CAS PAR CAS"}, {"t": "li", "x": "IRM cérébrale : si signes neurologiques ou anomalies sur angioTDM cérébral. Appel du neuroradiologue (DECT : 36040).", "l": 0}, {"t": "li", "x": "Avis neurologique : si urgent, appel du neurologue de garde (DECT : 36039). Si moins urgent (délai pour la CEC si hémorragie intra crânienne), référent Pr Hosseini (DECT : 15304, hassan.hosseini@aphp.fr).", "l": 0}, {"t": "li", "x": "Artériographie cérébrale. Si hémorragie cérébrale ou anévrysmes mycotiques. Avis neurologique (DECT 36030) ou neurochirurgical (DECT : 35984). Avis radio : Dr TUILIER (DECT : 36378, titien.tuilier@aphp.fr)", "l": 0}, {"t": "li", "x": "Avis rythmologique : systématique si PM ou DAI (indication ? dépendance à la stimulation ?)", "l": 0}, {"t": "p", "x": ">> RECHERCHE DE LA PORTE D'ENTREE (timing à discuter au cas par cas : pendant l'hospitalisation, ou au cours de l'HDS ou HDJ de suivi)"}, {"t": "li", "x": "Panoramique dentaire + consultation stomatologique.", "l": 0}, {"t": "li", "x": "Coloscopie (bon à faxer) + consultation d'anesthésie.", "l": 0}, {"t": "h4", "x": "Antibiothérapie empirique dans l'attente de documentation"}, {"t": "p", "x": "Indication à discuter dans tous les cas avec le sénior :"}, {"t": "li", "x": "Si pas de germe suspecté et probabilité élevée et/ou sepsis sévère : débuter l'antibiothérapie", "l": 0}, {"t": "li", "x": "Si bonne tolérance ou probabilité faible, il est possible de temporiser", "l": 0}, {"t": "p", "x": "Ne pas hésiter à en discuter avec l'infectiologue et/ou le microbiologiste."}, {"t": "p", "x": "Sauf exception, le traitement est administré par voie IV du début jusqu'à la fin."}, {"t": "p", "x": "Endocardite infectieuse sur valve native ou prothétique > 1 an de la pose"}, {"t": "p", "x": "Céfazoline 2 g sur 1 h puis 6 g/24h IVSE (en 2 seringues de 3 g)"}, {"t": "p", "x": "+ Amoxicilline 200 mg/kg/j en 6 fois/jour sans dépasser 12 g/jour"}, {"t": "p", "x": "+ Gentamicine 3 mg/kg/j en 1 fois/jour"}, {"t": "p", "x": "Endocardite infectieuse sur valve prothétique < 1 an de la pose"}, {"t": "p", "x": "Vancomycine IV 20 mg/kg sur 1 h puis 30 mg/kg/24h en IVSE"}, {"t": "p", "x": "+ Gentamicine 3 mg/kg/j en 1 fois/jour"}, {"t": "p", "x": "En cas d'allergie aux bêta-lactamines"}, {"t": "p", "x": "Vancomycine IV 20 mg/kg sur 1 h puis 30 mg/kg/24h en IVSE"}, {"t": "p", "x": "+ Gentamicine 3 mg/kg/j en 1 fois/jour"}, {"t": "p", "x": "Le protocole d'antibiothérapie est par la suite décidé collégialement en RCP endocardites, en fonction de la documentation microbiologique."}, {"t": "p", "x": "En cas de chirurgie, le J1 de l'antibiothérapie correspond à la date de la chirurgie si la valve est positive en culture ou en biologie moléculaire."}, {"t": "h4", "x": "Indications opératoires urgentes"}, {"t": "p", "x": "Rechercher systématiquement l'existence d'une indication opératoire urgente."}, {"t": "p", "x": "Si tel est le cas, appeler rapidement l'anesthésiste et le chirurgien pour anticiper le timing opératoire."}, {"t": "p", "x": "Dans tous les cas, à discuter également avec le sénior."}, {"t": "table", "rows": [["Indications", "Indications de classe I", "Indications de classe IIa et IIb"], ["Insuffisance cardiaque", "1) EI sur valve native ou prothétique du coeur gauche, avec une fuite, une obstruction ou une fistule intra-cardiaque responsables d'OAP réfractaire ou de choc cardiogénique (dans les 24 heures)\n2) EI sur valve native ou prothétique du coeur gauche, avec une fuite, une obstruction ou une fistule intra-cardiaque sévères symptomatiques ou avec des signes échographiques de mauvaise tolérance hémodynamique (dans les 48-72h)", ""], ["Mauvais contrôle de l'infection", "1) Extension locale non contrôlée : abcès, faux-anévrysme, fistule, désinsertion de prothèse (dans les 48-72h)\n2) Endocardite fongique ou germes multirésistants (dans les 48-72h ou programmé)", "1) Persistance d'hémocultures positives ( 7 jours) malgré un traitement antibiotique adapté et malgré le contrôle de la porte d'entrée et des localisations septiques secondaires (dans les 48-72h)\n2) Endocardite à Staphylococcus aureus ou lugdunensis ou à BGN non-HACEK (dans les 48-72h ou programmé)"], ["Prévention des embolies systémiques", "EI sur valve native ou prothétique du coeur gauche, avec des végétations persistantes > 10 mm, après un ou plusieurs évènements emboliques malgré antibiothérapie adaptée (dans les 48-72h)", "1) EI sur valve native du coeur gauche, avec des végétations > 10 mm associées à une sténose ou une fuite valvulaire sévère et un faible risque opératoire (dans les 48-72h)\n2) EI sur valve native ou prothétique du coeur gauche, avec végétations > 30 mm (dans les 48-72h)\n3) EI sur valve native ou prothétique du coeur gauche, avec végétations isolées > 15 mm sans autre indication opératoire (grade IIb) (dans les 48-72h)"]]}, {"t": "h4", "x": "Staff endocardite"}, {"t": "p", "x": "Tous les dossiers d'endocardite infectieuse doivent être présentés."}, {"t": "p", "x": "Les staffs ont lieu le mercredi à 14H30 en salle de staff de réanimation (E1) avec les cardiologues, les infectiologues, les radiologues et isotopistes, les bactériologistes, les chirurgiens et les réanimateurs."}, {"t": "p", "x": "Pensez à apporter les dossiers ce jour-là. Veillez à avoir les dates d'antibiothérapie, l'ensemble des résultats des examens et les antibiogrammes (surtout si examen fait à l'extérieur)."}, {"t": "p", "x": "Un avis de la RCP sera mis sur ORBIS à l'issu du staff avec les conclusions."}, {"t": "h4", "x": "Prise en charge dans le service"}, {"t": "li", "x": "Bilan biologique au moins trois fois par semaine (NFS, CRP, fonction rénale)", "l": 0}, {"t": "li", "x": "Hémocultures : quotidiennes jusqu'à l'apyrexie", "l": 0}, {"t": "li", "x": "ETT : une fois par semaine (au lit du patient si USIC, au labo si salle)", "l": 0}, {"t": "li", "x": "Dosage d'antibiotique :", "l": 0}, {"t": "li", "x": "Gentamicine IV : le résiduel à H24 de l'injection doit être < 1 mg/L. Faire systématiquement le dosage quotidiennement pendant 48h puis toutes les 72h si créatinine stable.", "l": 1}, {"t": "li", "x": "Vancomycine IVSE : concentration cible entre 30 et 35 mg/L. Faire systématiquement le lendemain du début de la perfusion puis toutes les 48h", "l": 1}, {"t": "li", "x": "Amoxicilline IV : à faire uniquement si poids extrêmes, insuffisance rénale.", "l": 1}, {"t": "li", "x": "Si insuffisance rénale, dosage des antibiotiques et recueil des urines pour recherche de cristallurie (envoi à Tenon)", "l": 0}, {"t": "li", "x": "Imagerie neurologique de contrôle si lésion cérébrale", "l": 0}, {"t": "li", "x": "Avis gériatrique si besoin", "l": 0}, {"t": "li", "x": "Anticiper la demande de SSR très tôt, les hospitalisations pour endocardite sont longues !", "l": 0}, {"t": "h4", "x": "Sortie du patient"}, {"t": "li", "x": "Remise du Flyer Endocardite au patient + informations sur le suivi, l'antibioprophylaxie, le traitement et la porte d'entrée.", "l": 0}, {"t": "li", "x": "Orientation du patient :", "l": 0}, {"t": "li", "x": "Si patient opéré : hospitalisation en chirurgie cardiaque puis SSR.", "l": 1}, {"t": "li", "x": "Si patient non opéré : retour au domicile (HAD ou prestataire) ou SSR pour la fin des antibiotiques", "l": 1}, {"t": "li", "x": "SUIVI A PROGRAMMER (feuilles de suivi d'endocardite préremplies dans le classeur), cf chapitre 8 sur les modalités de suivi.", "l": 0}, {"t": "h4", "x": "Le compte rendu de sortie"}, {"t": "p", "x": "Les CR nous permettent de mettre à jour une base de données exhaustives utiles pour les études, mémoires et thèses ! Pensez donc à prendre le CR type afin de ne louper aucune information importante !"}, {"t": "li", "x": "Mettre l'ensemble des correspondants (médecin traitant, cardiologue traitant, chirurgien, infectiologue, médecins ayant adressé le patient dans le service ++). Pas de CR de sortie sans le médecin traitant et le cardiologue référent.", "l": 0}, {"t": "li", "x": "Histoire de la maladie : date des premiers signes, nom et date de début de chaque antibiotique", "l": 0}, {"t": "li", "x": "Paramètres vitaux/ECG/avis et résultats de tous les examens complémentaires. Date de la première et dernière hémoculture positive.", "l": 0}, {"t": "li", "x": "Ne pas oublier la culture et l'anatomopathologie de la valve si le patient a été opéré", "l": 0}, {"t": "li", "x": "Date et décision de la RCP.", "l": 0}, {"t": "h4", "x": "Antibioprophylaxie"}, {"t": "p", "x": "Procédures concernées : gestes dentaires avec manipulation de la muqueuse gingivale ou de la partie péri-apicale de la dent ou avec perforation de la muqueuse orale détartrage inclus ++++++ (mais pas le traitement simple d'une carie superficielle non compliquée ou soins d'orthodontie)."}, {"t": "p", "x": "Aucun autre geste (en particulier gestes endoscopiques quels qu'ils soient ou ETO) ne nécessite d'antibioprophylaxie (même les gestes sur la peau et les tissus mous !!!!)."}, {"t": "p", "x": "Malades concernés :"}, {"t": "li", "x": "Porteurs de prothèse valvulaire, y compris valves percutanées ou matériel de réparation valvulaire (anneau)", "l": 0}, {"t": "li", "x": "Dans les 6 mois suivant l'implantation d'une prothèse pour fermeture de FOP, CIA ou auricule gauche", "l": 0}, {"t": "li", "x": "Antécédent d'endocardite infectieuse", "l": 0}, {"t": "li", "x": "Cardiopathie congénitale cyanogène opérée ou non.", "l": 0}, {"t": "p", "x": "En particulier, les patients porteurs d'une valvulopathie ne sont pas concernés !"}, {"t": "p", "x": "Traitement à administrer :"}, {"t": "li", "x": "En l'absence d'allergie : amoxicilline 2 g (PO ou IV), 1 h avant le geste", "l": 0}, {"t": "li", "x": "En cas d'allergie : clindamycine 600 mg (PO ou IV), 1 h avant le geste", "l": 0}, {"t": "h4", "x": "Suivi des patients"}, {"t": "p", "x": "Il se fait soit en HDJ, soit en HDS en fonction du nombre d'examens à programmer et de la complexité du tableau. Vous devez programmer le suivi du patient à sa sortie :"}, {"t": "li", "x": "Pour les patients sortis en SSR (via ou non la chirurgie cardiaque) :", "l": 0}, {"t": "p", "x": "HDJ/HDS à 1, 3, 6 mois et 12 mois de la fin de l'antibiothérapie. Biologie standard, consultation infectiologique, ETT, examens à la recherche de la porte d'entrée si non faits au préalable."}, {"t": "p", "x": "Bien indiquer sur les demandes les éventuels traitements anti-thrombotiques ++"}, {"t": "li", "x": "Pour les patients sortis à domicile :", "l": 0}, {"t": "p", "x": "HDJ/HDS à programmer à la date de la fin de traitement + 1, 3, 6 et 12 mois de la fin de l'antibiothérapie : Biologie standard, consultation infectiologique, ETT, examens à la recherche de la porte d'entrée si non faits au préalable."}, {"t": "p", "x": "Bien indiquer sur les demandes les éventuels traitements anti-thrombotiques, ainsi que l'antécédent d'endocardite infectieuse qui nécessite l'antibioprophylaxie +++"}]}, {"title": "Fermeture percutanée de foramen ovale perméable", "blocks": [{"t": "p", "x": "Indication :"}, {"t": "li", "x": "Age < 60 ans, infarctus cérébral cryptogénique récent (< 6 mois), lien de causalité très probable entre le FOP et l'infarctus cérébral après un bilan étiologique approprié qui n'objective aucune autre cause (en particulier FA ou athérome +++)", "l": 0}, {"t": "li", "x": "Syndrome d'orthodéoxie-platypnée (rare)", "l": 0}, {"t": "p", "x": "Bilan pré-interventionnel :"}, {"t": "li", "x": "ETT et ETO avec épreuve de bulles, avec mise en évidence d'un shunt droit-gauche (FOP + ASIA avec excursion > 10 mm ou shunt important > 30 microbulles)", "l": 0}, {"t": "li", "x": "Bilan étiologique complet d'un AVC ischémique :", "l": 0}, {"t": "li", "x": "Bilan artériel intra et extra-crânien : écho-doppler des TSA ou angioIRM ou angioTSA", "l": 0}, {"t": "li", "x": "IRM cérébrale", "l": 0}, {"t": "li", "x": "Holter ECG de longue durée (au moins 24h)", "l": 0}, {"t": "li", "x": "Bilan de thrombophilie selon le contexte", "l": 0}, {"t": "li", "x": "Consultation d'anesthésie", "l": 0}, {"t": "p", "x": "Les dossiers sont discutés en RCP neuro-cardio le vendredi après-midi."}, {"t": "p", "x": "Prise en charge avant la procédure :"}, {"t": "li", "x": "Patient hospitalisé 24 heures avant la procédure", "l": 0}, {"t": "li", "x": "Vérifier l'intégralité du bilan et notamment la consultation d'anesthésie", "l": 0}, {"t": "li", "x": "DOSAGE des BHCG chez les patientes jeunes + faire prélever Groupe, Rhésus, RAI", "l": 0}, {"t": "li", "x": "Prescrire « à Jeun » pour minuit la veille de la procédure", "l": 0}, {"t": "li", "x": "Prescrire un sérum physiologique le matin de la procédure à 6 h", "l": 0}, {"t": "li", "x": "Faire signer le consentement", "l": 0}, {"t": "p", "x": "Gestion du traitement anti-thrombotique :"}, {"t": "li", "x": "Si le patient est anticoagulé : arrêt définitif des AOD la veille de la procédure", "l": 0}, {"t": "li", "x": "Aspirine 75 mg/jour et clopidogrel 75 mg/jour en post procédure sans dose de charge pendant 3 mois puis aspirine 75 mg/j seule à vie", "l": 0}, {"t": "p", "x": "Surveillance après la procédure :"}, {"t": "li", "x": "NFS de contrôle à J1", "l": 0}, {"t": "li", "x": "Point de ponction veineux à vérifier", "l": 0}, {"t": "li", "x": "ETT :  contrôle péricarde et position de la prothèse", "l": 0}, {"t": "li", "x": "Retour à domicile dès J1 avec arrêt de travail 1 semaine", "l": 0}, {"t": "p", "x": "Suivi :"}, {"t": "li", "x": "A 3 mois avec ETT + épreuve de bulles et consultation avec Pr Teiger, Dr Gallet, Dr Mouillet, Dr Boukantar, Dr Nguyen ou Dr Soulier", "l": 0}, {"t": "li", "x": "Puis suivi avec le cardiologue traitant", "l": 0}, {"t": "li", "x": "Antibioprophylaxie de l'endocardite durant les 6 mois suivant l'implantation de la prothèse", "l": 0}, {"t": "p", "x": "Principales complications à 30 jours :"}, {"t": "li", "x": "Environ 5% de troubles du rythme supra-ventriculaires (FA surtout)", "l": 0}, {"t": "li", "x": "< 1% de saignements majeurs", "l": 0}]}, {"title": "Fermeture percutanée de communication inter-atriale", "blocks": [{"t": "p", "x": "Nous évoquerons seulement la CIA de type ostium secundum, seule forme anatomique accessible à une fermeture par voie percutanée."}, {"t": "p", "x": "Indications :"}, {"t": "li", "x": "CIA avec un shunt significatif (dilatation des cavités droites) et des résistances vasculaires pulmonaires < 5 WU", "l": 0}, {"t": "li", "x": "CIA avec suspicion d'embolie paradoxale.", "l": 0}, {"t": "p", "x": "Bilan pré interventionnel :"}, {"t": "li", "x": "ETT : dimension des cavités droites, PAPS, calcul de Qp/Qs, valvulopathies associées, CIA", "l": 0}, {"t": "li", "x": "ETO 3D : type, forme et dimension de la CIA. Berges de la CIA (au moins > 5 mm sauf en supéro-antérieur), recherche de fenestrations, caractère anévrismal ou non du septum, valvulopathies associées", "l": 0}, {"t": "li", "x": "TDM thoracique : recherche d'un retour veineux pulmonaire anomal", "l": 0}, {"t": "li", "x": "Consultation d'anesthésie", "l": 0}, {"t": "p", "x": "Prise en charge avant la procédure :"}, {"t": "li", "x": "Patient hospitalisé 24 heures avant la procédure", "l": 0}, {"t": "li", "x": "Vérifier l'intégralité du bilan et notamment la consultation d'anesthésie", "l": 0}, {"t": "li", "x": "DOSAGE des BHCG chez les patientes jeunes + faire prélever Groupe, Rhésus, RAI", "l": 0}, {"t": "li", "x": "Prescrire « à Jeun » pour minuit la veille de la procédure", "l": 0}, {"t": "li", "x": "Prescrire un sérum physiologique le matin de la procédure à 6 h", "l": 0}, {"t": "li", "x": "Faire signer le consentement", "l": 0}, {"t": "p", "x": "Gestion du traitement anti-thrombotique :"}, {"t": "li", "x": "Si le patient est sous anticoagulant au long cours : arrêt des AOD la veille et INR entre 2-3. Reprise des anticoagulants après la procédure. Si INR > 3, avertir le sénior.", "l": 0}, {"t": "li", "x": "Si le patient n'a pas de traitement anticoagulant : Aspirine 75 mg/j et clopidogrel 75mg/j pendant 3 mois sans dose de charge, puis aspirine 75 mg/j seule pendant 3 mois puis arrêt.", "l": 0}, {"t": "p", "x": "Surveillance après la procédure :"}, {"t": "li", "x": "NFS de contrôle à J1", "l": 0}, {"t": "li", "x": "Point de ponction veineux à vérifier", "l": 0}, {"t": "li", "x": "ETT :  contrôle péricarde et position de la prothèse", "l": 0}, {"t": "li", "x": "Retour à domicile dès J1 avec arrêt de travail 1 semaine", "l": 0}, {"t": "p", "x": "Suivi :"}, {"t": "li", "x": "Prévoir HDJ à 3 mois avec ETT et IRM cardiaque", "l": 0}, {"t": "li", "x": "Antibioprophylaxie de l'endocardite durant les 6 mois suivant l'implantation de la prothèse", "l": 0}, {"t": "p", "x": "Principales complications :"}, {"t": "li", "x": "Tamponnade (1/1000) : surtout en cas de prothèse > 30 mm et en l'absence de berge rétro-aortique", "l": 0}, {"t": "li", "x": "Migration de prothèse : très rare", "l": 0}]}, {"title": "Fermeture percutanée de l'auricule gauche", "blocks": [{"t": "p", "x": "Indications :"}, {"t": "li", "x": "Patients aux antécédents de FA et ayant une contre-indication définitive aux anticoagulants (grade IIb ESC 2016) et avec un score CHADS-VASc  4 (recommandation HAS)", "l": 0}, {"t": "li", "x": "Patients aux antécédents de FA et récidive d'AVC ischémique sous traitement anticoagulant bien conduit (hors recommandation HAS)", "l": 0}, {"t": "p", "x": "Principale contre-indication : thrombus intra-auriculaire"}, {"t": "p", "x": "Bilan pré-interventionnel :"}, {"t": "li", "x": "ETT", "l": 0}, {"t": "li", "x": "TDM cardiaque : taille et forme de l'auricule gauche. Vacuité de l'auricule gauche", "l": 0}, {"t": "li", "x": "ETO (uniquement en cas de contre-indication au scanner cardiaque)", "l": 0}, {"t": "li", "x": "Avis du spécialiste d'organe orientant vers la FAG (neurologue, gastro-entérologue, interniste), notamment pour l'indication de la procédure (contre-indication définitive) et le traitement post-FAG", "l": 0}, {"t": "li", "x": "Décision du traitement post-implantation (décision collégiale)", "l": 0}, {"t": "p", "x": "Prise en charge avant la procédure :"}, {"t": "li", "x": "Patient hospitalisé 48 heures avant la procédure", "l": 0}, {"t": "li", "x": "Vérifier l'intégralité du bilan et notamment la consultation d'anesthésie", "l": 0}, {"t": "li", "x": "DOSAGE des BHCG chez les patientes jeunes + faire prélever Groupe, Rhésus, RAI", "l": 0}, {"t": "li", "x": "Prescrire « à Jeun » pour minuit la veille de la procédure", "l": 0}, {"t": "li", "x": "Prescrire un sérum physiologique le matin de la procédure à 6 h", "l": 0}, {"t": "li", "x": "Faire signer le consentement", "l": 0}, {"t": "p", "x": "Gestion du traitement anti-thrombotique :"}, {"t": "li", "x": "Pas d'anticoagulant la veille de l'intervention (ponction trans-septale)", "l": 0}, {"t": "li", "x": "Après la procédure :", "l": 0}, {"t": "p", "x": "1) Si l'indication de la FAG est une CI aux anticoagulants :"}, {"t": "li", "x": "Risque hémorragique majeur (angiopathie amyloïde) : aspirine 100 mg/j seule pendant 3 mois puis stop", "l": 0}, {"t": "li", "x": "Risque hémorragique modéré à important (saignement intracrânien sans angiopathie amyloïde) : aspirine 100 mg/j seule pendant 6 mois puis stop", "l": 0}, {"t": "li", "x": "Risque hémorragique faible à modéré (digestif ou urologique) : aspirine 100 mg/j + clopidogrel 75 mg/j pendant 3 mois puis aspirine 100 mg/j seule pendant 3 mois puis stop", "l": 0}, {"t": "p", "x": "2) Si l'indication de la FAG est une récidive d'AVC ischémique sous un traitement anticoagulant bien mené : reprise de l'anticoagulant oral et y associer aspirine 100 mg/j."}, {"t": "p", "x": "Surveillance après la procédure :"}, {"t": "li", "x": "NFS de contrôle à J1", "l": 0}, {"t": "li", "x": "Point de ponction veineux à vérifier", "l": 0}, {"t": "li", "x": "ETT J1 :  contrôle péricarde et positionnement de la prothèse", "l": 0}, {"t": "li", "x": "Retour à domicile dès J2", "l": 0}, {"t": "p", "x": "Suivi :"}, {"t": "li", "x": "Prévoir le suivi à 3 mois et 12 mois en HDJ avec TDM cardiaque (en l'absence de CI) et ETT. Si CI au TDM cardiaque : ETO", "l": 0}, {"t": "li", "x": "Antibioprophylaxie de l'endocardite durant les 6 mois suivant l'implantation de la prothèse", "l": 0}, {"t": "p", "x": "Principales complications (étude ASAP, 2013) :"}, {"t": "p", "x": "Environ 8.7% d'évènements indésirables graves au décours de la procédure dont :"}, {"t": "li", "x": "2% d'épanchement péricardique non compliqué d'une tamponnade", "l": 0}, {"t": "li", "x": "1.3% de tamponnade", "l": 0}, {"t": "li", "x": "1.3% d'hématome au point de ponction", "l": 0}, {"t": "li", "x": "1.3% de migration de la prothèse", "l": 0}, {"t": "li", "x": "0.7% de pseudo-anévrysme fémoral", "l": 0}]}]}, {"title": "Insuffisance cardiaque et amylose", "fiches": [{"title": "Bilan de Cardiomyopathie dilatée / Cardiopathie hypertrophique", "blocks": [{"t": "h4", "x": "Définition ESC"}, {"t": "p", "x": "CMD : dilatation VG associée à une dysfonction contractile, sans anomalie des conditions de charge (HTA, valvulopathie, insuffisance rénale congestive, hyperdébit) ni insuffisance coronaire sévère. La dilatation et/ou la dysfonction VD n'est pas nécessaire au diagnostic."}, {"t": "p", "x": "Dilatation ventriculaire gauche (ETT) :               Dysfonction ventriculaire gauche (ETT) :"}, {"t": "table", "rows": [["", "Homme", "Femme"], ["FEVG (Simpson biplan)", "< 52%", "< 54%"], ["Strain global longitudinal", "> -18%", "> -18%"]]}, {"t": "table", "rows": [["", "Homme", "Femme"], ["DTDVG", "> 59 mm", "> 53 mm"], ["DTDVGi", "> 31 mm/m²", "> 32 mm/m²"], ["VTDVG", "> 150 ml", "> 106 ml"], ["VTDVGi", "> 74 ml/m²", "> 61 ml/m²"]]}, {"t": "p", "x": "CMH : Hypertrophie pariétale non expliquée par une anomalie de la post-charge."}, {"t": "p", "x": "En pratique, épaisseur pariétale ≥ 15 mm ou  ≥ 13 mm si ATCD familial de CMH en ETT, IRM, TDM. NB : Toute HVG (masse > 115g/m2 (homme) et 95 g/m2 (femme)) n'est pas une CMH !!"}, {"t": "p", "x": "Données échocardiographiques :"}, {"t": "p", "x": "L'ETT est l'examen de première ligne, car elle est le plus souvent à l'origine du diagnostic et permet d'initier le bilan étiologique en recherchant particulièrement :"}, {"t": "table", "rows": [["CMD", "CMH"], ["Des troubles de cinétique segmentaires, en faveur d'une cardiopathie ischémique\nDes troubles de cinétique localisés mais non segmentaires, évocateurs de myocardite, sarcoïdose, ou Tako-Tsubo\nDes anomalies de la cinétique septale, en rapport avec un bloc de branche (en l'absence d'électro-entrainement, hors contexte post-opératoire)", "Hypertrophie du SIA : amylose\nHypertrophie VD : amylose, Fabry, Noonan\nHypertrophie valvulaire : Fabry, amylose\nEpanchement péricardique : amylose, myocardite\nHypertrophie concentrique (Fabry, PRKAG2, amylose, …) / localisée (CMH sarcomérique)"]]}, {"t": "h4", "x": "Bilan morphologique cardiaque"}, {"t": "p", "x": "En première intention :"}, {"t": "table", "rows": [["CMD", "CMH"], ["Imagerie coronaire systématique pour éliminer la cardiopathie ischémique (diagnostic différentiel)\nIRM cardiaque, avec différentes séquences : \nCiné IRM : volumes, FEVG, troubles de cinétique localisés (segmentaires ou non)\nRehaussement tardif : \nséquelle de nécrose (territoire coronaire) : cardiopathie ischémique\nrehaussement sous-épicardique (classiquement latéral) : myocardite \nrehaussement tardif atypique antéro-septo-basal : sarcoïdose\nfibrose intra-myocardique non spécifique\nT1 : recherche de graisse intra-myocardique dans le cadre d'une DVDA\nT2 : recherche d'inflammation en rapport avec une myocardite en phase active\nT2* : recherche de surcharge ferrique (N> 20 msec) : hémochromatose\nHolter-ECG des 24h (ou surveillance télémétrée) : visée étiologique (cardiopathie rythmique, DVDA), pronostique, et thérapeutique.", "IRM cardiaque : rehaussement tardif, quantification de la fibrose, T1 : allongé dans l'amylose, abaissé dans le Fabry. Recherche de thrombus. \nEchographie d'effort si gradient de repos (ou post Valsalva) < 50 mmHg\nHolter des 48 heures : gradation du risque rythmique. \nScintigraphie osseuse (HMDP, DPD) : surtout si âge > 60 ans et IC"]]}, {"t": "p", "x": "En deuxième intention :"}, {"t": "table", "rows": [["CMD", "CMH"], ["PET-Scanner : en cas de suspicion de sarcoïdose\nScintigraphie en contraste de phase : en cas de suspicion de DVDA à un stade précoce\nBiopsie myocardique : référence pour le diagnostic de sarcoïdose ou de myocardite. Les indications restent discutées, mais la biopsie myocardique doit être discutée au cas par cas en cas de suspicion de myocardite spécifique pouvant bénéficier d'un traitement spécifique (à éosinophiles, à cellules géantes, virale active chronique, lupique, etc.). Elle est surtout à discuter à 3 mois en l'absence d'amélioration de la FEVG sous traitement médical : \nDécouverte de CMD à bilan étiologique négatif et défaillance hémodynamique\nCMD à bilan étiologique négatif répondant pas au traitement médical\nCMD avec hyperéosinophilie e/ou réactions allergiques\nSuspicion de myocardite active, avant initiation d'un traitement immuno-suppresseur\nSuspicion de sarcoïdose sans autre tissu accessible à la biopsie", "Biopsie myocardique : en cas de suspicion de cardiopathie infiltrative (sauf amylose : biopsie extra cardiaque en première intention)"]]}, {"t": "h4", "x": "Etiologies des cardiomyopathies et bilan biologique correspondant"}, {"t": "p", "x": "Comme toutes les cardiopathies, les CMD peuvent être familiales (1/3) ou non familiales (2/3). Le bilan étiologique de première intention devra éliminer les causes fréquentes, réversibles, ou représentant une urgence thérapeutique."}, {"t": "p", "x": "1/ Cardiomyopathies familiales"}, {"t": "p", "x": "En cas de suspicion de CMP familiale, adresser le patient et sa famille au conseil génétique (Pr Funalot, secrétariat Mme Pascale Ringot (01 49 8)12 861) est indispensable."}, {"t": "p", "x": "La transmission se fait le plus souvent sur un mode autosomique dominant, mais tous les modes de transmission sont possibles selon l'étiologie :"}, {"t": "table", "rows": [["Autosomique dominant", "Liée à l'X", "Autosomique récessive", "Mitochondriale"], ["50% de transmission à chaque descendant, quel que soit le sexe", "ne touche alors que les hommes (sauf mutation homozygote)", "Touche indifféremment les hommes ou les femmes, consanguinité", "Transmission exclusivement par la mère"], ["Laminopathies (mutation de la lamine, protéine de structure nucléaire)\nDVDA\nDesminopathies (mutation de la desmine, protéine du cytosquelette)\nSyndrome LEOPARD*\nCMH sarcomériques*", "Dystrophies musculaires (Duchenne, Becker)\nMaladie de Fabry*", "Hémochromatose génétique\nCertaines DVDA\nCertaines desminopathies", "Cytopathies mitochondriales*"]]}, {"t": "p", "x": "* CMH"}, {"t": "p", "x": "Dans l'hypothèse d'une CMD familiale, il faut systématiquement :"}, {"t": "li", "x": "Rechercher un tableau syndromique (cf. tableau)", "l": 0}, {"t": "li", "x": "réaliser un arbre généalogique (3 à 4 générations) : mort subite, insuffisance cardiaque, transplantation cardiaque, défibrillateur ou pace-maker, AVC, myopathie squelettique. Un arbre généalogique « négatif » n'élimine pas la possibilité d'une CMD génétique (mutation de novo, pénétrance incomplète, antécédents inconnus).", "l": 0}, {"t": "p", "x": "Tableau syndromique à rechercher :"}, {"t": "table", "rows": [["Symptômes cliniques évocateurs", "Etiologies possiblement rattachées"], ["Atteintes mésenchymateuses : \n     Hypertrophie musculaire\n     Atteintes osseuses ou cartilagineuses\n     Atteinte du derme\n     Atteinte du tissu adipeux (lipodystrophies)\n     Insulino-résistance", "Laminopathies"], ["Retard mental", "Dystrophies, cytopathies mitochondriales"], ["Surdité", "Cytopathies mitochondriales, (Fabry, LEOPARD)"], ["Atteintes neurologiques / neuro-musculaires", "Cytopathies mitrochondriales \nDystrophies (ataxie de Friedrich)"], ["Fatigabilité musculaire", "Dystrophies, Desminopathies, Laminopathies"], ["MELAS (myopathie, encéphalopathie, acidose lactiques, AVC ou tableau équivalent)", "Cytopathies mitochondriales"], ["Anomalies cutanées (mélanodermie)", "Hémochromatose"], ["Anomalies ophtalmologiques", "Dystrophies, Cytopathies mitochondriales, (Fabry)"]]}, {"t": "p", "x": "2/ Cardiomyopathies non familiales"}, {"t": "p", "x": "Certaines causes doivent être systématiquement recherchées à l'interrogatoire :"}, {"t": "li", "x": "Exposition à des toxiques : alcool, chimiothérapies", "l": 0}, {"t": "li", "x": "Carences nutritionnelles", "l": 0}, {"t": "li", "x": "Maladie auto-immune : antécédents personnels, symptômes évocateurs d'une atteinte systémique (arthralgies, éruptions cutanées, etc.), antécédents familiaux", "l": 0}, {"t": "li", "x": "Contexte de grossesse (péri- ou post-partum)", "l": 0}, {"t": "li", "x": "Voyages ou infections récents", "l": 0}, {"t": "li", "x": "Comportement sexuel à risque, dans l'hypothèse d'une myocardite à VIH", "l": 0}, {"t": "table", "rows": [["", "Etiologie", "1ère intention", "2nde intention"], ["Fam", "Dystrophies, Laminopathies", "CPK, Créatinine", ""], ["Fam", "Cytopathies mitochondriales", "Leucocytes, Créatinine\nGlycémie, lactate veineux*", "Acide lactique, myoglobinurie"], ["Fam", "Hémochromatose\nFabry*", "Bilan martial et hépatique\nDosage alpha galactosidase (test au buvard)*", ""], ["Non Familiale", "Dysthyroïdie", "TSH, T4", ""], ["Non Familiale", "Maladie auto-immune", "Créatinine, protéinurie", "Auto-anticorps"], ["Non Familiale", "Cardiopathie éthylique", "VGM, bilan hépatique", "Thiamine"], ["Non Familiale", "Myocardite à éosinophiles", "Formule sanguine", ""], ["Non Familiale", "Sarcoïdose", "Calcémie", "Enzyme de conversion"], ["Non Familiale", "Myocardite infectieuse", "VIH", "Sérologie coxsackie, \nGrippe, \nEchovirus\nBorrelia bugdorferi (Lyme)\nSérologie Chagas"], ["Non Familiale", "Phéochromocytome", "", "Catécholamines u et p"], ["Non Familiale", "Amylose*", "EPP s+u, I-EPP s+u, CLL*", ""]]}, {"t": "p", "x": "* Bilan spécifique aux CMH (à prescrire en plus du bilan des CMD"}]}, {"title": "Titration des traitements de l'insuffisance cardiaque", "blocks": [{"t": "p", "x": "Se référer à la fiche « Prescription de Sacubitril-Valsartan (Entresto®) » et aux recommandations de titration des traitements de l'insuffisance cardiaque (IEC/ARA2, bêtabloquants, antialdostérone, ISGLT2) présentées dans cette section."}]}, {"title": "Prescription de Sacubitril-Valsartan (Entresto®)", "blocks": [{"t": "p", "x": "Le Sacubitril-Vasartan est un traitement de l'insuffisance cardiaque dont les bénéfices sur la mortalité globale, la mortalité cardio-vasculaire, et les ré hospitalisations pour insuffisance cardiaque ont été montrés par l'étude PARADIGM-HF publiée en 2014."}, {"t": "p", "x": "En France, il était disponible depuis mais 2015 dans le cadre d'une ATU de cohorte (protocole)."}, {"t": "p", "x": "Il a l'AMM depuis mai 2016 (5€/jour, remboursé à 65%) :"}, {"t": "li", "x": "FEVG ≤ 35%", "l": 0}, {"t": "li", "x": "Symptomatique (NYHA II-III) sous traitement médical optimal comprenant un IEC ou ARA2", "l": 0}, {"t": "p", "x": "Il est recommandé par la Société Européenne de cardiologie depuis 2016, dans ces indications :"}, {"t": "li", "x": "FEVG ≤ 35%", "l": 0}, {"t": "li", "x": "Elévation des peptides natriurétiques : BNP ≥150 ou NT-proBNP ≥600ng/l (100 ou 400ng/l, respectivement, si hospitalisation pour insuffisance cardiaque dans les 12 mois)", "l": 0}, {"t": "li", "x": "Symptomatique sous traitement médical optimal comprenant un IEC ou ARA2, un antialdostérone et un béta-bloquant", "l": 0}, {"t": "li", "x": "Chez les patients ambulatoires", "l": 0}, {"t": "p", "x": "Précautions de prescription :"}, {"t": "li", "x": "Contre-indications :", "l": 0}, {"t": "p", "x": "- Clairance de la créatinine < 30 ml/min/1.73m²"}, {"t": "p", "x": "- K+ > 5.4 mmol/l"}, {"t": "p", "x": "- PAs < 100 mmhg"}, {"t": "p", "x": "- Antécédent d'angiodème (lié à un traitement par IEC ou ARA2, héréditaire, ou idiopathique)"}, {"t": "li", "x": "Interdiction d'association avec un IEC ou ARA2 :", "l": 0}, {"t": "p", "x": "- Wash-out 36h entre la dernière prise d'IEC et la 1ère prise d'Entresto® (et réciproquement)"}, {"t": "p", "x": "- Wash-out non nécessaire pour le switch ARA2- Sacubitril-Valsartan"}]}, {"title": "Prescription de fer intra-veineux (Ferinject®)", "blocks": [{"t": "p", "x": "La carence martiale est fréquente en cas d'insuffisance cardiaque (25 à 50% des patients)."}, {"t": "p", "x": "Comme dans d'autres maladies chroniques (insuffisance rénale, maladies inflammatoires), le métabolisme du fer est altéré dans l'IC, conduisant à la définition de 2 types de carence martiale :"}, {"t": "li", "x": "Déficit absolu en fer : ferritine < 100µg/l", "l": 0}, {"t": "li", "x": "Déficit relatif en fer : ferritine 100-300µg/l & saturation de la transferrine < 20%", "l": 0}, {"t": "p", "x": "Deux études randomisées (FAIR-HF 2009, et CONFIRM-HF 2015) ont montré les bénéfices de la supplémentation IV en carboxymaltose ferrique chez des patients insuffisants cardiaques symptomatiques (NYHA II-IV) avec FEVG altérée, présentant une carence martiale absolue ou relative, avec ou sans anémie, bénéfices en termes de qualité de vie, capacités fonctionnelles, et d'hospitalisation pour décompensation cardiaque."}, {"t": "p", "x": "Les effets n'ont pas été étudiés pour les patients avec Hb > 15 g/dL, et des études sont en cours dans l'insuffisance cardiaque à FEVG préservée. Ces bénéfices n'ont pas été retrouvés par la supplémentation en fer par voie orale."}, {"t": "p", "x": "Pour ces raisons, un dépistage de la carence martiale, absolue ou relative, est recommandée pour tous les patients insuffisants cardiaques avec FEVG <45% (ou amylose cardiaque), et une supplémentation IV doit être réalisée (en hospitalisation si patient hospitalisé, ou en HdJ cardio-interventionnel 8ème si patient ambulatoire, demandes spécifiques pré-remplies)."}, {"t": "p", "x": "LE BILAN ETIOLOGIQUE DE LA CARENCE MARTIALE EST TOUJOURS NECESSAIRE"}]}, {"title": "Bilan d'amylose", "blocks": [{"t": "p", "x": "Le bilan paraclinique réalisé en hospitalisation permet de poser le diagnostic positif et étiologique selon l'algorithme suivant :"}, {"t": "p", "x": "Check-list paraclinique à ne pas oublier de prescrire !!"}, {"t": "p", "x": "□ Bilan complet de gammapathie monoclonale :"}, {"t": "li", "x": "- Electrophorèse des protéines sériques (EPP) + immunofixation", "l": 0}, {"t": "li", "x": "- Electrophorèse des protéines urinaire (EPU) + immunofixation", "l": 0}, {"t": "li", "x": "- Dosage des chaînes légères libres (kappa et lambda) sériques", "l": 0}, {"t": "p", "x": "□ Test génétique TTR (dès l'entrée du patient pour ne pas oublier) pour tous les patients ++ faire signer le patient le jour de l'entrée en hospitalisation et remplir la demande (à mettre dans le classeur à étiquettes)"}, {"t": "p", "x": "□ Facteur X systématique pour les patients non anticoagulés"}, {"t": "p", "x": "Sur le plan clinique, hormis les symptômes cardiaques à rechercher chez tous les patients (dyspnée (à coter), malaise / lipothymie, syncope, palpitations, etc.), il est fondamental de rechercher les signes et symptômes extra-cardiaques :"}, {"t": "li", "x": "Macroglossie", "l": 0}, {"t": "li", "x": "Atteinte ligamentaire : Canal carpien (paresthésies des mains au réveil, signe de Tinel et Phalen), Canal lombaire étroit (troubles de la marche, douleur du rachis lombaire à l'orthostatisme), Dupuytren.", "l": 0}, {"t": "li", "x": "Atteinte digestive : troubles du transit avec alternance diarrhée / constipation, gastroparésie (blocage du bol alimentaire)", "l": 0}, {"t": "li", "x": "Atteinte neurologique : Neuropathie périphérique sensitive : paresthésies distales, manque de discrimination chaud / froid, Hypotension orthostatique : à faire réaliser systématiquement par les externes pendant l'hospitalisation pour discuter de l'arrêt des traitements anti-hypertenseurs et prescrire les bas de contention +/- Gutron", "l": 0}, {"t": "li", "x": "Atteinte cutanée : ecchymoses péri-orbitaires, fragilité cutanée (décollement cutané pour des traumatismes minimes), atteinte unguéale (évocateur d'AL)", "l": 0}, {"t": "li", "x": "Atteinte musculaire : Rupture du biceps brachial, pseudo hypertrophie des muscles deltoïdes (évocateur d'ATTRs)", "l": 0}, {"t": "li", "x": "Atteinte ORL : surdité, dysphonie", "l": 0}]}, {"title": "Transplantation cardiaque", "blocks": [{"t": "h4", "x": "Indications"}, {"t": "li", "x": "Age ≤ 60-65 ans", "l": 1}, {"t": "li", "x": "Insuffisance cardiaque terminale", "l": 1}, {"t": "li", "x": "Patient symptomatique (stade III-IV NYHA)", "l": 0}, {"t": "li", "x": "Sous traitement médical optimal (y compris resynchronisation)", "l": 0}, {"t": "li", "x": "Chirurgie alternative récusée (remplacement valvulaire, pontages, résection ventriculaire)", "l": 0}, {"t": "li", "x": "Éliminer facteur réversible", "l": 0}, {"t": "li", "x": "Le stade NHYA étant subjectif, autres éléments :", "l": 0}, {"t": "li", "x": "Plusieurs décompensations cardiaques", "l": 1}, {"t": "li", "x": "Dysfonction progressive d'organes (rein/foie)", "l": 1}, {"t": "li", "x": "Persistance élévation BNP et NTproBNP", "l": 1}, {"t": "li", "x": "Épreuve d'effort VO2 (Test maximal (QR) > 1.05) :", "l": 0}, {"t": "li", "x": "Pic VO2 ≤ 14 ml/kg/min ou Pic VO2 ≤ 12 ml/kg/min pour les patients sous BB-", "l": 1}, {"t": "li", "x": "Pic VO2 ≤ 50% du pic prédit pour les patients < 50 ans ou les femmes", "l": 1}, {"t": "li", "x": "Pente VE/VCO2 > 35", "l": 1}, {"t": "li", "x": "Autres indications", "l": 1}, {"t": "li", "x": "Arythmie ventriculaire symptomatique, récurrente, réfractaire", "l": 0}, {"t": "li", "x": "Ischémie myocardique sévère sans revascularisation", "l": 0}, {"t": "li", "x": "Retransplantation (maladie coronaire du greffon sévère)", "l": 0}, {"t": "h4", "x": "Bilan pré greffe"}, {"t": "li", "x": "Bilan biologique : Groupe sanguin, Rhésus, RAI, Phénotype HLA, anticorps anti HLA, NFS, créatinine, ionogramme sanguin, bilan hépatique complet, NT pro BNP, troponine, TP TCA, facteur V, (facteur X si amylose AL), Glycémie à jeun, HBA1c, EAL, EPPs, CRP, TSH , PSA, sérologie VIH, VHB, VHC, Syphilis, CMV, EBV, toxoplasmose, HTLV, VZV, rougeole, quantiféron", "l": 0}, {"t": "li", "x": "Cathétérisme droit : En cas de PAPs >50 mmHg & GTP ≥15mmHg ou RVP > 3 UW, faire Test de réversibilité (diurétiques, inotropes +, vasodilatateurs (NO) max pendant 48h.", "l": 0}, {"t": "li", "x": "Doppler artériels TSA et membres inférieurs", "l": 0}, {"t": "li", "x": "TDM cérébral+ sinus, TDM thoraco abdomino pelvien", "l": 0}, {"t": "li", "x": "EFR", "l": 0}, {"t": "li", "x": "FOGD, coloscopie", "l": 0}, {"t": "li", "x": "Mammographie", "l": 0}, {"t": "li", "x": "ORL/ stomatologie/ gynécologie/ psychologue ou psychiatre", "l": 0}, {"t": "li", "x": "Consultation chirurgie cardiaque/ anesthésie", "l": 0}, {"t": "h4", "x": "Contre-indications (absolues/relatives)"}, {"t": "li", "x": "Âge >70 ans", "l": 0}, {"t": "li", "x": "Infection active : HIV, hépatites, Chagas, Tuberculose…", "l": 0}, {"t": "li", "x": "Diabète mal équilibré HBA1c>7,5%", "l": 0}, {"t": "li", "x": "Artériopathie périphérique ou cérébrale sévère", "l": 0}, {"t": "li", "x": "Hypertension pulmonaire irréversible (RVP>5 UI Wood): Réévaluation après assistance ventriculaire gauche (≈ 3-6 mois)", "l": 0}, {"t": "li", "x": "Cancer actif, en cas d'antécédent de cancer, stratification du risque de récidive avec les oncologues", "l": 0}, {"t": "li", "x": "Insuffisance rénale non réversible (Cl < 30 mL/min), Envisager une double greffe coeur-rein", "l": 0}, {"t": "li", "x": "Maladie systémique impliquant plusieurs organes, amylose AL", "l": 0}, {"t": "li", "x": "Co-morbidité associée à un mauvais pronostic : cirrhose, insuffisance respiratoire...", "l": 0}, {"t": "li", "x": "IMC pré-transplantation > 35 kg/m2 (aider à la perte de poids)", "l": 0}, {"t": "li", "x": "Dénutrition", "l": 0}, {"t": "li", "x": "Alcoolisme ou addiction (tabac arrêt dans les 6 mois)", "l": 0}, {"t": "li", "x": "Situation sociale incompatible avec les soins ambulatoires", "l": 0}, {"t": "li", "x": "Non observance", "l": 0}, {"t": "h4", "x": "Suivi"}, {"t": "p", "x": "* Biopsie endomyocardique :"}, {"t": "li", "x": "8 à 10 jours après transplantation : 1ère biopsie", "l": 0}, {"t": "li", "x": "2 premiers mois : 1 biopsie / semaine", "l": 0}, {"t": "li", "x": "A partir du 3éme mois : 1/mois → 1an", "l": 0}, {"t": "li", "x": "1 biopsie / 3 mois → 2 ans", "l": 0}, {"t": "li", "x": "Ensuite, biopsies selon l'état du patient", "l": 0}, {"t": "li", "x": "Histologie :", "l": 0}, {"t": "li", "x": "Rejet Aigu cellulaire (ISHLT 2004)", "l": 0}, {"t": "li", "x": "Grade 0R : pas de rejet", "l": 1}, {"t": "li", "x": "Grade 1R rejet moyen : infiltrat interstitiel et /ou périvasculaire, avec  foyers de lésion myocytaire", "l": 1}, {"t": "li", "x": "Grade 2R rejet modéré : 2 foyers d'infiltrats avec lésions myocytaires", "l": 1}, {"t": "li", "x": "Grade 3R rejet sévère : infiltrat diffus avec lésions myocytaires multifocales +/- oedème+/- Hémorragies +/- vascularite", "l": 1}, {"t": "li", "x": "Rejet humoral (AMR : Antibody Mediated Rejection)", "l": 0}, {"t": "li", "x": "pAMR 0 : pas de rejet humoral", "l": 1}, {"t": "li", "x": "pAMR 1 (H+) : Critère histopathologique : cellules mononuclées intra vasculaires activées", "l": 1}, {"t": "li", "x": "pAMR 1 (I+) : Critère immunopathologique : marquage C4d ou C3d capillaire, CD68+ intra vasculaire", "l": 1}, {"t": "li", "x": "pAMR 2 : Critères histo et immunopathologiques", "l": 1}, {"t": "li", "x": "pAMR 3 : Rejet humoral sévère", "l": 1}, {"t": "li", "x": "*Traitement rejet", "l": 0}, {"t": "li", "x": "Rejet Aigu cellulaire :", "l": 0}, {"t": "li", "x": "1R : Pas de diminution des corticoïdes si asymptomatique, Ajuster immunosuppresseur", "l": 1}, {"t": "li", "x": "2R : Corticoïdes IV fortes doses : solumédrol 500mg (dans 100 cc de G5 en 1 heure en intra veineux) 1 injection par jour pendant 3 jours, Ajuster immunosuppresseur", "l": 1}, {"t": "li", "x": "3R ou si <3 mais avec retentissement hémodynamique : Corticoïdes IV fortes doses : solumédrol 1000mg le premier jour puis 500mg 1 injection par jour les 4 jours suivant, SAL recommandé en cas de défaillance hémodynamique, Ajuster immunosuppresseur,", "l": 1}, {"t": "li", "x": "Ne pas oublier de reprendre la prophylaxie par bactrim si stoppé", "l": 1}, {"t": "li", "x": "Contrôle de la biopsie à 10 jours à 3 semaines", "l": 1}, {"t": "li", "x": "Rejet humoral :", "l": 0}, {"t": "li", "x": "pAMR1: pas de consensus, ajustement thérapeutique", "l": 1}, {"t": "li", "x": "pAMR2 : Corticoïdes IV fortes doses : solumédrol 500 mg 1 injection par jour pendant 3 à 5 jours, Échanges plasmatiques tous les jours X5, Faire contrôle des DSA après le dernier échange et avant l'injection d'immunoglobulines, Cure d'immunoglobulines IV 2g/kg à administrer en 1, 2, 3 ou 4 jours selon la fonction rénale, Rituximab 1000 mg IV, Ajuster immunosuppresseur", "l": 1}, {"t": "li", "x": "pAMR3 : Corticoïdes IV fortes doses : solumédrol 1000mg le premier jour puis 500mg 1 injection par jour les 4 jours suivant, Échanges plasmatiques tous les jours X8, Faire contrôle des DSA après le dernier échange et avant l'injection d'immunoglobulines, Cure d'immunoglobulines IV 2g/kg à administrer en 1, 2, 3 ou 4 jours selon la fonction rénale, SAL recommandé en cas de défaillance hémodynamique, Rituximab 1000 mg IV, Discuter Bortezomib 1,3mg/m2 X4 , dartumumab, eculizumab, Ajuster immunosuppresseur", "l": 1}, {"t": "li", "x": "REJET GRAVE :", "l": 0}, {"t": "li", "x": "= Rejet avec des signes hémodynamiques (clinique ou échographique), insuffisance cardiaque récente gauche et/ou droite, index cardiaque inférieur à 2 l/mn/m², ou baisse de 25 % de la fraction d'éjection échographique.", "l": 1}, {"t": "li", "x": "Suspicion de rejet grave : mise en route du traitement sans faire ou sans attendre les résultats de la biopsie, Prévenir l'ensemble de l'équipe de transplantation+++", "l": 1}, {"t": "li", "x": "Signes échographiques du rejet : Epanchement péricardique récent ou majoré, Epaississement et aspect dense des parois du ventricule droit et du ventricule gauche, Anomalie du remplissage ventriculaire gauche de type restrictif avec une grande onde E, une petite onde A, Un rapport E/A supérieur à 2, Des temps de décélération courts (< 150 ms), La fonction systolique peut être normale. Lorsqu'elle est altérée, il s'agit toujours d'un rejet hémodynamique cellulaire ou vasculaire grave.", "l": 1}, {"t": "li", "x": "Traitement (cf pAMR3)", "l": 1}, {"t": "li", "x": "*maladie coronaires du greffon", "l": 0}, {"t": "li", "x": "Coronarographie : coronarographie à 3 mois, puis à 1 an, 2 ans, puis surveillance en fonction atteinte (tous les ans ou 2 ans)", "l": 0}, {"t": "li", "x": "Traitement statines et aspirine ( prévention), inhibiteur calcique bradycardisant ( attention interaction immunosuppresseur, potentialise les effets des anticalcineurines)", "l": 0}, {"t": "li", "x": "* CMV :", "l": 0}, {"t": "p", "x": "Définitions :"}, {"t": "p", "x": "- Primo-infection = R -/D+ ou R-/D- avec séroconversion"}, {"t": "p", "x": "- Infection secondaire : R+"}, {"t": "p", "x": "· Surinfection = R+/D+"}, {"t": "p", "x": "· Réactivation = R +/D -"}, {"t": "p", "x": "-Infection à CMV= asymptomatique, définition virologique : ADNémie positive > 3.5 log UI/ml"}, {"t": "p", "x": "-Maladie à CMV= symptomatique"}, {"t": "p", "x": "· Syndrome CMV : ADNémie positive et un des signes suivants : Fièvre (≥38°C à 2 occasions >24h) et 1 ou plus des signes suivants : malaise, leucopénie, lymphocytose atypique, thrombocytopénie, élévation des enzymes hépatiques"}, {"t": "p", "x": ".Maladie invasive : atteinte tissulaire, inclusion de CMV à la biopsie"}, {"t": "p", "x": "Traitement : Dans tous les cas considérer la minimisation de l'immunosuppression telle que la diminution du MMF de 25 à 50%"}, {"t": "p", "x": "Valganciclovir (Rovalcyte®) 450mg 2 cp toutes les 12heures à prendre pendant les repas ou si mauvaise absorption Ganciclovir (Cymévan®) 5mg/Kg par voie intra veineuse toutes les 12h ( à adapter à la fonction rénale)"}, {"t": "p", "x": "Jusqu'à négativation CMV"}, {"t": "p", "x": "Conduite à tenir en cas de neutropénie définie par < 500 neutrophiles/mm3 : Diminuer dose de MMF, Recalculer dose valganciclovir en ciblant dose la plus basse pour le DFG, Doser la résiduelle de valganciclovir/ganciclovir, Arrêter les autres médicaments neutropéniants, Corriger la neutropénie par ZARZIO (G-CSF, Filgrastim) à la dose de 5 mg/kg/j en SC pendant 3 jours avec contrôle de la NFS au 4° jour."}]}, {"title": "Check-list du greffé en UICA", "blocks": [{"t": "p", "x": "Motif d'hospitalisation :"}, {"t": "li", "x": "Le plus fréquent : biopsie myocardique dans les 2 ans post-transplantation", "l": 0}, {"t": "li", "x": "Après 2 ans post-transplantation : coronarographie tous les 1 à 2 ans", "l": 0}, {"t": "li", "x": "Evènement intercurrent : rejet, fièvre, diarrhée, insuffisance cardiaque, etc.", "l": 0}, {"t": "h4", "x": "HOSPITALISATION POUR BIOPSIE MYOCARDIQUE"}, {"t": "p", "x": "Programmation faite d'une fois sur l'autre par la coordination des greffes (14157 / 36113)"}, {"t": "p", "x": "Vérifier le programme : biopsie seule +/- IRM cardiaque, ETT et/ou coronarographie"}, {"t": "p", "x": "A l'entrée (J0)"}, {"t": "p", "x": "Au lit du patient :"}, {"t": "li", "x": "Vérifier l'absence d'évènement intercurrent, notamment infectieux, et la bonne observance du traitement immunosuppresseur", "l": 0}, {"t": "li", "x": "Vérifier ++ le traitement immunosuppresseur : habituellement trithérapie ;", "l": 0}, {"t": "li", "x": "Si ce n'est pas le cas, se renseigner sur la raison", "l": 0}, {"t": "li", "x": "Bien vérifier les posologies avec le patient (fréquents changements en externe entre 2 hospitalisations selon les taux résiduels récupérés a posteriori)", "l": 0}, {"t": "li", "x": "1/ Corticothérapie : Cortancyl (prednisone) débuté à 1 mg/kg/j, décroissance progressive de 5mg/j tous les 3 jours jusqu'au palier de 30 mg/j ; puis décroissance de 5 mg/j à chaque bilan mensuel, en l'absence de rejet sur la biopsie myocardique", "l": 1}, {"t": "li", "x": "2/ Inhibiteur de calcineurine : Tacrolimus (Prograf) ou plus rarement Ciclosporine (Neoral)", "l": 1}, {"t": "li", "x": "3/ Anti-prolifératif : Mycophénolate mofetil (Cellcept)", "l": 1}, {"t": "li", "x": "+/- 4/ Inhibiteur de mTOR : Everolimus (Certican), donné à visée d'épargne des anti-calcineurines ou en cas de maladie coronaire du greffon, en remplacement des anti-calcineurine ou en quadrithérapie", "l": 1}, {"t": "li", "x": "Vérifier les prophylaxies anti-infectieuses : systématiques pendant 6 mois à 1 an post-greffe ; parfois plus pour les amyloses AL sous/après chimiothérapie (à voir avec les hématologues)", "l": 0}, {"t": "li", "x": "Si ce n'est pas le cas, se renseigner", "l": 0}, {"t": "li", "x": "Vérifier que les posologies sont adaptées à la fonction
