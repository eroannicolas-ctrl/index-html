 "x": "Contrôle du péricarde", "l": 0}, {"t": "p", "x": "Le lendemain de la biopsie (J2, jour de la sortie) :"}, {"t": "li", "x": "Récupérer le résiduel de tacrolimus (ou ciclosporine) +/- évérolimus et le transmettre au senior. Objectifs usuels :", "l": 0}, {"t": "table", "rows": [["", "R Tacrolimus", "AUC Cellcept", "R Evérolimus", "R Ciclosporine", "R Ciclosporine (associée à Evéro)"], ["M0-M1", "10-15", "30-50", "3-8", "250-350", "250-350"], ["M2", "10-15", "30-50", "3-8", "200-300", "150-250"], ["M3-M4", "8-12", "30-50", "3-8", "200-300", "100-200"], ["M4-M6", "8-12", "30-50", "3-8", "150-250", "75-150"], ["M6-M12", "5-10", "30-50", "3-8", "100-200", "50-100"], ["> M12", "5-10", "30-50", "3-8", "100-150", "50-100"], ["Augmentation des doses", "Paliers de 0.5 mg à chaque prise", "Paliers de 250 mg à chaque prise", "Paliers de 0.25 mg à chaque prise", "Paliers de 25 mg à chaque prise", "Paliers de 25 mg à chaque prise"]]}, {"t": "li", "x": "Vérifier que les prélèvements apparaissent en attente sur Orbis, et les inscrire dans le CRH provisoire : ils seront récupérés par le médecin senior qui valide le CRH - le patient pourra alors être rappelé pour adaptation thérapeutique", "l": 0}, {"t": "li", "x": "AUC mycophénolate mofetil (et non taux résiduel simple)", "l": 1}, {"t": "li", "x": "PCR CMV (et non sérologie) ; indication de traitement si ADNémie > 3.5 log (=5000U/ml) ;", "l": 1}, {"t": "li", "x": "+/- Phénotypage lymphocytaire (taux CD4)", "l": 1}, {"t": "li", "x": "ECBU", "l": 1}, {"t": "li", "x": "Rédaction de l'ordonnance de sortie", "l": 0}, {"t": "li", "x": "Vérifier les posologies d'immuno-suppresseur", "l": 1}, {"t": "li", "x": "Diminution de Cortancyl de 5mg/j (jusqu'à la dose minimale de 5 mg/j) si absence de rejet", "l": 1}, {"t": "h4", "x": "HOSPITALISATION POUR CORONAROGRAPHIE"}, {"t": "p", "x": "Généralement programmée à 1-3 mois, 1 an, 2 ans puis selon lésions."}, {"t": "p", "x": "Vise à dépister la maladie coronaire du greffon, souvent asymptomatique (dénervation cardiaque)."}, {"t": "p", "x": "Les principes de gestion des immuno-suppresseurs sont identiques à décrit précédemment."}, {"t": "li", "x": "Vérifier l'absence d'évènement intercurrent, notamment infectieux, et la bonne observance du traitement immunosuppresseur", "l": 0}, {"t": "li", "x": "Vérifier ++ le traitement immunosuppresseur idem hospitalisation < 2 ans", "l": 0}, {"t": "li", "x": "Vérifier prescription d'aspirine + statine (Simvastatine, Pravastatine ou Atorvastatine) en prévention de la maladie coronaire du greffon", "l": 0}, {"t": "li", "x": "Vérifier la fonction rénale avant la descente du patient en coronarographie (IRC fréquente à distance de la greffe)", "l": 0}, {"t": "li", "x": "Vérifier adaptation des posologies à la fonction rénale", "l": 0}, {"t": "h4", "x": "HOSPITALISATION NON PROGRAMMEE"}, {"t": "p", "x": "Le plus souvent pour suspicion de rejet myocardique, fièvre, ou insuffisance cardiaque."}, {"t": "p", "x": "En cas de suspicion de rejet myocardique :"}, {"t": "li", "x": "Prise en charge identique aux hospitalisations programmées pour biopsie", "l": 1}, {"t": "li", "x": "Traitement du rejet aigu (bolus de Corticoïdes +/- SAL +/- échanges plasmatiques +/- Rituximab +/- Bortezomib +/- Daratumumab +/- Eculizumab) à discuter en urgence avec le Dr Guendouz en cas de dysfonction VG non connue", "l": 1}, {"t": "li", "x": "Numéro utiles aphérèse : médecin 12249, IDE 12438", "l": 1}, {"t": "p", "x": "En cas d'hospitalisation pour fièvre / infection"}, {"t": "li", "x": "considérer systématiquement la réduction de l'immunosuppression de fond", "l": 1}, {"t": "li", "x": "infection à CMV : asymptomatique, définition virologique (ADNémie > 3.5 log  soit 5000UI/ml) ≠ maladie à CMV : symptomatique (définition virologique + fièvre / malaise / leucopénie / lymphocytose atypique / thrombopénie / cytolyse hépatique / atteinte tissulaire à la biopsie)", "l": 1}, {"t": "li", "x": "En cas d'aspergillose : attention V-fend inducteur enzymatique  diminuer par 3 les doses des anti-calcineurines avec surveillance du taux résiduel quotidienne jusqu'à équilibre (à discuter systématiquement avec Dr Guendouz)", "l": 1}, {"t": "li", "x": "En cas de tuberculose : attention Rifampicine inhibiteur enzymatique  augmentation de doses des anti-calcineurines à adapter à la surveillance quotidienne du taux résiduel jusqu'à équilibre (à discuter systématiquement avec Dr Guendouz)", "l": 1}, {"t": "p", "x": "En cas d'hospitalisation pour insuffisance cardiaque :"}, {"t": "li", "x": "Toujours considérer la possibilité d'un rejet aigu, cellulaire ou humoral : vérifier taux résiduels d'immunosuppresseurs, observance des traitements, et discuter systématiquement biopsie myocardique avec Dr Guendouz", "l": 1}, {"t": "li", "x": "Toujours considérer la possibilité d'une maladie coronaire du greffon", "l": 1}]}, {"title": "SUIVI D'UN PATIENT PORTEUR D'UNE ASSISTANCE MONO VENTRICULAIRE GAUCHE : minimum vital et comment survivre en garde", "blocks": [{"t": "p", "x": "LVAD utilisé dans le service :"}, {"t": "p", "x": "Pompes à flux continu"}, {"t": "p", "x": "-2ème génération : Heartmate 2 à flux axial continu (hélice tournant à vitesse continue autour d'un axe enchâssé dans un moteur électrique)"}, {"t": "p", "x": "-3ème génération : Heartmate 3 et Heartware à flux centrifuge continu (avec lévitation magnétique du rotor pour le Heartmate 3 et lévitation hydrodynamique pour le Heartware)"}, {"t": "p", "x": "Heartmate 2   \t\t\t\t\tHeartmate 3"}, {"t": "p", "x": "Heartware"}, {"t": "p", "x": "Composante du LVAD :"}, {"t": "p", "x": "-une canule inflow au niveau du ventricule gauche"}, {"t": "p", "x": "-une canule outflow dans l'aorte"}, {"t": "p", "x": "- contrôleur externe relié par un câble percutané à la pompe et à 2 câbles d'alimentation"}, {"t": "p", "x": "- 2 types d'alimentation :"}, {"t": "p", "x": "- secteur avec câble pour des périodes sédentaires ou de sommeil"}, {"t": "p", "x": "- mobile par paire de batteries 10 à 17 heures (selon l'activité du patient et le type de pompe, 10-12 h pour le HM2 et 15-17 h pour le HM3)."}, {"t": "p", "x": "A noter une batterie de secours de 15 min à l'intérieur du contrôleur (uniquement pour le Heartmate 2 et 3)"}, {"t": "p", "x": "Interrogatoire et examen clinique :"}, {"t": "p", "x": "- Dyspnée, lipothymie, céphalées, fièvre, prise de poids, oedème, écoulement sale au niveau de l'orifice de sortie du câble percutanée, signes d'hémorragie, hémoglobinurie, symptôme d'embolie systémique"}, {"t": "p", "x": "-Fréquence cardiaque (palpation de pouls peut être absente, donc à mesurer par ECG)"}, {"t": "p", "x": "-Pression artérielle (si pas de pulsatile, recueillir PAM par brassard ou doppler, objectif PAM≤ 80 mm Hg pour réduire le risque d'accident vasculaire cérébral et minimiser la post-charge du LVAD, mais PAM optimale >65mmHg"}, {"t": "p", "x": "-Auscultation LVAD : « un bourdonnement » est anormal peut être le témoin d'un dysfonctionnement de pompe, pour le Heartmate 3 un bruit régulier toutes les 2 secondes est normal"}, {"t": "p", "x": "- signes d'insuffisance cardiaque"}, {"t": "p", "x": "- examen de l'orifice de sortie du câble percutané"}, {"t": "p", "x": "- paramètres de pompe :"}, {"t": "table", "rows": [["", "Heartmate 2", "Hearmate 3", "Heartware"], ["Vitesse de pompe, rpm", "8000-10000", "5000-6000", "2400-3200"], ["Réglage rpm", "200", "100", "20"], ["Débit (l/min) Pump flow", "4-7", "4-6", "4-6"], ["Puissance (W) PP", "5-8", "4,5-6,5", "3-7"], ["Index de pulsatilité (IP)", "5-8", "3,5-5,5", "2-4"]]}, {"t": "p", "x": "Vitesse de Pompe déterminée par le médecin"}, {"t": "p", "x": "Index de pulsatilité (IP) traduit le remplissage et contractilité du ventricule gauche"}, {"t": "p", "x": "Puissance ( Power Pump, PP) : Puissance déployée par la pompe pour générer un débit"}, {"t": "p", "x": "-Alarmes :"}, {"t": "p", "x": "Augmentation de la puissance : thrombose de pompe"}, {"t": "p", "x": "Diminution du débit <3l : PA élevée, saignement, déshydratation"}, {"t": "p", "x": "Diminution de l'IP : PA élevée, saignement, déshydratation, si Heartmate 2 peut être le signe d'une thrombose"}, {"t": "p", "x": "Augmentation IP : Bris du câble percutané, amélioration de la fonction cardiaque, exercices"}, {"t": "p", "x": "Biologie :"}, {"t": "p", "x": "Paramètre hémolyse :"}, {"t": "p", "x": "LDH : anormale si 2,5N ou >600 UI"}, {"t": "p", "x": "Hémoglobinémie (hémoglobine plasmatique) : : <10umol/l"}, {"t": "p", "x": "Haptoglobine diminuée"}, {"t": "p", "x": "Bilirubine totale augmentée"}, {"t": "p", "x": "Hémoglobine : recherche anémie"}, {"t": "p", "x": "INR : objectif entre 2 et 3"}, {"t": "p", "x": "CRP"}, {"t": "p", "x": "Fonction rénale hépatique"}, {"t": "p", "x": "BNP NT pro BNP"}, {"t": "p", "x": "Hémocultures si fièvre"}, {"t": "p", "x": "ETT/ETO :"}, {"t": "p", "x": "Position de la canule inflow et orientation"}, {"t": "p", "x": "Position septum (qui doit être neutre), déviation vers la droite (déchargement inappropriée, vitesse probablement trop basse ou dysfonctionnement du LVAD), déviation vers la gauche (déchargement inappropriée, vitesse probablement trop haute ou hypovolémie)"}, {"t": "p", "x": "Taille du VG, DTDVG entre 30 et 55mm"}, {"t": "p", "x": "FEVG, FEVD, PAPS"}, {"t": "p", "x": "Ouverture de la valve aortique (à chaque cycle peut témoigner d'un déchargement inappropriée (vitesse probablement trop basse ou dysfonctionnement du LVAD avec thrombose)"}, {"t": "p", "x": "IM sévère déchargement inappropriée (vitesse probablement trop basse ou dysfonctionnement du LVAD)"}, {"t": "p", "x": "Vitesse dans la canule inflow >2m/s  suspicion de thrombose"}, {"t": "p", "x": "Vitesse dans la canule outflow >2,5m/s suspicion de thrombose"}, {"t": "p", "x": "Insuffisance aortique : difficile à évaluer, mais nouveaux critères sur le flux pulsé de la canule outflow, S/D<5 ou accélération diastolique >49cm/s est le signe indirect d'une fuite importante à sévère (cf figures)"}, {"t": "p", "x": "TDM :"}, {"t": "p", "x": "Aide au diagnostic de thrombose de pompe, d'infection, rechercher également un abcès avec des coupes sur l'abdomen"}, {"t": "p", "x": "PET TDM : si suspicion d'infection de matériel"}, {"t": "p", "x": "SUSPISCION DE THROMBOSE DE POMPE : ( prévenir l'équipe de transplantation/assistance++)"}, {"t": "p", "x": "Signes en faveur d'emboles systémiques, Signes d'insuffisance cardiaque"}, {"t": "p", "x": "Alarmes+++ :"}, {"t": "p", "x": "Puissance (power pump) augmentée"}, {"t": "p", "x": "Diminution de l'index de pulsatilité (valable pour le heartmate 2)"}, {"t": "p", "x": "Diminution de la durée des batteries"}, {"t": "p", "x": "Biologiquement : Signes d'hémolyse :"}, {"t": "p", "x": "LDH : anormale si 2,5N ou >600 UI"}, {"t": "p", "x": "Hémoglobinémie (hémoglobine plasmatique) : : <10umol/l"}, {"t": "p", "x": "Haptoglobine diminuée"}, {"t": "p", "x": "Bilirubine totale augmentée"}, {"t": "p", "x": "Histoire d'INR mal équilibré"}, {"t": "p", "x": "ETT : déviation du SIV vers la droite, VG dilaté, Valve aortique qui s'ouvre plus fréquemment, Insuffisance mitrale sévère"}, {"t": "p", "x": "RAMP TEST à l'ETT : augmentation de la vitesse de pompe : si le VG ne diminue pas de taille et si la valve aortique ne se ferme pas en faveur d'une thrombose de p"}]}]}, {"title": "Rythmologie", "fiches": [{"title": "Conduite à tenir devant une syncope", "blocks": [{"t": "h4", "x": "Évaluation initiale"}, {"t": "p", "x": "Syncope = perte de connaissance transitoire secondaire à une hypoperfusion cérébrale. Début brutal, courte durée et retour à la conscience spontané et total."}, {"t": "p", "x": "Aux urgences :"}, {"t": "li", "x": "Interrogatoire ++++ pour éliminer les PdC non syncopales (épilepsie, psy…), ATCDs familiaux de maladie CV ou mort subite ou porteur de DAI", "l": 0}, {"t": "li", "x": "Examen clinique (recherche souffle cardiaque et carotide), TA debout-couché, massage sino-carotidien, examen neurologique, Glycémie, ECG +++ +/- ETT si cardiopathie connue +/- biologie (troponine/D-dimères en fonction de la présentation).", "l": 0}, {"t": "li", "x": "Eliminer une EP, dissection aortique, hypertension pulmonaire", "l": 0}, {"t": "p", "x": "Distinction entre syncope réflexe / hypotension orthostatique et syncope cardiaque :"}, {"t": "h4", "x": "Stratification du risque des syncopes aux urgences"}, {"t": "table", "rows": [["", "Faible risque\n(= BILAN AMBULATOIRE)", "Haut risque\n(= HOSPITALISATION)"], ["Interrogatoire", "Présence de prodromes\nAprès stimulus sensoriel (douleur, mauvaise odeur, bruit fort, chaleur)\nAprès station debout prolongée\nPendant repas ou en post-prandial\nPendant miction, défécation, toux", "DT, dyspnée\nSyncope à l'effort\nPalpitations puis PdC\nATCDs familiaux de MS\nSyncope en position assise"], ["ATCDs", "Nb ATCDs de malaise identiques\nPas de cardiopathie connue", "Cardiopathie sous-jacente"], ["Examen clinique", "Normal", "PAS < 90mmHg\nFC < 40/min\nSouffle cardiaque"], ["ECG", "Normal", "Anormal ou modifié et notamment troubles de conduction ++"]]}, {"t": "h4", "x": "Explorations de routine"}, {"t": "li", "x": "Monitoring ECG (unité observationnelle, ambulatoire)", "l": 0}, {"t": "li", "x": "Scope/télémétrie si haut risque (IC)", "l": 1}, {"t": "li", "x": "Holter-ECG /24h si symptômes > 1/semaine  (IIaB)", "l": 1}, {"t": "li", "x": "Holter longue durée (spider flash) si symptômes > 1/mois (IIaB)", "l": 1}, {"t": "li", "x": "Holter implantable (Reveal) si récidive probable durant la durée de vie de la batterie (IA)", "l": 1}, {"t": "p", "x": "Critères diagnostiques de syncope d'origine cardiaque :"}, {"t": "li", "x": "survenue concomitante d'une arythmie et d'une syncope (Classe I, B)", "l": 0}, {"t": "li", "x": "en l'absence de syncope, survenue d'un BAV de haut degré, d'une pause > 3 secondes, d'une arythmie (TV, TSV) rapide et prolongée (Classe IIa, C)", "l": 0}, {"t": "li", "x": "Tilt-Test (Classe IIaB)", "l": 0}, {"t": "li", "x": "Hypotension orthostatique (OH) : baisse de 20 mmHg de la PAS ou 10 mmHg de la PAD ou PAS < 90 mmHg avec reproduction des symptômes", "l": 1}, {"t": "li", "x": "Syndrome de tachycardie posturales (PoTS) : augmentation de 30 points de la FC à l'orthostatisme ou FC > 130/min sans hypotension orthostatique avec reproduction des symptômes.", "l": 1}, {"t": "li", "x": "Echographie cardiaque", "l": 0}, {"t": "li", "x": "De repos : recherche de cardiopathie structurelle", "l": 1}, {"t": "li", "x": "D'effort : suspicion d'obstacle, de TdR à l'effort", "l": 1}, {"t": "li", "x": "Exploration électrophysiologique : Cette exploration N4est indiquée qu'après l'évaluation non-invasive, si celle-ci n'a pas conclu à un diagnostic, dans le cas des :", "l": 0}, {"t": "li", "x": "Syncopes sur cardiopathie ischémique (TV monomorphe ?) (IB)", "l": 1}, {"t": "li", "x": "Blocs bifasciculaires à la recherche d'un bloc infra-hissien ou d'un intervalle HV > 70 ms. Si HV < 70 ms, il est recommandé d'implanter un Reval (IIaB)", "l": 1}, {"t": "p", "x": "L'EEP est peu utile en cas de :"}, {"t": "li", "x": "syncopes avec bradycardie sinusale asymptomatique, à la recherche d'un temps de retour du rythme sinusal allongé, qui, s'il est normal n'élimine pas le diagnostic de dysfonction sinusale (IIbB)", "l": 1}, {"t": "li", "x": "tachycardies paroxystiques supraventriculaires (TSV).", "l": 1}, {"t": "li", "x": "Stimulation ventriculaire programmée : syncope précédée de palpitations pour rechercher une TV (IIbC)", "l": 0}, {"t": "li", "x": "Coronarographie à discuter si argument d'ischémie", "l": 0}, {"t": "li", "x": "ECG d'effort pour toute syncope à l'effort (IC)", "l": 0}, {"t": "h4", "x": "Traitements"}, {"t": "p", "x": "Syncope réflexe ou orthostatique"}, {"t": "p", "x": "Education et réassurance du patient"}, {"t": "p", "x": "Si HO : réadapter le ttt anti-HTA, ajouter midodrine ou fludrocortisone"}, {"t": "p", "x": "Dans les formes à prédominance cardio-inhibitrice, après 40 ans, il peut être indiqué d'implanter un stimulateur cardiaque quand une asystolie (symptomatique > 3 sec ou asymptomatique > 6 sec) est documentée, soit spontanément lors d'un massage du sinus carotidien (Classe IIa), soit lors d'un tilt-test (Classe IIb). Une syncope sans asystolie documentée ne doit pas conduire à une implantation de stimulateur cardiaque."}, {"t": "p", "x": "Syncope cardiaque"}, {"t": "p", "x": "1/ Troubles de la conduction intrinsèque"}, {"t": "p", "x": "PM DIRECT SI : BAV III, BAV II Mobitz II, FC<30/min, pause > 3 secondes, rythme jonctionnel, bloc tri fasciculaire et âge > 80a ns, BBG+âge >80ans, bloc alternant, BBD+HBPG"}, {"t": "p", "x": "Syncope avec bloc bi fasciculaire : EEP doit être réalisée et PM si HV >70 ms ou bloc infra-hissien du second ou 3ème degré après stimulation atriale à fréquence croissante. Le cas échéant, implantation d'un Reveal"}, {"t": "p", "x": "Possibilité d'implantation empirique d'un stimulateur chez la personne âgée, à risque traumatique, avec syncope et bloc bifasciculaire sans documentation"}, {"t": "table", "rows": [["CAUSE", "Arrêt de travail PARTICULIERS", "Arrêt de travail\nPROFESSIONNELS"], ["Arythmie supraV", "Après traitement", "Après traitement"], ["Après implantation PM", "1 semaine", "Jusqu'à vérification du PM"], ["TDR traité par ablation", "Après traitement", "Après contrôle efficacité"], ["Vagale modérée", "Aucun", "Aucun"], ["Vagale récurrente ou\nsévère (pdt geste à risque)", "Après contrôle des\nsymptômes", "CI jusqu'à vérification de\nl'efficacité du traitement"], ["Syncope inexpliquée", "Aucun", "Jusqu'à diagnostic et\ntraitement"]]}, {"t": "p", "x": "2/ Les arythmies"}, {"t": "p", "x": "Schématiquement, les arythmies responsables de syncopes sont plus fréquemment ventriculaires et sont une indication de classe I à l'ablation. Certaines arythmies supra-ventriculaires sont également pourvoyeuses de syncopes, comme les tachycardies jonctionnelles, qui répondent également bien à l'ablation. En cas d'échec ou de refus du patient, le traitement médical est recommandé (Classe IIa)."}]}, {"title": "Pose d'une sonde de stimulation cardiaque temporaire", "blocks": [{"t": "p", "x": "Procédure réalisée en garde par le coronarographiste d'astreinte"}, {"t": "p", "x": "TECHNIQUE"}, {"t": "li", "x": "Asepsie au point de ponction, ponction veineuse sous AL, mise en place d'un désilet selon la technique de Seldinger. Si voie jugulaire : ponction sous échographie.", "l": 0}, {"t": "li", "x": "Montée prudente de la SEES sous contrôle scopique jusqu'à atteindre l'apex du VD.", "l": 0}, {"t": "li", "x": "Eviter d'être en contrainte pariétale (ESV nombreuses et anarchiques).", "l": 0}, {"t": "li", "x": "Connexion au stimulateur externe (Proximal = Plus + / distal = moins -) puis programmer en VVI à la FC désirée et vérifier que la stimulation capture le ventricule +++ (c-à-d que le spike entraîne un QRS large de type retard gauche)", "l": 0}, {"t": "li", "x": "Mesurer le seuil de stimulation (diminuer progressivement le courant de sortie jusqu'à perte de capture ventriculaire), ne pas hésiter à régler au maximum (5 à 10 V)", "l": 0}, {"t": "li", "x": "Fixer solidement au niveau du point de ponction.", "l": 0}, {"t": "li", "x": "Associer une anticoagulation faible dose par HNF 10000 UI/24h, faire une radiographie de thorax de contrôle.", "l": 0}, {"t": "li", "x": "Complications : de la ponction, déplacement de sonde, thrombus de contact, EP, infection, perforation myocardique, tamponnade notamment au retrait de la SEES.", "l": 0}, {"t": "p", "x": "INDICATIONS"}, {"t": "li", "x": "Toute bradycardie mal tolérée (collapsus, syncope) et ne répondant pas à l'isoprénaline", "l": 0}, {"t": "li", "x": "Syncope sur BAV paroxystique (bloc tronculaire possible)", "l": 0}, {"t": "li", "x": "TV incessante démarrant sur des ESV ou avec allongement du QT (permet de coiffer l'ESV en stimulant à une fréquence élevée)", "l": 0}]}, {"title": "Prise en charge d'une tachycardie en urgence", "blocks": [{"t": "p", "x": "EVALUER LA TOLERANCE et faire le DIAGNOSTIC +++"}, {"t": "p", "x": "L'URGENCE DE l'ARRÊT NE DEPEND QUE DE LA TOLERANCE HEMODYNAMIQUE (sauf FA sur WPW)"}, {"t": "p", "x": "Si la tolérance est bonne, faire des manoeuvres vagales ou de la Striadyne® ou Krenosin ®."}, {"t": "p", "x": "Tachycardie à QRS fins"}, {"t": "p", "x": "Tachycardie sinusale : c'est un symptôme, rechercher la cause ++"}, {"t": "p", "x": "Tachycardies atriales :"}, {"t": "p", "x": "Mise en évidence de l'activité atriale par les manoeuvres ou l'ADP"}, {"t": "p", "x": "Ralentir la FC (amiodarone, diltiazem ou vérapamil, bêtabloqueurs, digoxine)"}, {"t": "p", "x": "Fibrillation atriale, flutter et TSA :"}, {"t": "p", "x": "Mise en évidence de l'activité atriale par les manoeuvres ou ADP"}, {"t": "p", "x": "Choc sous héparine après ETO si urgence vitale"}, {"t": "p", "x": "Si le patient n'est pas anticoagulé, on ralentit, on anticoagule et on attend 3 semaines avant de régulariser par choc sous amiodarone en imprégnation."}, {"t": "p", "x": "Si FA récente (moins de 24 heures)  Flécaine PO 300 mg si sujet jeune et coeur sain ou amiodarone PO (30 mg/kg)"}, {"t": "p", "x": "FA sur WPW seule urgence à régulariser : flécaïne ou amiodarone IV, ou CEE si mauvaise tolérance. JAMAIS DE BETA-BLOQUANTS ou de digoxine."}, {"t": "p", "x": "Tachycardies jonctionnelles :"}, {"t": "p", "x": "Interruption (manoeuvre vagale, adénosine, diltiazem ou vérapamil, bêtabloqueur IV), et si elle n'est pas incessante, pas d'hospitalisation !"}, {"t": "p", "x": "Consultation rythmologie au décours pour discussion d'ablation"}, {"t": "p", "x": "Généralement, arrêt par les manoeuvres ou ADP"}, {"t": "p", "x": "Quelques signes pour différentier TV et TSV (en dehors de la prise d'anti-arythmique de classe I)"}]}, {"title": "Prise en charge de l'orage rythmique", "blocks": [{"t": "p", "x": "Définition : Survenue d'au moins 3 épisodes distincts d'arythmie ventriculaire soutenue (tachycardie ventriculaire ou fibrillation ventriculaire) en 24 heures ou par la survenue de TV incessantes sur une période de 12 heures. Chez les patients appareillés d'un défibrillateur, il se définit par la survenue d'au moins 3 thérapies appropriées (stimulation antitachycardique ou chocs) délivrées par le DAI en 24 heures."}, {"t": "p", "x": "A faire en 1ère intention :"}, {"t": "p", "x": "Bilan cardiologique simple : ECG, ETT, interroger le PM/DAI (+/- reprogrammer),"}, {"t": "p", "x": "Aimant si choc inapproprié d'un DAI ou patient conscient (l'aiment inhibe de façon réversible les thérapies du DAI (choc et stimulation rapide) si appliqué sur la peau en regard du boitier)"}, {"t": "p", "x": "Avis rythmologique"}, {"t": "p", "x": "Défibrillateur dans la chambre"}, {"t": "p", "x": "Anxiolytique : Atarax IVL"}, {"t": "p", "x": "Anti-arythmique IVSE : Amiodarone IVSE avec dose de charge de 300 mg/30'"}, {"t": "p", "x": "Contrôle des facteurs métaboliques (objectif K+ entre 4,5 et 5 mmol/l) et fièvre (objectif T°<38)"}, {"t": "p", "x": "Arrêt ou baisse des médicaments pro-arythmogènes si possible (Dobutamine +++)"}, {"t": "p", "x": "Eliminer la cardiopathie ischémique (discuter la coronarographie)"}, {"t": "p", "x": "IOT et sédation profonde si trouble de conscience et si trouble du rythme récidivant sous anti-arythmique, sédation par Propofol (si TV consciente mal tolérée sur le plan hémodynamique, cardioversion électrique après sédation+++)"}, {"t": "p", "x": "Posologies des anti-arythmiques (à vérifier sur le Vidal et à discuter avec les rythmologues pour les cas complexes) :"}, {"t": "p", "x": "Amiodarone (Cordarone) : 2 ampoules sur 30 min (+ 3 g de MgSO²-) puis IVSE (max 1200 mg soit 8 ampoules/24h) + charge PO 6 cp de 200 mg/j pdt 5 jours"}, {"t": "p", "x": "Lidocaïne (Xylocard, vérifier la concentration : 5%) : bolus de 1 à 1,5 mg/kg IVL/5' puis perfusion de 20 µg/kg/min IVSE (2-3g/24h max en pratique) avec relais possible par Lidocaïne PO (Mexiletine 1/2 à 1 cp x2/j). 2e intention après la Cordarone en cas de cardiopathie ischémique"}, {"t": "p", "x": "Béta-bloquant IV :"}, {"t": "p", "x": "Esmolol (Brevibloc) +++ en 1er car ½ d'action courte : bolus de 300-500 µg/kg iv sur 1 min puis IVSE de 25-50 µg/kg/min à 200 µg/kg/min en titration"}, {"t": "p", "x": "Propranolol : bolus 0,15 mg/kg/IVL sur 10 min (max 10 mg)"}, {"t": "p", "x": "Inhibiteur Calcique bradycardisant"}, {"t": "p", "x": "Etiologies et facteurs favorisants à rechercher systématiquement :"}, {"t": "p", "x": "Recherche ischémie (discuter de l'indication d'une coronarographie avec l'équipe de cardiologie)."}, {"t": "p", "x": "Recherche d'un trouble métabolique/endocrinien favorisant : magnésium, potassium, TSH, hyperthermie."}, {"t": "p", "x": "Si présence d'un PM/DAI  connaître la marque pour interroger sa mémoire +/- reprogrammer (appel cardio/rythmo)."}, {"t": "p", "x": "Rechercher et traiter une éventuelle infection (baisser la T° en cas de fièvre)."}, {"t": "p", "x": "Faire ECG, si ESV faire ECG 12 dérivation pour la documenter."}, {"t": "p", "x": "Faire une ETT/ETO pour rechercher une cardiopathie (ischémie, atteinte du VD, CM…)"}, {"t": "p", "x": "Traitement spécifique pour indication rare (à discuter avec les rythmologues+++) :"}, {"t": "p", "x": "Isuprel et Quinidine pour Brugada, repolarisation précoce et FV idiopathique"}, {"t": "p", "x": "Bétabloquant et Mg pour QT long et TV catécholergique"}, {"t": "p", "x": "Si trouble du rythme ventriculaire sur bradycardie, discuter stimulation cardiaque par SEES."}, {"t": "p", "x": "Autres thérapeutiques :"}, {"t": "p", "x": "Sédation profonde avec intubation (1ère intention si récidive sous anti-arythmique)  privilégier le Propofol (Diprivan)"}, {"t": "p", "x": "Assistance circulatoire : ECMO VA ( assistance à privilégier) par voie percutanée en 1ère intention, voire chirurgicale"}, {"t": "p", "x": "Ablation endo-cavitaire par l'équipe de rythmologie (possible uniquement le jour en semaine)"}, {"t": "p", "x": "Sympathectomie chirurgie gauche ou bilatérale"}]}, {"title": "Indications du DAI et de la LifeVest®", "blocks": , "x": "ou IDM < 30 jours", "l": 1}, {"t": "li", "x": "Explantation d'un DAI pour infection", "l": 0}, {"t": "li", "x": "Candidat à une transplantation cardiaque", "l": 0}]}]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('DATA').textContent);
const CATS = DATA.categories;
const INTRO = DATA.intro;

// short labels for tabs
const LABELS = {
  "Le service": "Service",
  "Généralités et protocoles": "Généralités",
  "Maladie coronaire": "Coronaire",
  "Urgences cardio-vasculaires": "Urgences",
  "Valvulopathies et structurel": "Valvulopathies",
  "Insuffisance cardiaque et amylose": "Insuff. card.",
  "Rythmologie": "Rythmologie"
};

// Build a unified tab list: Service (intro) + categories
const TABS = [{title:"Le service", intro:true}, ...CATS];
let activeTab = 0;

const $ = s => document.querySelector(s);
const tabsInner = $('#tabsInner');
const listView = $('#listView');
const searchView = $('#searchView');
const detailView = $('#detailView');
const qInput = $('#q');

// ---------- render tabs ----------
TABS.forEach((t,i)=>{
  const b=document.createElement('button');
  b.className='tab'+(i===0?' active':'');
  b.innerHTML=`<span class="dot"></span>${LABELS[t.title]||t.title}`;
  b.onclick=()=>{ selectTab(i); };
  tabsInner.appendChild(b);
});

function selectTab(i){
  activeTab=i;
  [...tabsInner.children].forEach((el,idx)=>el.classList.toggle('active',idx===i));
  qInput.value=''; $('#clr').classList.remove('show');
  showList();
  window.scrollTo({top:0});
  // scroll active tab into view
  const el=tabsInner.children[i];
  el.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}

// ---------- escape ----------
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ---------- render a block ----------
function blockHTML(b){
  if(b.t==='h4') return b.x?`<h4>${esc(b.x)}</h4>`:'';
  if(b.t==='p') return `<p>${esc(b.x)}</p>`;
  if(b.t==='li') return `<li class="l${b.l||0}">${esc(b.x)}</li>`;
  if(b.t==='table'){
    const rows=b.rows||[];
    if(!rows.length) return '';
    let h='<div class="tbl-scroll"><table>';
    h+='<thead><tr>'+rows[0].map(c=>`<th>${esc(c)}</th>`).join('')+'</tr></thead>';
    if(rows.length>1){
      h+='<tbody>'+rows.slice(1).map(r=>'<tr>'+r.map(c=>`<td>${esc(c)}</td>`).join('')+'</tr>').join('')+'</tbody>';
    }
    h+='</table></div>';
    return h;
  }
  return '';
}
// group consecutive <li> into <ul>
function blocksHTML(blocks){
  let out='',buf=[];
  const flush=()=>{ if(buf.length){out+='<ul>'+buf.join('')+'</ul>';buf=[];} };
  blocks.forEach(b=>{
    if(b.t==='li') buf.push(blockHTML(b));
    else { flush(); out+=blockHTML(b); }
  });
  flush();
  return out;
}

// ---------- LIST VIEW ----------
function showList(){
  detailView.classList.remove('on'); detailView.style.display='none';
  searchView.style.display='none';
  listView.style.display='block';
  const t=TABS[activeTab];

  if(t.intro){ renderIntro(); return; }

  let h=`<div class="cat-head"><div class="kicker">Livret thérapeutique</div>
    <h2>${esc(t.title)}</h2><div class="count">${t.fiches.length} fiche${t.fiches.length>1?'s':''}</div></div>
    <div class="fiche-list">`;
  t.fiches.forEach((f,i)=>{
    h+=`<div class="fiche-card" onclick="openFiche(${activeTab},${i})">
      <div class="fiche-num">${i+1}</div>
      <div class="ft"><b>${esc(f.title)}</b></div>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    </div>`;
  });
  h+='</div>'+FOOT;
  listView.innerHTML=h;
}

function renderIntro(){
  let h='';
  INTRO.forEach((s,i)=>{
    h+=`<div class="cat-head" style="padding-bottom:2px"><div class="kicker">Accueil</div>
      <h2 style="font-size:22px">${esc(s.title)}</h2></div>
      <div class="intro-body">${blocksHTML(s.blocks)}</div>`;
    if(i<INTRO.length-1) h+='<div style="height:1px;background:var(--trait);margin:18px 16px"></div>';
  });
  h+=FOOT;
  listView.innerHTML=h;
}

// ---------- DETAIL VIEW ----------
function openFiche(ci,fi){
  const cat=TABS[ci], f=cat.fiches[fi];
  // sync active tab to the fiche's category
  activeTab=ci;
  [...tabsInner.children].forEach((el,idx)=>el.classList.toggle('active',idx===ci));
  tabsInner.children[ci].scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  listView.style.display='none'; searchView.style.display='none';
  const h=`<button class="back" onclick="closeFiche()">
      <svg viewBox="0 0 24 24" fill="none"><path d="m15 18-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ${esc(LABELS[cat.title]||cat.title)}</button>
    <div class="detail-head"><div class="bc">${esc(cat.title)}</div>
      <h2>${esc(f.title)}</h2><div class="rule"></div></div>
    <div class="body">${blocksHTML(f.blocks)}</div>${FOOT}`;
  detailView.innerHTML=h;
  detailView.style.display='block';
  requestAnimationFrame(()=>detailView.classList.add('on'));
  window.scrollTo({top:0});
  history.pushState({fiche:[ci,fi]},'');
}
function closeFiche(){
  detailView.classList.remove('on'); detailView.style.display='none';
  if(qInput.value.trim()) { showSearch(qInput.value); }
  else showList();
}

// ---------- SEARCH ----------
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function hl(text,q){
  const nt=norm(text),nq=norm(q); const idx=nt.indexOf(nq);
  if(idx<0) return esc(text);
  return esc(text.slice(0,idx))+'<mark>'+esc(text.slice(idx,idx+q.length))+'</mark>'+esc(text.slice(idx+q.length));
}
function ficheText(f){
  return f.blocks.map(b=>b.t==='table'?(b.rows||[]).flat().join(' '):b.x||'').join(' ');
}
function showSearch(q){
  const nq=norm(q.trim());
  detailView.classList.remove('on'); detailView.style.display='none';
  listView.style.display='none'; searchView.style.display='block';
  if(nq.length<2){ searchView.innerHTML=`<div class="sr-empty"><b>Tapez au moins 2 lettres</b>Recherchez une fiche, un médicament, un protocole…</div>`; return; }

  const hits=[];
  CATS.forEach((c,ci)=>{
    const tabIdx=ci+1; // offset: Service is tab 0
    c.fiches.forEach((f,fi)=>{
      const inTitle=norm(f.title).includes(nq);
      const full=ficheText(f);
      const inBody=norm(full).includes(nq);
      if(inTitle||inBody){
        let snip='';
        if(!inTitle){
          const nf=norm(full); const idx=nf.indexOf(nq);
          const start=Math.max(0,idx-40);
          snip='…'+full.slice(start,idx+q.length+60).trim()+'…';
        }
        hits.push({ci:tabIdx,fi,cat:c.title,f,snip,inTitle});
      }
    });
  });

  if(!hits.length){
    searchView.innerHTML=`<div class="sr-empty">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <b>Aucun résultat</b>Aucune fiche ne correspond à « ${esc(q)} ».</div>`;
    return;
  }
  // group by category
  let h=`<div style="padding:14px 6px 2px;color:var(--gris);font-size:13px">${hits.length} résultat${hits.length>1?'s':''} pour « <b>${esc(q)}</b> »</div>`;
  let lastCat='';
  hits.forEach(hit=>{
    if(hit.cat!==lastCat){ h+=`<div class="sr-cat">${esc(hit.cat)}</div>`; lastCat=hit.cat; }
    h+=`<div class="fiche-card sr-hit" onclick="openFiche(${hit.ci},${hit.fi})">
      <div class="fiche-num">${hit.fi+1}</div>
      <div class="ft"><b>${hl(hit.f.title,q)}</b>${hit.snip?`<small>${hl(hit.snip,q)}</small>`:''}</div>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    </div>`;
  });
  searchView.innerHTML=h;
}

qInput.addEventListener('input',e=>{
  const v=e.target.value;
  $('#clr').classList.toggle('show',v.length>0);
  if(v.trim()) showSearch(v); else showList();
});
$('#clr').onclick=()=>{ qInput.value=''; $('#clr').classList.remove('show'); qInput.focus(); showList(); };

// back button (browser / android)
window.addEventListener('popstate',()=>{
  if(detailView.style.display==='block') closeFiche();
});

// scroll-to-top
const toTop=$('#toTop');
window.addEventListener('scroll',()=>{ toTop.classList.toggle('show',window.scrollY>420); },{passive:true});
toTop.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

const FOOT=`<footer class="foot"><span class="redbar"></span><br>
  <b>Guide de l'interne de Cardiologie</b> — CHU Henri Mondor, AP-HP<br>
  Version Mars 2020 · Document d'aide à la prescription à visée pédagogique<br>
  Se référer aux recommandations en vigueur et au senior de garde.</footer>`;

showList();
</script>
</body>
</html>
