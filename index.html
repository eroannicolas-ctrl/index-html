compte-rendu. Chaque patient doit obligatoirement quitter le service avec un CRH provisoire imprimé en cas de retour à domicile ou complètement à jour dans Orbis en cas de transfert intra-hospitalier.", "l": 0}, {"t": "li", "x": "Contre-visite quotidienne avec le médecin sénior", "l": 0}, {"t": "li", "x": "Présentation des dossiers lors des différents staffs et en particulier au staff médico-chirurgical du jeudi", "l": 0}, {"t": "p", "x": "Au minimum un médecin sénior est présent chaque jour dans chaque unité. N'hésitez pas à le/la solliciter pour toute question concernant la prise en charge de vos patients."}, {"t": "p", "x": "Un DECT de l'interne est disponible dans chaque unité. Au moins un interne de chaque unité doit garder ce DECT sur lui afin d'être joignable en permanence par l'équipe paramédicale ou les médecins séniors."}, {"t": "p", "x": "Dossier médical du patient"}, {"t": "p", "x": "Les observations, prescriptions et demandes sont complètement informatisées et réalisées dans le logiciel Orbis. Une formation informatique est prévue au début de chaque semestre et est obligatoire pour tous les internes."}, {"t": "p", "x": "Par ailleurs, un dossier papier est créée pour chaque patient, comportant au moins une pochette bleue « ECG » et une pochette bleue « Observation » dans lesquelles sont rangés et triés tous les documents pertinents pour la prise en charge médicale."}, {"t": "p", "x": "Il est de la responsabilité de l'interne de vérifier que le dossier papier et le dossier informatisé ont bien été créés et mis à jour au cours de l'hospitalisation. Merci de bien vouloir renseigner l'ensemble des correspondants du patient."}, {"t": "p", "x": "Par courtoisie pour les collègues, l'observation, et en particulier la synthèse de l'évolution, doit être à jour lors du transfert du patient dans une autre unité du service."}, {"t": "p", "x": "Rotation des internes, absences, congés"}, {"t": "p", "x": "Afin de profiter de toutes les expertises offertes dans les différentes unités, un planning de rotation permettant à chaque interne de passer dans tous les secteurs est proposé en début de semestre."}, {"t": "p", "x": "A noter que les internes de phase socle ont leur propre rotation (3 mois USIC/ 3 mois HDJ/ETT)."}, {"t": "p", "x": "En cas de cours, formation ou d'absence prévus, les internes doivent s'arranger entre eux pour se faire remplacer et maintenir la continuité de service. Dans tous les cas, vos absences doivent être anticipées et votre senior doit être averti à l'avance afin de s'organiser."}, {"t": "p", "x": "Participation à la continuité de service"}, {"t": "p", "x": "Les internes participent à la continuité de service sous la forme de gardes (cf. ci-après) et d'astreintes de WE en aval de l'USIC et en UICA :"}, {"t": "table", "rows": [["Unité", "Samedi", "Dimanche"], ["UICA", "1 interne + 1 chef ou 2 internes", "Pas d'interne (1 chef seul)"], ["USIC", "1 interne (de garde) (+ 2 chefs)", "1 interne (de garde) (+ 1 chef)"], ["Aval de l'USIC", "1 interne ( interne de garde)", "1 interne ( interne de garde)"], ["Chirurgie cardiaque", "Pas d'interne (1 chef seul)", "Pas d'interne (1 chef seul)"]]}, {"t": "p", "x": "Les différents staffs :"}, {"t": "li", "x": "Cours / formation des internes", "l": 0}, {"t": "p", "x": "Des réunions d'enseignement sont organisées tous les Jeudis et Vendredis midi de 12h45 à 14h en salle de staff du 12ème. Le planning de formation est affiché sur la porte de la salle de staff et envoyé par mail à tout le service en début de semestre."}, {"t": "p", "x": "La présence des internes est impérative à ces réunions qui leur sont dédiées (sauf si repos de garde)."}, {"t": "li", "x": "Staff médico-chirurgical", "l": 0}, {"t": "p", "x": "Il a lieu tous les jeudis à 17h30 précises en salle de staff du 12ème étage, en présence des cardiologues et des chirurgiens. L'ensemble des dossiers médico-chirurgicaux de la semaine sont discutés pendant ce staff, c'est l'interne en charge du patient qui présente le dossier. La présence des internes est obligatoire à ce staff."}, {"t": "li", "x": "Staffs médicaux", "l": 0}, {"t": "p", "x": "En complément des réunions d'enseignement, des staffs médicaux thématiques sont également organisés, les dossiers des patients sont présentés par l'interne en charge :"}, {"t": "li", "x": "Staff Thrombose/Médecine interne : 1 mardi sur 2 à 12h45 en salle de staff du 12ème étage. Tous les dossiers de MTEV ou de myocardite des semaines passées sont présentés et discutés avec l'équipe de médecine interne, de pneumologie, de virologie, et d'hémostase.", "l": 0}, {"t": "li", "x": "Staff Endocardite : le mercredi à 14h30, en salle de staff du service de réanimation médicale (1er étage). Tous les dossiers d'endocardite ou de suspicion d'endocardite sont présentés et discutés avec l'équipe d'immunologie clinique, de bactériologie et de réanimation médicale.", "l": 0}, {"t": "li", "x": "RCP d'onco-hématologie : le mercredi à 15h pour les dossiers amyloses", "l": 0}, {"t": "li", "x": "Staff cardio-neuro : le vendredi après-midi 1 fois par mois", "l": 0}, {"t": "p", "x": "Bed Manager"}, {"t": "p", "x": "Un Bed Manager est chargé de coordonner l'admission des patients dans les différentes unités. Tous les matins, le bed manager passe dans les unités afin de faire le point avec vous sur les entrées/sorties du jour. Il doit être informé de toutes les sorties, transferts ou entrées en temps réel.  Il est joignable de 8h30 à 16h au 14266."}, {"t": "p", "x": "En cas d'appel téléphonique"}, {"t": "p", "x": "Le secret médical doit être respecté."}, {"t": "p", "x": "Il faut identifier auprès du patient l'interlocuteur familial privilégié des équipes médicales et soignantes pour la transmission des informations. Le nom de cette personne de confiance et son lien de parenté seront inscrites dans le dossier."}, {"t": "p", "x": "Demandes et programmations"}, {"t": "li", "x": "Imagerie médicale : Via Orbis.", "l": 0}, {"t": "li", "x": "Explorations fonctionnelles non-invasives : demandes papier à faxer (peuvent être imprimées via la GED sur le site intranet de l'hôpital)", "l": 0}, {"t": "li", "x": "ETT ou doppler RCH : 12667 / doppler 11ème : 12406", "l": 0}, {"t": "li", "x": "Pour programmer un Holter/MAPA : appeler Carole au 78148.", "l": 0}, {"t": "p", "x": "En cas de demande urgente, appeler directement un cardiologue et/ou un doppleriste."}, {"t": "p", "x": "Attention, en cas de demande urgente pour le jour même, le brancardage est à la charge du service demandeur +++"}, {"t": "li", "x": "Coronarographie ou rythmologie :", "l": 0}, {"t": "p", "x": "Si coronarographie pour le jour même (USIC) : à faxer le plus tôt possible au 78103"}, {"t": "p", "x": "Si coronarographie programmée : faxer au 78283 ou appeler Tania au 36801"}, {"t": "li", "x": "Rythmologie : contacter un rythmologue pour discuter de l'indication et mettre le malade au programme", "l": 0}, {"t": "li", "x": "Hospitalisation :", "l": 0}, {"t": "p", "x": "Afin d'assurer le suivi des patients hospitalisés, les RDV et examens à prévoir à la sortie seront définis avec votre senior en charge du patient. Merci de bien vouloir indiquer dans la conclusion de votre CRH les prochains RDV ainsi que de remplir les demandes de programmation d'hospitalisation et d'examens avant la sortie de les remettre au secrétariat de votre unité (ou faxées directement à la programmatrice en charge de l'unité)."}, {"t": "p", "x": "HDJ cardio-métabolique : appeler Maryline au 78149 ou faxer au 14809"}, {"t": "p", "x": "HDJ coro : appeler Tania (DECT 36801)"}, {"t": "p", "x": "HDJ 8ème (autre que coro) : Johanna Hesol (johanna.hesol@aphp.fr, DECT 14330 ou 36085)"}, {"t": "p", "x": "HDS valves/rythmo : Samia Benahmed (cardiologie.hmn@gmail.com, DECT 36582, fax 12883)"}, {"t": "p", "x": "UICA (Amyloses uniquement) : Carole Henrion (carole.henrion@aphp.fr, DECT 12816)"}, {"t": "p", "x": "UICA (tout le reste) : Johanna Hesol (johanna.hesol@aphp.fr, DECT 14330 ou 36085)"}, {"t": "p", "x": "Formation aux techniques"}, {"t": "p", "x": "Dans le cadre du DIU d'échocardiographie, chaque interne a la possibilité de se former en échocardiographie, en particulier durant la rotation en USIC et aux explorations fonctionnelles."}, {"t": "p", "x": "En ce qui concerne la rotation aux explorations fonctionnelles, un planning est prévu pour l'interne posté qui peut profiter (en binôme avec un sénior) du plateau technique non invasif (ETT, ETO, VO2, échographie d'effort, scintigraphie myocardique, doppler vasculaire) ou invasif (coronarographie, rythmologie)."}, {"t": "p", "x": "Tableaux de service"}, {"t": "p", "x": "Les internes doivent compléter à chaque fin de mois le tableau de service indiquant leur activité (gardes, continuités de service, absences, vacances). Ce tableau vous sera envoyé mensuellement par Laetitia MOLLE, assistante du Pr TEIGER. En cas de retard dans l'envoi de ce tableau, la rémunération des gardes et astreintes sera reportée au mois suivant."}, {"t": "p", "x": "Protocoles de recherche"}, {"t": "p", "x": "Plusieurs protocoles de recherche sont en cours dans le service."}, {"t": "p", "x": "La liste vous sera transmise en début de semestre, avec le résumé des critères d'inclusion. Merci de contacter l'ARC et/ou le médecin référent lorsqu'un patient peut potentiellement être inclus dans un protocole. Les critères d'inclusion seront ensuite vérifiés avec le médecin référent et/ou de l'ARC."}, {"t": "p", "x": "Travaux de recherche, thèse, mémoire"}, {"t": "p", "x": "Le service propose de nombreux travaux de recherche clinique et/ou fondamentale (mémoire, thèse, Master 2) et travaille en étroite collaboration avec l'Institut Mondor de Recherche Biomédicale."}, {"t": "p", "x": "N'hésitez pas à en parler, le plus rapidement possible, à l'un des médecins sénior pour définir une thématique de recherche qui vous intéresse."}]}, {"title": "Organisation de la garde", "blocks": [{"t": "p", "x": "Les internes participent avec les médecins séniors aux gardes d'USIC et sont à ce titre dispensés de gardes au Service d'Accueil des Urgences. Il y a chaque nuit deux médecins de garde (un sénior et un junior) ainsi que deux externes de garde. La liste de garde est dans le classeur « Protocoles » de l'USIC. Le médecin inscrit au départ sur la liste est responsable de la garde sur le plan administratif. C'est lui qui doit trouver un remplaçant en cas d'absence. Tout changement doit être noté par écrit sur la liste de garde."}, {"t": "p", "x": "Horaires de la garde"}, {"t": "p", "x": "En semaine, la garde commence à 18 heures et se termine à 8h30 le lendemain matin."}, {"t": "p", "x": "Le week-end, la garde commence à 9h et se termine à 9h le lendemain."}, {"t": "p", "x": "Activité de la garde"}, {"t": "p", "x": "Les médecins de garde sont responsables de tous les patients hospitalisés au 12ème étage, au 8ème étage (HDS) et au 11ème étage (chirurgie cardiaque)."}, {"t": "p", "x": "Tous les patients de l'USIC doivent être vus pendant la garde pour éviter les mauvaises surprises."}, {"t": "p", "x": "De même, tous les scopes doivent tous être revus avant la transmission du matin."}, {"t": "p", "x": "Astreintes opérationnelles"}, {"t": "p", "x": "Plusieurs lignes d'astreintes sont opérationnelles chaque jour, et la liste des médecins d'astreinte avec leurs numéros de téléphone est située dans le classeur bleu en USIC :"}, {"t": "li", "x": "Astreinte de cardiologie interventionnelle (1 médecin et 2 paramédicaux)", "l": 0}, {"t": "li", "x": "Astreinte d'échographie cardiaque (1 médecin)", "l": 0}, {"t": "li", "x": "Astreinte de chirurgie cardiaque (2 chirurgiens)", "l": 0}, {"t": "li", "x": "Astreinte de rythmologie (1 médecin)", "l": 0}, {"t": "p", "x": "Le senior de garde doit systématiquement être averti avant de mobiliser l'astreinte opérationnelle (sauf infarctus accepté du SAMU)."}, {"t": "p", "x": "A noter que si l'astreinte de cardiologie interventionnelle est déplacée, il faut également appeler les 2 paramédicaux d'astreinte en plus du médecin."}, {"t": "p", "x": "Rôle des externes"}, {"t": "p", "x": "Les externes accompagnent les médecins de garde et sont notamment chargés de l'examen clinique et de la rédaction de l'observation d'entrée (BMI) des patients admis. Les observations rédigées par les externes pendant la garde doivent être relues et corrigées par l'interne ou le chef afin de vérifier les informations et de faire la synthèse du dossier avec eux dans le cadre de leur formation."}, {"t": "p", "x": "Bip des urgences"}, {"t": "p", "x": "Par convention, le bip des urgences est entre les mains du sénior jusqu'à ce que les choses se soient « calmées ». Après, le bip est remis à l'interne de garde pour la fin de la garde."}, {"t": "p", "x": "Tous les avis demandés aux urgences doivent être vus cliniquement et un mot d'avis doit être rédigé dans le dossier Urqual. Il ne faut pas hésiter à appeler le sénior de garde pour tout avis, en particulier avant de déclencher l'une des astreintes opérationnelles. De même, le sénior de garde doit être prévenu pour tout malade que vous souhaitez faire sortir des urgences."}, {"t": "p", "x": "Courtoisie"}, {"t": "p", "x": "Les gardes sont parfois difficiles compte tenu de l'importance de la charge de travail. La communication peut être parfois complexe avec certains acteurs. Néanmoins, la courtoisie doit être de rigueur avec tous les interlocuteurs, notamment le personnel du SAMU, des urgences, les correspondants, et le personnel paramédical."}, {"t": "p", "x": "Transmission"}, {"t": "p", "x": "La transmission est assurée par l'équipe de garde au staff du matin en USIC (8h30 en semaine, 9h le WE). Toutes les échographies étant relues lors de ce staff, merci de les transférer sur le réseau en fin de garde. L'interne et le senior de garde présentent les entrées. Il est souhaitable que chaque externe de garde présente une entrée."}, {"t": "p", "x": "Les transmissions écrites de l'USIC et de l'aval sont disponibles sur un Google Drive à l'adresse lestransusic@gmail.com, elles doivent être mises à jour (avec les entrées de la garde) et imprimées par l'interne de garde avant le staff."}, {"t": "p", "x": "Repos de garde"}, {"t": "p", "x": "Le repos de garde total est obligatoire pour tous les internes."}, {"t": "p", "x": "Aucune activité clinique ne doit être effectuée en lendemain de garde."}, {"t": "p", "x": "Aucune exception n'est possible à cette règle."}, {"t": "p", "x": "Rémunération de la garde"}, {"t": "p", "x": "Sous réserve que les internes répondent aux conditions fixées par l'administration (52 gardes de réanimation ou 1 semestre dans une unité de soins intensifs ou de réanimation + 25 gardes), la rémunération est celle d'une garde de médecin sénior. Dans le cas contraire, la rémunération est celle d'une garde junior."}]}, {"title": "Admissions en USIC (de jour ou de nuit)", "blocks": [{"t": "p", "x": "Profil des patients admis en USIC"}, {"t": "p", "x": "En journée, le BIP d'avis et les admissions dans les différentes unités de cardiologie sont gérés par un senior (DECT cardiologue de garde : 35 964). Le bed manager vous informera des entrées prévues sur la journée."}, {"t": "p", "x": "Sont admis en USIC tous les syndromes coronariens, les décompensations cardiaques sévères, les chocs cardiogéniques, les troubles du rythme ventriculaires et supra-ventriculaires mal tolérés, les syncopes, les endocardites, les embolies pulmonaires, les tamponnades et les myo-péricardites …"}, {"t": "p", "x": "Il n'y a pas de limite d'âge à l'admission en USIC mais il faut tenir compte du terrain et des comorbidités du patient. En cas de doute sur une admission en USIC n'hésitez pas en discuter avec votre senior."}, {"t": "p", "x": "Collaboration avec le SAMU 94"}, {"t": "p", "x": "Les patients du SAMU 94 doivent être acceptés en USIC. Le maximum est fait dans la journée pour faire de la place avant la garde et il y a souvent des places dans les autres unités du service. Si nécessaire, il ne faut pas hésiter à transférer les patients dans les autres unités (12ème, 8ème ou 11ème) pour prendre une urgence (en privilégiant les patients sortants le lendemain)."}, {"t": "p", "x": "Cas particuliers"}, {"t": "li", "x": "Les dissections aortiques doivent être admises en salle de réveil dans le cadre de la structure SOS Aorte. Tout appel extérieur pour une dissection aortique doit être redirigé vers le réanimateur de la salle de réveil (DECT 36045).", "l": 0}, {"t": "li", "x": "Les patients dialysés chroniques ne doivent être acceptés qu'après accord du néphrologue et une fois les séances de dialyse programmées. Il n'est pas possible de faire de la dialyse en USIC.", "l": 0}, {"t": "li", "x": "Les patients sous ventilation mécanique invasive ou sous ECMO ne peuvent pas être admis", "l": 0}, {"t": "p", "x": "Admission en USIC : en pratique"}, {"t": "p", "x": "Chaque entrée faite en USIC implique :"}, {"t": "li", "x": "Une observation complète rédigée sur Orbis (état civil et correspondants inclus)", "l": 0}, {"t": "li", "x": "Une échographie cardiaque complète (cf. ci-après) avec son compte-rendu dans le BMI", "l": 0}, {"t": "li", "x": "Un dossier papier avec 2 pochettes bleues (l'une pour les documents, l'autre pour les ECG)", "l": 0}, {"t": "p", "x": "Echographie d'entrée"}, {"t": "p", "x": "Chaque patient entrant en USIC (dans la journée comme en garde) doit avoir une échographie cardiaque complète. L'examen doit être enregistré et les électrodes ECG branchées. N'hésitez pas à appeler votre senior en cas de difficulté ou pour interpréter avec vous l'échographie."}, {"t": "p", "x": "Toutes les échographies faites pendant la garde sont relues et commentées au staff de transmission du lendemain matin. N'oublier pas de transférer les échographies des dernières 24 h de chaque machine avant le staff."}, {"t": "p", "x": "Nous disposons en USIC d'une table d'échographie d'effort et de 2 belles machines d'écho qui permettent de faire de l'ETO 3D. L'interne est prioritaire pour réaliser tous les examens échographiques de ses patients."}, {"t": "p", "x": "Nous avons la chance d'avoir de très belles machines en USIC. Merci de faire attention à ces machines fragiles : on ne laisse pas traîner les câbles, on ne roule pas dessus, on l'éteint avant de la débrancher et on ne colle rien dessus ! Merci également de veiller à les maintenir dans un état de propreté correct."}, {"t": "p", "x": "Infarctus du myocarde"}, {"t": "p", "x": "L'infarctus du myocarde est une urgence et ne se refuse jamais, y compris en l'absence de place en USIC. Il y a toujours une place disponible dans l'une des réanimations / USC de l'hôpital. En dernier recours, le patient peut être hébergé en salle de réveil. Dans tous les cas, il faut accepter le patient, vous aurez ensuite tout le temps de lui trouver un lit en appelant les différents médecins de garde."}, {"t": "p", "x": "En pratique, après avoir accepté un infarctus, il faut :"}, {"t": "li", "x": "Avertir le médecin de coronarographie (en journée : DECT 36520, en garde : appeler le coronarographiste et les 2 paramédicaux d'astreinte)", "l": 0}, {"t": "li", "x": "Avertir l'un des médecins de l'USIC", "l": 0}, {"t": "li", "x": "Avertir les IDE de l'USIC", "l": 0}, {"t": "li", "x": "Avertir le Bed Manager (en journée)", "l": 0}, {"t": "p", "x": "Il faut par ailleurs demander à l'équipe paramédicale d'USIC de préparer le lit avec le scope de transport, une bouteille d'O2 et des pousse-seringues (ils ont l'habitude). Le lit est descendu en coronarographie au RCH et vous remontez ensuite le patient scopé en USIC (avec l'aide des brancardiers en journée ou de vos collègues pendant la garde)."}, {"t": "p", "x": "L'équipe du SAMU a l'habitude et amènera le patient directement en salle de cathétérisme."}, {"t": "p", "x": "Pour les douleurs thoraciques persistantes, l'approche dans le service est plutôt invasive : on ne laisse pas un malade souffrir toute la nuit et on ne le laisse pas sous dérivés nitrés pour soulager la douleur."}, {"t": "p", "x": "En cas de proposition d'une coronarographie chez un patient intubé ventilé (généralement ACR) par le SAMU, le coronarographiste et les 2 paramédicaux d'astreinte doivent être appelés. Il faut aussi s'assurer auprès du SAMU que le patient a bien été accepté auparavant par la réanimation médicale."}, {"t": "p", "x": "Chocs cardiogéniques"}, {"t": "p", "x": "Les chocs cardiogéniques sont admis en USIC et leur prise en charge est protocolisée."}, {"t": "p", "x": "Ils doivent tous bénéficier d'un monitorage hémodynamique invasif avec la pose d'un cathéter artériel et d'un cathéter veineux central en cave supérieur. Toutes les amines doivent être administrées sur un KT central (on ne met pas de Dobutamine sur une VVP, même à 4h du matin !!). Afin d'assurer le monitorage des patients, merci de prescrire à tous les chocs cardiogéniques un GDS artériel ET veineux (ScVo2) quotidien à 6h et 17h (+ si dégradation ou instabilité) ainsi que de demander aux IDE de réaliser une mesure de la PVC x 3 par jour ( à prescrire en « texte libre » dans Orbis). Vous disposez d'un appareil d'échographie avec une sonde vasculaire et des protections stériles pour la pose des cathéters. La pose des cathéters doit se faire selon les recommandations du CLIN (cf. livret thérapeutique)."}, {"t": "p", "x": "Structures expertes"}, {"t": "p", "x": "L'USIC et l'aval centralisent toutes les suspicions d'endocardite (SOS Endocardite), la maladie thrombo-embolique et les myocardites. Les prises en charge sont ensuite protocolisées (cf. flyers distribués en début de semestre)."}, {"t": "p", "x": "En cas d'urgence vitale\n- Patients chirurgicaux : réanimation CCV (4ème étage) au 36043.\n- Patients médicaux : réanimation médicale (1er  étage) au 36494"}]}, {"title": "Organisation de l'USIC", "blocks": [{"t": "p", "x": "Secteurs"}, {"t": "p", "x": "L'USIC comporte au total 20 lits. Elle est réservée aux patients les plus graves nécessitant un monitoring continu (STEMI à J0, chocs cardiogéniques, OAP, embolies pulmonaires graves, myocardites, troubles du rythme graves,…). Le personnel paramédical est de 1 IDE pour 4 lits. Géographiquement, l'USIC est répartie en :"}, {"t": "li", "x": "Grande USIC, lits 17 à 30 : 12 lits", "l": 0}, {"t": "li", "x": "Petite USIC, lits 41 à 50 : 8 lits", "l": 0}, {"t": "p", "x": "L'aval de l'USIC (ou cardiologie polyvalente) comporte au total 12 lits non scopés, dont 4 lits monitorés par une télémétrie (il s'agit administrativement d'un secteur d'hospitalisation conventionnelle et non de soins intensifs). Elle est réservée aux patients moins graves nécessitant une surveillance plus légère (infarctus à J1, NSTEMI après revascularisation, embolies pulmonaires non graves, endocardite traitée…). Aucun patient sous amines, sous VNI, avec un pousse seringue (Risordan IVSE) ou nécessitant une surveillance des constantes rapprochée ne doit être admis en aval de l'USIC."}, {"t": "p", "x": "Staff du matin"}, {"t": "p", "x": "Celui-ci a lieu de 8h30 à 9h30 en présence des médecins et des internes du service, de l'équipe de garde, des étudiants et de l'IDE. Les objectifs sont les suivants :"}, {"t": "li", "x": "Assurer la transmission entre les médecins et l'équipe paramédicale", "l": 0}, {"t": "li", "x": "Donner les orientations diagnostiques et thérapeutiques pour chaque patient", "l": 0}, {"t": "li", "x": "Assurer une mission d'enseignement en relisant les examens complémentaires", "l": 0}, {"t": "li", "x": "Faire le point sur les entrées et les sorties prévues", "l": 0}, {"t": "p", "x": "La présence des internes est impérative."}, {"t": "p", "x": "Organisation de la journée"}, {"t": "p", "x": "Chaque interne a à sa charge 6 patients maximum en USIC."}, {"t": "p", "x": "Les internes font la visite le matin entre 9h30 et 12h30 au lit du patient :"}, {"t": "li", "x": "Un interne de phase socle supervisé par un sénior ;", "l": 0}, {"t": "li", "x": "Deux internes supervisés par un sénior ;", "l": 0}, {"t": "p", "x": "Une contre-visite est effectuée par un médecin sénior à midi et les entrées de la journée sont revues avec vous avant la garde. Une visite séniorisée est faite 1 par semaine en aval de l'USIC."}, {"t": "p", "x": "Brancardage"}, {"t": "p", "x": "En journée, les brancardages sont effectués par des brancardiers. Les patients scopés ou instables doivent être accompagnés par un médecin. En post TAVI et en post infarctus (KT direct), les patients sont scopés et ils doivent être accompagnés par un interne depuis la salle de KT vers l'USIC."}, {"t": "p", "x": "Transmissions"}, {"t": "p", "x": "Les transmissions pour la garde se font à 18h00 précises en présence de l'un des médecins séniors."}, {"t": "p", "x": "Les transmissions papier doivent être mises à jour et imprimées pour le début de la garde."}]}, {"title": "Organisation des secteurs dédiés à l'insuffisance cardiaque et à l'amylose", "blocks": [{"t": "h4", "x": "Unité Insuffisance Cardiaque Amylose UICA"}, {"t": "p", "x": "Dédiée à la prise en charge des patients :"}, {"t": "li", "x": "insuffisants cardiaques (décompensation, suivi, optimisation, greffe, assistance) ;", "l": 0}, {"t": "li", "x": "porteurs de cardiomyopathies (CMD, CMH, restrictives, familiales) ;", "l": 0}, {"t": "li", "x": "des amyloses cardiaques (Centre de Référence National).", "l": 0}, {"t": "p", "x": "Hospitalisations programmées : bilan d'amylose, suivi d'amylose (chimiothérapie, réévaluation), bilan de CMH, bilan de CMD, bilan de CPI, bilan pré-greffe ou pré-assistance, suivi des greffés pendant 2 ans post-greffe."}, {"t": "p", "x": "Demandes de programmation spécifiques, disponible dans le NAS à partir d'une session non générique (répertoires réseau > NAS fédération de cardiologie > Demandes examens complémentaires et programmations)"}, {"t": "p", "x": "Programmatrices :"}, {"t": "li", "x": "Carole Henrion pour les amyloses : carole.henrion@aphp.fr (12816)", "l": 0}, {"t": "li", "x": "Johanna Hesol pour le reste (CMH, CMD, IC) : johanna.hesol@aphp.fr (14330, 36085)", "l": 0}, {"t": "p", "x": "Les demandes de consultations de titrations et d'inclusion en télésurveillance ne se font que par téléphone auprès des infirmiers de la CCICC (Sandrine et Michel) : 36871"}, {"t": "p", "x": "Hospitalisations non programmées : décompensations cardiaques, aval d'USIC"}, {"t": "p", "x": "Fonctionnement :"}, {"t": "p", "x": "Trois internes (2 internes MINIMUM en période de vacances / post-garde) assurent la prise en charge des patients (visites quotidiennes, entrées programmées, contre-visites, programmation du suivi) et la synthèse du dossier médical."}, {"t": "p", "x": "Trois médecins (CCA ou assistant) encadrent les internes, assurent 2 visites par semaine pour chacun des internes, animent le staff du mardi matin, informent les familles. Un CCA / assistant sera présent à 100% en salle pour encadrer les internes."}, {"t": "p", "x": "Deux médecins séniors (PH) sont responsables de la salle, aident les internes et les CCA dans la gestion des patients et la prise de décision."}, {"t": "p", "x": "Les attachés de recherche clinique (ARC) sont chargés des protocoles de recherche clinique de l'UICA : inclusion des patients, information des patients et des médecins, suivi."}, {"t": "p", "x": "Le personnel dédié au Réseau Amylose Mondor aide à la prise en charge des patients adressés pour amylose (coordination du parcours de soins par Carole Henrion 12816 et Steven Maupou 36934, éducation thérapeutique et évaluation psychologique par Julie Pompougnac)."}, {"t": "p", "x": "Spécificités dans l'organisation de la semaine :"}, {"t": "p", "x": "Lundi : Sorties (contrôles des PM/DAI implantés en fin de semaine) + Visite puis, l'après-midi : entrées programmées, transmissions pour le staff du mardi"}, {"t": "p", "x": "Mardi matin : Staff de l'UICA à 8h30, en salle de staff 12è (médecins, IDE, aide-soignants, Ass. sociale, secrétaires, ARC, diététicienne...), suivi de la visite séniorisée."}, {"t": "p", "x": "Mercredi : RCP d'onco-hématologie à 15h (salle CALYPSSO, 4è étage) pour discussion des dossiers Amylose AL avant chimiothérapie (Check-list amylose ++)."}, {"t": "p", "x": "Jeudi : Visite CCA/assistants"}, {"t": "p", "x": "Vendredi : Sorties, transmissions des patients transférés d'HdS du 8è étage, prévoir les bilans pour le week-end entier."}, {"t": "p", "x": "Samedi : Visite 1 senior et 1 interne d'astreinte"}, {"t": "p", "x": "Dimanche : Visite d'un senior d'astreinte"}, {"t": "p", "x": "Nous prenons en charge des patients graves. L'information du patient et de sa famille est essentielle, tout comme la communication avec l'équipe d'USIC."}, {"t": "h4", "x": "Cellule de Coordination de l'Insuffisance Cardiaque et des Cardiomyopathies CCIƆƆ"}, {"t": "p", "x": "Entité composée d'un médecin et de deux infirmiers (36871), dédiée à :"}, {"t": "p", "x": "- la coordination du parcours de soins des patients insuffisants cardiaques ou porteurs de cardiomyopathies"}, {"t": "p", "x": "- l'éducation thérapeutique"}, {"t": "p", "x": "- la surveillance par des outils connectés (balance, tablette)"}, {"t": "p", "x": "Pour prévenir les récidives de décompensation cardiaque."}, {"t": "p", "x": "Localisée dans le bureau de la coordination amylose (à côté du bureau des chefs)"}, {"t": "p", "x": "Consultations d'annonce : insuffisance cardiaque, cardiomyopathie, dont amylose"}, {"t": "p", "x": "Destinées à tout patient nouvellement diagnostiqué"}, {"t": "p", "x": "Réalisées par un sénior du service et les IDE (CCIƆƆ et/ou IDE en charge du patient)"}, {"t": "p", "x": "Consultations de titration :"}, {"t": "p", "x": "Destinées à optimiser rapidement le traitement médical de l'insuffisance cardiaque."}, {"t": "p", "x": "Réalisées par les IDE de la cellule (spécialisés en insuffisance cardiaque) et un médecin."}, {"t": "p", "x": "Consultations tous les 15 jours, avant réévaluation en HdJ de cardiologie (cette hospitalisation est à prévoir par l'interne qui demande la titration) ou par le cardiologue référent (décision de CRT, DAI…)."}, {"t": "p", "x": "Ouvert à tous les patients en insuffisance cardiaque avec FEVG altérée (< 45%) dont le traitement médical peut encore être majoré (posologies, FC > 55/min, PAs > 90 mmHg)."}, {"t": "p", "x": "RdV de consultations gérés exclusivement par la CCIƆƆ, sur appel avant la sortie du patient (36971)."}, {"t": "p", "x": "La consultation de titration ne se substitue ni aux médecins référents du patient (dont cardiologue), ni à la réadaptation cardiaque. Elle n'a pas vocation à s'occuper d'autres aspects de la maladie que la titration (discussion de revascularisation, anémie, etc.). L'existence d'un parcours de soins avec suivi programmé sera néanmoins vérifiée."}, {"t": "p", "x": "Mise en place du télé-suivi du poids et des symptômes :"}, {"t": "p", "x": "Remise et éducation à l'utilisation d'une balance et d'un boitier connectés."}, {"t": "p", "x": "Consultations d'urgence :"}, {"t": "p", "x": "Dédiées à la prise en charge précoce des décompensations cardiaques débutantes, pour favoriser la prise en charge ambulatoire, et éviter une hospitalisation via le service des urgences."}, {"t": "p", "x": "Assurées par un médecin en collaboration avec les IDE de la CCIƆƆ ( 01 45 17 82 20)"}, {"t": "h4", "x": "Centre de Référence des Amyloses Cardiaques :"}, {"t": "p", "x": "Consultations SOS Amylose :"}, {"t": "p", "x": "Dédiées à l'initiation d'un bilan d'amylose (première consultation), deuxième avis ou avis spécialisé."}, {"t": "p", "x": "Consultations longues (1h30) sous la responsabilité de Silvia Oghina (36940), avec évaluation, information, planification du bilan ; selon les indications, bilan biologique (génétique, immunologique) et BGSA."}, {"t": "p", "x": "Ouvert à tous à partir de l'adresse sos.amylosecoeur@aphp.fr ou Silvia Oghina (36940) ou secrétariat 12253 ou coordinatrice amylose 12816."}, {"t": "p", "x": "Education thérapeutique :"}, {"t": "p", "x": "Un programme d'éducation thérapeutique complet existe pour l'insuffisance cardiaque et l'amylose, n'hésitez pas à adresser les patients."}, {"t": "p", "x": "Amylose : Julie Pompougnac : amylo.pep@gmail.com ou en contactant Carole Henrion (12816)"}, {"t": "h4", "x": "Traitement en HAD des décompensations cardiaques :"}, {"t": "p", "x": "Principe :"}, {"t": "li", "x": "Patients hospitalisés pour insuffisance cardiaque chronique avec des signes cliniques d'insuffisance cardiaque globale ou droite déjà explorée sans indication à une prise en charge spécifique (DAI, CRT, revascularisation, …) et nécessitant un traitement diurétique intraveineux prolongé (> 5 jours).", "l": 0}, {"t": "li", "x": "Hospitalisation en Cardiologie pendant 48h pour évaluer la faisabilité et l'absence de cause nécessitant une hospitalisation classique.", "l": 0}, {"t": "p", "x": "Retour à domicile avec l'HAD (2 passages IDE / jour, bilan biologique quotidien, protocole validé pour adaptation des doses) pour la poursuite des diurétiques IV (bolus ou IVSE)."}, {"t": "p", "x": "Les critères nécessaires à la prise en charge en HAD sont :"}, {"t": "li", "x": "Patient volontaire et dont l'état cognitif lui permet de vivre à son domicile et d'ouvrir la porte aux soignants. Entourage présent.", "l": 0}, {"t": "li", "x": "Patients affiliés à la Sécurité Sociale française.", "l": 0}, {"t": "li", "x": "Domiciliation dans le secteur de prise en charge de l'HAD (principalement 75 et 94).", "l": 0}, {"t": "p", "x": "En pratique :"}, {"t": "li", "x": "En discuter dès l'entrée du patient avec Silvia Oghina (36940)", "l": 0}, {"t": "li", "x": "Accord du patient et de son entourage", "l": 0}, {"t": "li", "x": "Accord du MG (sinon prise en charge par la CCICC) qui décidera de l'arrêt du traitement.", "l": 0}, {"t": "li", "x": "Demande de prise en charge en HAD (NAS - Unité de Recherche Insuffisance Cardiaque - HAD) à envoyer par mail (had.adulte@aphp.fr) ou fax (01.73.73.56.56).", "l": 0}, {"t": "li", "x": "Définition des cibles de traitement (poids cible, disparition des signes cliniques d'IC).", "l": 0}, {"t": "li", "x": "Ordonnance de traitement avec dose de diurétique IV (jusqu'à objectif de poids) et la dose de diurétiques per os à prescrire en relais + traitement habituel + ordonnance de prises de sang (au minimum : 1 ionogramme urée créatinine par jour).", "l": 0}]}], "categories": [{"title": "Généralités et protocoles", "fiches": [{"title": "Prise en charge de l'arrêt cardio-circulatoire", "blocks": [{"t": "p", "x": "DIAGNOSTIC : PATIENT INCONSCIENT + ABSENCE DE RESPIRATION APPARENTE (ou GASPS)"}, {"t": "p", "x": "1ère phase : REANIMATION INITIALE = 3 personnes"}, {"t": "p", "x": "PERSONNE A : Appeler le senior de l'USIC (ou cardio de garde la nuit) puis 36494 (réanimateur)"}, {"t": "p", "x": "Donner des instructions précises sur le lieu de l'arrêt (n° de chambre)"}, {"t": "p", "x": "Noter l'heure de l'arrêt"}, {"t": "p", "x": "Amèner le chariot d'urgence"}, {"t": "p", "x": "PERSONNE B : Débute le massage cardiaque externe (ne jamais stopper plus de 10 s)"}, {"t": "p", "x": "PERSONNE C : Mise en place et mise en marche du DAI"}, {"t": "p", "x": "1. Allumer le DAI"}, {"t": "p", "x": "2. Appliquer les électrodes (sous claviculaire Dt / sous axillaire G)"}, {"t": "p", "x": "3. Vérifier que le patient est bien scopé +++ et amener tensiomètre et saturomètre"}, {"t": "p", "x": "2ème phase : AIDE A LA REANIMATION : CHACUN UNE TACHE / CHACUN SA TACHE"}, {"t": "p", "x": "Massage cardiaque externe :"}, {"t": "p", "x": "Mise en place de la planche à masser sous le patient"}, {"t": "p", "x": "Changer d'intervenant toutes les 30s (maintien l'efficacité du massage)"}, {"t": "p", "x": "1 IDE dédiée à la préparation des médicaments puis vérification/mise en place 2ème VVP"}, {"t": "p", "x": "Adrénaline 10mg (1mg/1ml)"}, {"t": "p", "x": "1mg / 3 minutes"}, {"t": "p", "x": "1 IDE dédiée à la ventilation :"}, {"t": "p", "x": "Préparation du BAVU branché sous 15 L/min O2 => IOT n'est pas une priorité"}, {"t": "p", "x": "Matériel d'intubation :"}, {"t": "p", "x": "Mandrin"}, {"t": "p", "x": "Lame (Mac 4)"}, {"t": "p", "x": "Sonde d'intubation (taille 7,5 femme / 8 homme)"}, {"t": "p", "x": "Seringue de 10 cc"}, {"t": "p", "x": "Aspiration fonctionnelle"}, {"t": "p", "x": "3ème PHASE : PRISE EN CHARGE MEDICALE"}, {"t": "p", "x": "1. Confirmer le diagnostic d'ACR (absence de conscience, absence de ventilation, absence de pouls)"}, {"t": "p", "x": "Annoncer l'heure de début de réanimation"}, {"t": "p", "x": "2. Réanimation spécialisée"}, {"t": "table", "rows": [["Rythme chocable", "Rythme non chocable"], ["Délivrer 3 CEE espacés de 2 min de MCE ininterrompu\nAdrénaline + Cordarone après le 3ème CEE inefficace", "MCE ininterrompu\nAdrénaline 1 mg toutes les 3 à 5 minutes"]]}, {"t": "p", "x": "3. Traitements associés"}, {"t": "p", "x": "ETT de débrouillage dès que possible pour identifier une cause (tamponnade ? rupture VG ?)"}, {"t": "p", "x": "Traitement d'une hyperkaliémie éventuelle"}, {"t": "p", "x": "Remplissage vasculaire si besoin"}, {"t": "p", "x": "Au bout de 5 minutes, en l'absence de récupération d'une activité cardiaque, si une cause cardiaque est identifiée, discuter ECMO (DECT 36043, réanimateur CCV)."}]}, {"title": "Cathéters, redons et électrodes en USIC : le minimum vital", "blocks": [{"t": "h4", "x": "Cathéters"}, {"t": "p", "x": "Pose du cathéter"}, {"t": "p", "x": "Conditions d'asepsie chirurgicale, sous anesthésie locale."}, {"t": "p", "x": "En présence de l'IDE qui réalise en 1er lieu une détersion en 4 temps."}, {"t": "p", "x": "Pour la pose en cave supérieur, utiliser des cathéters 3 voies de 16 cm à droite, 20 cm à gauche."}, {"t": "p", "x": "Ne pas oublier de clamper toutes les voies du KTc avant de le poser (sauf bien sûr la voie marron par laquelle le guide doit ressortir)."}, {"t": "p", "x": "Toujours garder un contact visuel avec le guide qui ne doit pas être perdu ++"}, {"t": "p", "x": "Ponction échoguidée y compris pour la réalisation de l'anesthésie locale (capotes stériles d'échographie disponibles en USIC, ainsi qu'une sonde vasculaire ; en l'absence de sonde vasculaire en USIC il est possible d'emprunter la machine en réanimation)."}, {"t": "p", "x": "Une fois le cathéter central posé, vérifier la présence d'un bon reflux en purgeant l'air et rincer les lignes l'une après l'autre."}, {"t": "p", "x": "Recouvrir le point de ponction par un pansement en portefeuille (2 Tegaderm face à face)."}, {"t": "p", "x": "Raccorder les lignes de perfusion de chaque voie (préparées par l'IDE). Protéger chaque pavillon (raccord entre la voie du KT et la ligne de perfusion) par un Mépore, en prenant garde de ne pas y mettre le clamp des pavillons."}, {"t": "p", "x": "En cas de pose accidentelle en artériel, ne pas retirer le cathéter, prévenir le sénior et prendre contact rapidement avec les radiologues interventionnels et/ou les chirurgiens vasculaires."}, {"t": "p", "x": "Au moindre problème avec la pose, appeler un sénior ++++"}, {"t": "p", "x": "Les cathéters cave supérieur nécessitent un contrôle radiologique pour vérifier le bon positionnement de l'extrémité distale AVANT de débuter tout traitement (en attendant, régler le débit à 2 mL/h pour éviter que les voies ne se bouchent). Le traitement ne peut être débuté en urgence que sur accord du médecin."}, {"t": "p", "x": "Pas de changement de cathéter sur guide : en cas d'infection, le cathéter doit être posé sur un autre site puis retirer le KT souillé et l'envoyer en bactériologie."}, {"t": "p", "x": "Surveillance quotidienne du point de ponction."}, {"t": "p", "x": "La présence d'un KT central en cave supérieur nous donne la possibilité d'évaluer la ScVO2 à partir d'un gaz veineux et la Pression Veineuse Centrale (PVC) permettant de guider la prise en charge des chocs cardiogéniques (cf. chapitre). N'oubliez pas de prescrire une ScVO2 et la mesure de PVC chez ces patients !"}, {"t": "h4", "x": "Redons pleuro-péricardiques"}, {"t": "p", "x": "Doivent être quantifiés quotidiennement par l'IDE + surveillance des points de ponction"}, {"t": "p", "x": "Dans les 24 premières heures d'une chirurgie cardiaque : 600 cc/6h max soit 100 cc/h, au-delà = inquiétant"}, {"t": "p", "x": "Si le malade a mal au niveau des redons, les mettre sur Pleurevac en aspiration douce."}, {"t": "p", "x": "En cas de saignement :"}, {"t": "p", "x": "Tous les drains qui saignent : probable problème d'hémostase générale  vérifier le bilan, prescrire des produits sanguins selon le bilan (plaquettes si thrombopénie, CGR si anémie, PFC si TP bas,…)"}, {"t": "p", "x": "Un seul drain qui saigne : probable problème chirurgical local"}, {"t": "p", "x": "Dans tous les cas prévenir le chirurgien référent ou d'astreinte"}, {"t": "p", "x": "Retrait des redons (généralement à J2 post opératoire) lorsqu'ils donnent un liquide séreux ou séro-hématique < 30-50 cc/j (péricardiques) ou 100 cc/j (pleuraux). Les redons peuvent être retirés sous anticoagulation curative tant qu'il n'y a pas de surdosage, après avoir cassé le vide"}, {"t": "p", "x": "Toujours valider le retrait des redons avec le senior réfèrent."}, {"t": "p", "x": "En cas de médiastinite : mobilisation de 1 cm/jour dès que 2 cultures négatives à 48h d'intervalle, jusqu'à ce qu'ils tombent"}, {"t": "h4", "x": "Electrodes et SEES"}, {"t": "p", "x": "Test du seuil"}, {"t": "p", "x": "Le seuil de stimulation doit être testé quotidiennement :"}, {"t": "p", "x": "Se placer en mode VVI ;"}, {"t": "p", "x": "Régler la FC du stimulateur 10 points au-dessus de la FC du patient ;"}, {"t": "p", "x": "Augmenter la sortie V au maximum puis la diminuer progressivement jusqu'à perdre la stimulation ventriculaire: noter le seuil (c'est le seuil de stimulation)"}, {"t": "p", "x": "Régler la sortie V à 2 à 3 fois le seuil de stimulation défini précédemment pour être certain que le stimulateur va fonctionner"}, {"t": "p", "x": "Bien notifier dans le dossier et sur les transmissions si les seuils s'élèvent trop +++"}, {"t": "p", "x": "En cas d'urgence, appuyer sur le bouton « URGENCE » qui met le stimulateur en mode VOO (stimulation ventriculaire continue sans écoute ventriculaire ni atriale)."}, {"t": "p", "x": "Points spécifiques à la SEES"}, {"t": "p", "x": "Bien contrôler le point de ponction fémoral ou jugulaire de la SEES ++"}, {"t": "p", "x": "Décubitus dorsal strict du patient (pas de lever , ne pas plier la jambe)"}, {"t": "p", "x": "Vérifier l'emplacement de la SEES à la radio de thorax en post-procédure"}, {"t": "p", "x": "SEES à laisser en place le moins longtemps possible +++ (risque complication)"}, {"t": "p", "x": "En cas de SEES, prescrire de l'HNF 10.000 UI/24h IVSE (contrôle d'Anti-Xa non nécessaire) pour éviter une thrombose de la SEES, si pas d'indication à une anticoagulation curative."}, {"t": "p", "x": "Retrait du dispositif"}, {"t": "p", "x": "A titre indicatif, les électrodes ou la SEES sont retirées, en l'absence d'évènement conductif :"}, {"t": "p", "x": "A J3 pour un pontage simple"}, {"t": "p", "x": "A J5-J6 pour toute chirurgie valvulaire"}, {"t": "p", "x": "A H72 pour une SEES après un TAVI ou une alcoolisation septale"}, {"t": "p", "x": "En cas d'évènement conductif, les maintenir jusqu'à un avis rythmologique."}, {"t": "p", "x": "Dans tous les cas, la décision est généralement prise au staff de transmissions d'USIC du matin et validée par votre senior."}, {"t": "p", "x": "Retirer les électrodes ou la SEES le matin ++ :"}, {"t": "p", "x": "Arrêt de l'héparine 4h avant le retrait des électrodes ou de la SEES (à 6 heures du matin généralement), à reprendre 2h après, après un contrôle du péricarde dans l'après-midi pour s'assurer de l'absence d'épanchement péricardique."}]}, {"title": "CPAP et VNI : indications et réglages", "blocks": [{"t": "p", "x": "Indication"}, {"t": "p", "x": "Les principales indications en USIC :"}, {"t": "p", "x": "OAP cardiogénique"}, {"t": "p", "x": "Décompensation hypercapnique de BPCO"}, {"t": "p", "x": "SAHOS (préférer le ventilateur propre au patient)"}, {"t": "p", "x": "Gestion des atélectasies post-opératoire"}, {"t": "p", "x": "Quelles sont les contre-indications de la VNI ? (Conférence de consensus, Octobre 2006)"}, {"t": "p", "x": "Patient non coopérant, agité, opposant à la technique"}, {"t": "p", "x": "Coma (sauf coma hypercapnique)"}, {"t": "p", "x": "Choc septique"}, {"t": "p", "x": "Encombrement bronchique majeur"}, {"t": "p", "x": "Pneumothorax non drainé"}, {"t": "p", "x": "Vomissements incoercibles"}, {"t": "p", "x": "Hémorragie digestive haute, suture haute du tube digestif"}, {"t": "p", "x": "Modes de ventilation :"}, {"t": "p", "x": "En ventilation non invasive, il existe principalement 2 modes ventilatoires :"}, {"t": "p", "x": "VS-PEP : une pression UNIQUE est appliquée en continu pendant tout le cycle respiratoire (pression expiratoire positive). Elle varie habituellement entre 5 et 10 cmH2O."}, {"t": "p", "x": "VSAI-PEP : une pression est appliquée à chaque phase du cycle respiratoire (P inspiratoire / P expiratoire = PEP) => 2 valeurs de pression"}, {"t": "p", "x": "La pression inspiratoire positive permet de décharger les muscles respiratoires d'une partie de leur travail. Cet effet est proportionnel à l'amplitude de la pression positive."}, {"t": "p", "x": "La pression expiratoire positive est la pression maintenue dans les voies aériennes en fin d'expiration. Elle évite le collapsus des voies aériennes, recrute des territoires alvéolaires collapsés, lutte contre la PEP intrinsèque (chez les patients BPCO)."}, {"t": "p", "x": "En cas d'OAP cardiogénique, la VNI peut être instaurée sur un mode VS-PEP ou VSAI-PEP."}, {"t": "p", "x": "Les indications de VNI sont les signes de détresse respiratoire ou d'épuisement respiratoire (patient hypercapnique) ou de non réponse au traitement médical (FR > 25/min, saturation < 90%)."}, {"t": "p", "x": "En cas de décompensation de BCPO, la VNI sera instaurée sur le mode VSAI-PEP en cas de signes cliniques de détresse respiratoire ou d'acidose hypercapnique."}, {"t": "p", "x": "En cas de VNI post opératoire, la VNI peut être instaurée sur le mode VS-PEP ou VSAI-PEP."}, {"t": "p", "x": "Matériel :"}, {"t": "p", "x": "VENTILATEUR"}, {"t": "p", "x": "Utilisez en priorité le ventilateur : T75 MONNAL"}, {"t": "p", "x": "INTERFACE"}, {"t": "p", "x": "Elle joue un rôle majeur pour la tolérance et l'efficacité."}, {"t": "p", "x": "Nous possédons des interfaces de VNI (masque naso-buccal) en taille S-M-L."}, {"t": "p", "x": "Il s'agit de masque sans fuite et doivent donc être utilisés avec un circuit double branche (masque à usage unique = pour un même patient)."}, {"t": "p", "x": "Il existe des abaques afin d'estimer la taille nécessaire."}, {"t": "p", "x": "Afin de limiter le risque de lésion cutanée liée à l'utilisation de l'interface, il est nécessaire de mettre en place un pansement protecteur (hydrocolloïde, DUODERM, ASKINA) sur l'arête du nez dès la 1ère utilisation."}, {"t": "p", "x": "CIRCUIT"}, {"t": "p", "x": "Un circuit double branche (un tuyau pour l'insufflation et un pour exsufflation) est à adapter sur le ventilateur (circuit à usage unique = pour un même patient)."}, {"t": "p", "x": "FILTRES"}, {"t": "p", "x": "Un filtre antibactérien doit être positionné au niveau de la sortie du circuit d'exufflation, au niveau du ventilateur"}, {"t": "p", "x": "Le second filtre humidificateur est place au niveau du masque du patient (enlever le raccord hannelé sinon risque d'espace mort)."}, {"t": "p", "x": "Durée de vie : 72 h."}, {"t": "p", "x": "Filtre antibactérien"}, {"t": "p", "x": "Mise en route de la VNI"}, {"t": "p", "x": "Le patient doit être installé en position assise ou demi-assise. Le patient doit être informé de la nécessité du recours à la VNI."}, {"t": "p", "x": "Lors de la 1ère séance de VNI, le médecin responsable de la prescription doit être PRESENT afin d'adapter les réglages."}, {"t": "p", "x": "La VNI est branchée au secteur et raccordée à un circuit d'oxygène."}, {"t": "p", "x": "Le masque est initialement appliqué sur le visage et non fixé lors de la mise en route de la VNI (meilleure tolérance lors de la mise en place)."}, {"t": "p", "x": "Le niveau d'aide inspiratoire initiale est de 7 cmH2O (sauf prescription contraire)."}, {"t": "p", "x": "La PEP doit être initiée à 0 c cmH2O et progressivement augmentée (en quelques minutes) jusqu'à l'objectif prescrit (au miminum 5 cmH2O)."}, {"t": "p", "x": "Une fois les paramètres réglés et la bonne tolérance du patient évaluée, le masque peut être fixé au moyen des sangles."}, {"t": "p", "x": "Paramètres :"}, {"t": "table", "rows": [["FI02", "Fraction inspirée en oxygène"], ["AI (minimum 7cmH20)", "Aide inspiratoire (cmH2O)"], ["Fmini (8/min)", "Fréquence respiratoire minimum (c/min)"], ["PEP", "Pression positive en fin d'expiration (cmH2O)"], ["TImax (2s)", "Temps inspiratoire maximal des cycles"], ["Trig I (0.5-2)", "Trigger inspiratoire (L/min ou cmH2O)"], ["Pente", "Pente de la montée en pression de l'aide inspiratoire (cmH2O/s)"], ["Trig E. (50%)", "Trigger expiratoire (% du débit de pointe inspiratoire) : par défaut : 50%"]]}, {"t": "p", "x": "Volume de fuite acceptable : le minimum (< 10%)."}, {"t": "p", "x": "La présence de fuites diminue l'efficacité et la tolérance de la VNI."}, {"t": "p", "x": "Modifications des paramètres :"}, {"t": "p", "x": "Paramètres modifiables par le médecin et l'IDE :"}, {"t": "p", "x": "La FI02 est à modifier selon l'objectif de saturation."}, {"t": "p", "x": "L'aide inspiratoire est à adapter au VT désiré (6-8ml/kg). En cas de VT insuffisant et une FR > 20/min, majorer l'aide inspiratoire afin d'obtenir le VT désiré."}, {"t": "p", "x": "La PEP est habituellement fixée entre 5 et 10 cmH20."}, {"t": "p", "x": "Paramètres uniquement modifiables par le médecin :"}, {"t": "p", "x": "Le trigger inspiratoire est à adapter en fonction de la courbe du ventilateur :"}, {"t": "p", "x": "En cas d'effort inefficace (déclenchement patient non suivi d'un cycle), il faut diminuer le seuil du trigger."}, {"t": "p", "x": "En cas de cycle respiratoire surajouté : vérifier l'absence de fuite et augmenter le trigger inspiratoire."}, {"t": "p", "x": "La fréquence respiratoire est à laisser au minimum (8/min) en dehors du cas exceptionnel de coma hypercapnique avec hypoventilation."}, {"t": "li", "x": "Surveillance", "l": 0}, {"t": "p", "x": "Une feuille de surveillance est à remplir pour chaque session de VNI afin de dépister l'aggravation respiratoire, la mauvaise tolérance ou les complications liées à la VNI."}, {"t": "p", "x": "Complications liées à la ventilation non invasive :"}, {"t": "p", "x": "Hypotension liée à la ventilation"}, {"t": "p", "x": "Pneumothorax"}, {"t": "p", "x": "Sécheresse buccale"}, {"t": "p", "x": "Lésions cutanées au point d'appui du masque"}, {"t": "p", "x": "Distension gastrique"}, {"t": "p", "x": "Gestion des alarmes"}, {"t": "p", "x": "Un manuel d'utilisation est à votre disposition dans le bureau de la cadre de l'USIC."}, {"t": "p", "x": "Les alarmes conduisant à l'arrêt immédiat de l'utilisation de la VNI :"}, {"t": "p", "x": "« Appareil hors service ! utiliser un ventilateur de secours »"}, {"t": "p", "x": "« Défaut détecté, contacter le service technique »"}, {"t": "p", "x": "« réglages inopérants », « seuils d'alarmes inopérants »"}, {"t": "p", "x": "« ventilation dégradée, changer d'appareil au plus tôt »"}, {"t": "p", "x": "Arrêt de la VNI"}, {"t": "p", "x": "Les critères d'arrêt de la VNI sont les mêmes que les contre-indications de la VNI."}, {"t": "p", "x": "La VNI pourra être arrêtée à l'initiative de l'IDE à l'apparition d'une contre-indication avec information de l'équipe médicale."}, {"t": "p", "x": "Patient non coopérant, agité, opposant à la technique"}, {"t": "p", "x": "Coma (sauf coma hypercapnique)"}, {"t": "p", "x": "Encombrement bronchique majeur"}, {"t": "p", "x": "Pneumothorax non drainé"}, {"t": "p", "x": "Vomissements incoercibles"}, {"t": "p", "x": "Hémorragie digestive haute, suture haute du tube digestif"}, {"t": "p", "x": "La VNI est habituellement stoppée lorsque les signes de détresse respiratoire s'amendent (en général 2-5h après la mise en place de la VNI). Les critères indicatifs sont une FI02 < 50% et une FR < 20/min."}, {"t": "p", "x": "UTILISATION DE LA CPAP DE BOUSSIGNAC"}, {"t": "p", "x": "La CPAP de Boussignac est une technique d'assistance respiratoire qui permet d'induire une pression positive constante sur les voies aériennes à l'inspiration et à l'expiration afin de recruter les alvéoles et de favoriser les échanges gazeux, à l'aide d'un effet de jet par injection d'air à haut débit."}, {"t": "p", "x": "En moyenne, l'administration de 30 L d'air permet d'obtenir environ de 5 mmHg de pression positive."}, {"t": "p", "x": "La CPAP comporte :"}, {"t": "p", "x": "Un masque patient"}, {"t": "p", "x": "Un tuyau vert relié à l'air et masque patient"}, {"t": "p", "x": "Un filtre humidificateur vert relié au masque"}, {"t": "p", "x": "Un petit raccord translucide avec un embout vert qui permet de mesurer la pression positive à l'aide du manomètre en se raccordant à la valve du tuyau vert"}, {"t": "p", "x": "Si besoin d'O2 : brancher le tuyau à oxygène en Y à la valve du tuyau vert de la CPAP"}, {"t": "p", "x": "Ouvrir le débitmètre à air jusqu'à atteindre la pression de CPAP désirée : 5 cmH2O."}, {"t": "p", "x": "Matériel nécessaire :"}]}, {"title": "Intubation oro-trachéale : fiche pratique", "blocks": [{"t": "p", "x": "Matériel nécessaire :"}, {"t": "li", "x": "Mandrin", "l": 0}, {"t": "li", "x": "Lame (4 ou 3)", "l": 0}, {"t": "li", "x": "Sonde d'intubation (7,5 femme / 8 homme)", "l": 0}, {"t": "li", "x": "Seringue de 10 ml", "l": 0}, {"t": "li", "x": "Sonde d'aspiration et matériel d'aspiration fonctionnel", "l": 0}, {"t": "li", "x": "BAVU / respirateur pré-réglé (FI02 100 %, VT 6ml/kg, FR = 20/min, PEP=5)", "l": 0}, {"t": "li", "x": "Mandrin d'Eischman", "l": 0}, {"t": "li", "x": "Guedel (taille 4)", "l": 0}, {"t": "li", "x": "Si possible : pré-oxygénation par VNI (FI02 100%)", "l": 0}, {"t": "li", "x": "Présence de 2 VPP", "l": 0}, {"t": "li", "x": "Ephedrine prête (seringue pré-remplie)", "l": 0}, {"t": "li", "x": "Fixation (sparadrap)", "l": 0}, {"t": "p", "x": "Précautions :"}, {"t": "p", "x": "RETIRER LES APPAREILS DENTAIRES ++"}, {"t": "p", "x": "Risques d'intubation difficile : score MACOCHA :"}, {"t": "p", "x": "M : MALLAMPATI score III ou V"}, {"t": "p", "x": "A : Apnées du sommeil"}, {"t": "p", "x": "C : Cervicale (mobilité rachidienne réduite)"}, {"t": "p", "x": "O : ouverture de bouche < 3 cm"}, {"t": "p", "x": "C : coma"}, {"t": "p", "x": "H : Hypoxémie"}, {"t": "p", "x": "A : non anesthésiste"}, {"t": "p", "x": "Préparations médicamenteuses :"}, {"t": "p", "x": "- ETOMIDATE : 0,4 mg/kg, 1 ampoule pour 70 kg environ, IVL sans dilution"}, {"t": "p", "x": "- ROCURONIUM (Esmeron®) : 1 mg/kg  (délai d'action 1 minute)"}, {"t": "p", "x": "- Traitement hypnotique en relais : PROPOFOL 4 mg/kg/h environ IVSE"}, {"t": "p", "x": "=> PREVENIR LE REANIMATEUR (36494)"}, {"t": "p", "x": "1. PRE-OXYGENATION (BAVU sans ventiler / VNI)"}, {"t": "p", "x": "2. ADMINISTRATION DU PROTOCOLE D'INDUCTION EN SEQUENCE RAPIDE"}, {"t": "p", "x": "3. IOT"}, {"t": "p", "x": "Avec manoeuvre de Seddik (appui sur cricoïde pour limiter risque d'inhalation)"}, {"t": "p", "x": "En cas d'échec avec la lame de Macintosh, tentative au mandrin d'Eischman"}, {"t": "p", "x": "Si échec : reventilation au BAVU et changer d'opérateur"}, {"t": "p", "x": "Appel réanimation ou anesthésiste (36045)"}, {"t": "p", "x": "4. VERIFICATION : (Capno) / auscultation cardiaque / radiographie thoracique"}]}, {"title": "Bilan pré-opératoire d'une chirurgie non cardiaque", "blocks": [{"t": "p", "x": "Messages clés :"}, {"t": "p", "x": "La décision d'endormir ou non le patient est prise par l'anesthésiste"}, {"t": "p", "x": "L'avis du cardiologue porte sur le bilan cardio recommandé et la surveillance péri opératoire"}, {"t": "p", "x": "Aucun examen ne doit retarder une chirurgie urgente"}, {"t": "p", "x": "Les chirurgies à haut risque programmées chez des patients graves sur le plan cardiaque doivent être anticipées et discutées collégialement par des séniors (= pas d'avis sur le bip de garde la veille de la chirurgie : transférer l'appel à votre sénior)"}, {"t": "p", "x": "Comme pour toutes vos prises en charge, en cas de doute valider les décisions avec un sénior"}, {"t": "h4", "x": "Comment réfléchir sur l'évaluation du patient en pré-opératoire de chirurgie non cardiaque ?"}, {"t": "p", "x": "1/ La chirurgie est-elle urgente ? (la réponse à cette question émane du chirurgien et de l'anesthésiste)"}, {"t": "p", "x": "OUI : aucun examen cardiologique ne doit retarder la chirurgie. Surveillance rapprochée péri opératoire si nécessaire (ECG, troponine, ETT ?)"}, {"t": "p", "x": "NON : estimer d'abord le risque opératoire lié à la chirurgie"}, {"t": "p", "x": "2/ Quel est le risque opératoire ?"}, {"t": "p", "x": "Faible risque (<1%) : chirurgies superficielles, autres chirurgies orthopédiques, gynécologiques et urologiques"}, {"t": "p", "x": "Risque intermédiaire (1-5%) : angioplastie vasculaire périphérique ou cure d'anévrysme par voie endovasculaire, neurochirurgie, transplantation rénale, autres chirurgies abdominales ou thoraciques, transplantation rénale, grosses chirurgies orthopédiques (rachis et hanche) gynécologiques et urologiques, neurochirurgie"}, {"t": "p", "x": "Haut risque (mortalité > 5%) : chirurgie aorte et gros vaisseaux (PABIF, amputations) et chirurgie vasculaire périphérique, grosse chirurgie abdominale (DPC, oesophagectomie, transplantation hépatique…), pneumonectomie et transplantation pulmonaire"}, {"t": "p", "x": "3/ Quelle est la conduite à tenir ?"}, {"t": "p", "x": "Chirurgie à bas risque : pas d'examen complémentaire recommandé, pas de contre-indication cardiologique à la chirurgie sauf si état cardiaque instable symptomatique (valvulopathie sévère symptomatique, IDM < 7 jours, angor instable (stade 4), insuffisance cardiaque décompensée) : différer la chirurgie si possible. Si impossible : avis de votre sénior."}, {"t": "p", "x": "Chirurgie à risque intermédiaire :"}, {"t": "p", "x": "Patient capable d'un effort ≥ 4 METs (= monter 1 étage) sans symptôme : pas d'examen complémentaire, pas de contre-indication cardiologique à la chirurgie"}, {"t": "p", "x": "Dans le cas contraire : test d'ischémie non invasif avant la chirurgie"}, {"t": "p", "x": "Chirurgie à haut risque :"}, {"t": "p", "x": "ETT systématique"}, {"t": "p", "x": "Test d'ischémie recommandé si ≥ 3 facteurs de risque (parmi diabète insulinorequérant, insuffisance cardiaque, antécédent infarctus ou angor, antécédent AIT/ AVC, DFG < 60 mL/min)"}, {"t": "h4", "x": "Comment manager au cas par cas un patient en péri-opératoire de chirurgie non-cardiaque"}, {"t": "p", "x": "Cardiopathie ischémique :"}, {"t": "p", "x": "Attention aux interruptions d'antiagrégants (cf. infra) : demander si une interruption est envisagée"}, {"t": "p", "x": "Arrêt IEC / poursuite BB"}, {"t": "p", "x": "Les indications de coronarographie / revascularisation sont les mêmes que dans la vraie vie"}, {"t": "p", "x": "Valvulopathies non sévères : pas de contre-indication ni bilan complémentaire"}, {"t": "p", "x": "RAC serré (S < 1 cm²) :"}, {"t": "p", "x": "Chirurgie urgente : ne pas différer. Surveillance hémodynamique ++, éviter variations de volémie"}, {"t": "p", "x": "RAC serré symptomatique : traitement du RAC (discussion TAVI / RVAo)"}, {"t": "p", "x": "RAC serré asymptomatique et chirurgie à haut risque : traitement du RAC"}, {"t": "p", "x": "RAC serré asymptomatique et chirurgie non haut risque : pas de CI cardio"}, {"t": "p", "x": "Rétrécissement mitral serré (S < 1.5 cm²) :"}, {"t": "p", "x": "Asymptomatique et sans HTP (PAPs < 50 mmHg en ETT) : pas de CI"}, {"t": "p", "x": "En péri opératoire : bon contrôle de la FC (lente = diastole longue = meilleur remplissage) et la volémie"}, {"t": "p", "x": "Symptomatique et/ou HTP : discussion collégiale séniorisée de VMP ou RVM (IIa) avant la chirurgie"}, {"t": "p", "x": "Insuffisances mitrale et aortique sévères :"}, {"t": "p", "x": "Asymptomatique et FEVG conservée : pas de CI à la chirurgie"}, {"t": "p", "x": "Symptomatique ou dysfonction VG : discussion collégiale séniorisée de RVM/RVAo avant la chirurgie"}, {"t": "p", "x": "Insuffisance cardiaque :"}, {"t": "p", "x": "Optimisation thérapeutique pré opératoire autant que possible :"}, {"t": "p", "x": "Traitement béta bloquant, IEC +/- anti aldostérone selon les recommandations."}, {"t": "p", "x": "Optimisation de la volémie (ni vide ni plein)"}, {"t": "p", "x": "Si chirurgie non urgente intermédiaire ou haut risque : différer si possible pour avoir 3 mois de recul entre le diagnostic d'IC et la chirurgie, et le temps de titrer la cardiopathie."}, {"t": "p", "x": "Facteurs associés à une surmortalité (avis du sénior pour ces patients +++)"}, {"t": "p", "x": "FEVG < 30%"}, {"t": "p", "x": "VO2 < 11 mL/kg/mn"}, {"t": "p", "x": "Elévation du NTproBNP"}, {"t": "h4", "x": "Gestion des antiagrégants chez les coronariens en péri-opératoire"}, {"t": "p", "x": "Aspirine : poursuite en péri opératoire si le risque hémorragique le permet (I). En général nécessité d'interruption pour chirurgie rachidienne et neurochirurgie : avis de votre sénior."}, {"t": "p", "x": "Anti P2Y12 :"}, {"t": "p", "x": "ATL >  6 mois : accord pour l'interruption chez un coronarien stable (Ib)"}, {"t": "p", "x": "ATL < 1 mois : différer toute chirurgie non urgente qui nécessiterait une interruption (III). Si chirurgie urgente : avis de votre sénior."}, {"t": "p", "x": "Zone grise : ATL entre 1 à 6 mois :"}, {"t": "p", "x": "Haut risque de thrombose (ATL sur infarctus ; antécédent de thrombose de stent ; diabétique pluritronculaire ; « rails » de stent ; multiples stents ; insuffisant rénal) : différer si possible la chirurgie. Si impossible : avis sénior."}, {"t": "p", "x": "Autres patients : accord pour l'interruption chez un coronarien stable (IIa)"}, {"t": "p", "x": "Dans tous les cas : pas de relai Lovenox en cas d'interruption des anti-agrégants plaquettaires ++"}, {"t": "p", "x": "Délai d'interruption des antiagrégants :"}]}, {"title": "Préparation à la coronarographie", "blocks": [{"t": "p", "x": "Patient à jeun depuis la veille à minuit"}, {"t": "li", "x": "Prévention de la néphropathie induite par les produits de contraste :", "l": 0}, {"t": "li", "x": "Arrêt si possible des médicaments néphrotoxiques et de la metformine +++", "l": 1}, {"t": "li", "x": "Hydratation de tous les patients :", "l": 1}, {"t": "li", "x": "FEVG  50% : 1 L de sérum physiologique 8h avant la procédure et 8h après", "l": 2}, {"t": "li", "x": "FEVG < 50% :  500 cc de sérum physiologique en 8 h avant la procédure et 8 h après, surveillance clinique (signes congestifs ?)", "l": 2}, {"t": "li", "x": "En cas d'insuffisance rénale : 1 mL/kg/h de 12h avant à 24h après (demi-dose si FEVG35% ou NYHA>2)", "l": 1}, {"t": "li", "x": "En cas d'insuffisance rénale dialysée : prévoir dialyse après la procédure +++", "l": 1}, {"t": "li", "x": "Reprise de la Metformine 48 h après l'injection de PDC (à bien spécifier sur l'ordonnance de sortie +++)", "l": 1}, {"t": "li", "x": "TR BAND : dégonfler le ballonnet de 2 cc toutes les heures à partir de la 2ème heure", "l": 0}]}, {"title": "Allergie aux produits de contraste iodés ou à l'aspirine", "blocks": [{"t": "h4", "x": "Allergie aux produits de contraste iodés"}, {"t": "p", "x": "L'allergie à l'iode n'existe pas, il s'agit d'une allergie à un produit de contraste iodé spécifique +++"}, {"t": "p", "x": "Rechercher impérativement le type d'allergie : anaphylaxie ? ou allergie sans critères de gravité ?"}, {"t": "p", "x": "En cas d'allergie non grave :"}, {"t": "li", "x": "Prednisone ou prednisolone (Cortancyl® ou Solupred®) : 0.5 mg/kg per os la veille au soir et le matin de l'examen", "l": 0}, {"t": "li", "x": "Hydroxyzine (Atarax®) : 1 mg/kg IV la veille au soiret le matin de l'examen (sans dépasser 100 mg)", "l": 0}, {"t": "p", "x": "En cas d'ATCD d'oedème de Quincke : discuter avec le chef de clinique et le coronarographiste de l'indication de l'examen) +++"}, {"t": "li", "x": "Medrol 16 mg IV : la veille au soir et le lendemain de l'examen", "l": 0}, {"t": "li", "x": "Hydroxyzine (Atarax®) : 1 mg/kg IV la veille au soir et le matin de l'examen (sans dépasser 100 mg)", "l": 0}, {"t": "p", "x": "Si réaction allergique après coronarographie, noter dans le compte rendu le produit de contraste utilisé puis adresser le patient en allergologie à l'hôpital Tenon +++"}, {"t": "h4", "x": "Protocole de désensibilisation à l'aspirine"}, {"t": "p", "x": "Pour tous les patients avec ATCD de réaction d'allure allergique dans les 30 à 180 minutes suivant la prise d'Aspirine."}, {"t": "p", "x": "Protocole :"}, {"t": "li", "x": "En USIC pour 24h.", "l": 0}, {"t": "li", "x": "Patient scopé et perfusé. 1 ampoule d'Adrénaline dans la chambre.", "l": 0}, {"t": "li", "x": "Prescrire le protocole dans Orbis (la pharmacie effectue la préparation)", "l": 0}, {"t": "li", "x": "Administration per os de doses progressivement croissantes d'Aspirine per os : 5 mg, 10 mg, 20 mg, 40 mg, 75 mg à 30 minutes d'intervalle.", "l": 0}, {"t": "li", "x": "Prise de TA, FC, saturation toutes les 30 minutes par l'IDE", "l": 0}, {"t": "li", "x": "Surveillance des signes cutanéo-muqueux par l'IDE.", "l": 0}, {"t": "li", "x": "ECG à la dernière prise.", "l": 0}, {"t": "li", "x": "Kardégic 75 mg le lendemain matin puis coronarographie. NE JAMAIS ARRETER LE KARDEGIC DANS LES SUITES.", "l": 0}, {"t": "p", "x": "Si urticaire : Polaramine 1 ampoule IV (5 mg/ml) et 40 mg de solumedrol IV."}, {"t": "p", "x": "Si bronchospasme :"}, {"t": "li", "x": "Salbutamol aérosol sous O2 (3 aérosols en 1h).", "l": 0}, {"t": "li", "x": "En l'absence d'amélioration rapide, adrénaline en perfusion continue de 0.1 µg/kg/min et appel du réanimateur", "l": 0}, {"t": "p", "x": "Si oedème de Quincke :"}, {"t": "li", "x": "Appel du réanimateur, oxygénothérapie, remplissage vasculaire", "l": 0}, {"t": "li", "x": "Bolus de Solumédrol 1 mg/kg IV", "l": 0}, {"t": "li", "x": "En l'absence d'amélioration rapide, adrénaline bolus 1 mg puis en perfusion continue de 0.1 µg/kg/min", "l": 0}]}, {"title": "Conduite à tenir devant une complication hémorragique grave sous traitement antithrombotique ou anticoagulant", "blocks": [{"t": "p", "x": "Un bilan d'hémostase complet est indispensable : numération plaquettaire, hémoglobine, TCA, TP, INR, fibrinogène, héparinémie."}, {"t": "h4", "x": "Hémorragies majeures dans un contexte de surdosage en AVK"}, {"t": "p", "x": "Les repères établis pour la Warfarine sont les suivants :"}, {"t": "p", "x": "Si 2 < INR < 3, le retour à 1 se fait en au moins 4 jours après arrêt du traitement."}, {"t": "p", "x": "Si 5 < INR < 9, le retour à un INR < 5 est obtenu en 24 heures après administration per os de 2 à 4 mg de vitamine K1 et arrêt du traitement."}, {"t": "p", "x": "En cas de surdosage asymptomatique chez un porteur de valve mécanique, ne pas administrer de vitamine K +++, arrêter les AVK et surveiller quotidiennement l'INR."}, {"t": "p", "x": "On peut neutraliser l'effet anti-vitamine K plus rapidement en cas d'hémorragie grave au sens des recommandations HAS 2009 (hémorragie définie par son abondance ou sa localisation) :"}, {"t": "p", "x": "(NB l'hémorragie grave est définie par l'instabilité hémodynamique, localisation pouvant engager un pronostic vital ou fonctionnel (tamponnade, médiastin, hématome compressif cervical, hémorragie intra-crânienne, hémorragie digestive), absence de contrôle par les moyens usuels (comme la sonde double courant en cas d'hématurie), nécessité d'une transfusion ou d'un geste hémostatique)"}, {"t": "p", "x": "En cas d'hémorragie grave menaçante, notamment d'hémorragie intra-crânienne, le pronostic neurochirurgical prime et il ne faut pas hésiter à antagoniser les AVK y compris en cas de présence d'une valve mécanique."}, {"t": "p", "x": "Prendre un avis neurochirurgical systématiquement +++"}, {"t": "p", "x": "Le concentré de complexe prothrombinique (CCP) disponible à Henri Mondor est le KANOKAD, dont la posologie dépend 1) de l'INR cible et 2) de l'INR initial."}, {"t": "p", "x": "Il s'agit d'une poudre et d'un solvant permettant de reconstituer 10 mL (250 UI) ou 20 mL (500 UI) de solution. La posologie maximale est de 100 mL pour un INR cible  1.5 et de 60 mL pour un INR cible  2.1."}, {"t": "table", "rows": [["", "INR cible  1.5", "INR cible  1.5", "INR cible  1.5", "INR cible  1.5", "INR cible  2.1", "INR cible  2.1", "INR cible  2.1", "INR cible  2.1"], ["INR initial", "2-2.5", "2.6-3", "3.1-3.5", "> 3.5", "2-2.5", "2.6-3", "3.1-3.5", "> 3.5"], ["Posologie (mL/kg)", "0.7", "0.9", "1.0", "1.3", "0", "0.4", "0.5", "0.8"]]}, {"t": "p", "x": "Un bilan d'hémostase une heure après le début de l'injection de Kaskadil puis toutes les 3 heures est indispensable (risque thrombopénique)."}, {"t": "h4", "x": "Hémorragies majeures sous héparinothérapie (HNF ou HBPM)"}, {"t": "p", "x": "L'antidote est le sulfate de protamine dose pour dose (1000 UI neutralisent 1000 UI d'HNF ou d'HBPM)"}, {"t": "p", "x": "La protamine antagonise l'activité anti-IIa de l'HBPM et seulement 50 à 60% de l'activité anti-Xa, elle reste cependant recommandée en cas de traitement par HBPM également"}, {"t": "p", "x": "La dose de protamine doit neutraliser la totalité de ce qui a été administré dans la dernière heure (si HNF) ou de la dernière injection sous-cutanée (si HBPM)"}, {"t": "p", "x": "Ne pas dépasser 5000 UI de protamine en une seule administration"}, {"t": "p", "x": "L'administration doit se faire en IV très lente sur au moins 10 minutes (réaction anaphylactique, hypertension artérielle pulmonaire aiguë, hypotension systémique)."}, {"t": "p", "x": "En cas d'HBPM, une réinjection de protamine est souvent nécessaire à distance compte tenu de la persistance de l'absorption de l'HBPM après l'injection sous cutanée."}, {"t": "h4", "x": "Hémorragies majeures sous antiagrégants plaquettaires (cf. fiche thrombopénie)"}, {"t": "p", "x": "Il faut transfuser des plaquettes à la posologie de 1 CPA (culot plaquettaire aphérèse) par 10 kg de poids corporel."}, {"t": "p", "x": "Il faut surveiller le reste du bilan d'hémostase."}, {"t": "p", "x": "Discuter l'arrêt des antiagrégants oraux au cas par cas (évaluation du risque thrombotique) si l'on souhaite avoir des plaquettes transfusées non inhibées."}, {"t": "h4", "x": "Hémorragies majeures sous thrombolytiques"}, {"t": "p", "x": "Il faut gérer le traitement associé (héparine et antiagrégant)."}, {"t": "p", "x": "On peut recourir à l'Aprotinine (Antagosan) à la dose de 275 unités en IV sur 10 minutes ou à l'acide tranexamique (Exacyl) à la dose de 10 mg/kg toutes les 8 heures en adaptant la posologie en cas d'insuffisance rénale."}, {"t": "p", "x": "En cas d'hypofibrinogénémie profonde, il est recommandé d'obtenir une concentration en fibrinogène > 1 g/l. La posologie suggérée est de 1 g de fibrinogène pour 20 kg de poids si le fibrinogène plasmatique est à moins de 0,5 g/l. Ce produit est disponible à la pharmacie (flacon à reconstituer)."}, {"t": "p", "x": "Appeler le réanimateur de garde pour vous faire aider."}]}, {"title": "Thrombopénie", "blocks": [{"t": "p", "x": "1. Sous anti GP IIb/IIIa :"}, {"t": "li", "x": "Bilan d'hémostase avant la mise sous GP IIb/IIIa (généralement fait en coronarographie)", "l": 0}, {"t": "li", "x": "Surveillance des plaquettes à H1 puis H4", "l": 0}, {"t": "p", "x": "En cas de thrombopénie sous anti GPIIb/IIIa :"}, {"t": "li", "x": "Arrêt de la perfusion si chute des plaquettes >50% ou plaquettes < 50 G/L ou signe hémorragique sévère", "l": 0}, {"t": "li", "x": "Transfusion de plaquettes si plaquettes < 20 G/L et signes hémorragiques", "l": 0}, {"t": "li", "x": "Suivi des plaquettes deux fois par jour jusqu'à ré ascension.", "l": 0}, {"t": "li", "x": "Éliminer les autres étiologies : CIVD, toxiques, médicamenteuses, infectieuses.", "l": 0}, {"t": "p", "x": "2. Thrombopénie induite à l'héparine :"}, {"t": "li", "x": "Type I : bénigne, non immunologique, sans complication thrombotiques", "l": 0}, {"t": "li", "x": "Type II : grave, immunologique, complications thrombotiques", "l": 0}, {"t": "li", "x": "TIH à suspecter si :", "l": 0}, {"t": "li", "x": "Thrombopénie 5 à 8 jours après le début de l'héparinothérapie (plus court si exposition préalable à l'héparine)", "l": 0}, {"t": "li", "x": "Plaquettes < 100 G/L ou une diminution d'au moins 40%", "l": 0}, {"t": "li", "x": "Thrombose de prothèse ou évènement thrombotique en post opératoire", "l": 0}, {"t": "li", "x": "En cas de suspicion de TIH :", "l": 0}, {"t": "li", "x": "contrôle sur tube citraté", "l": 1}, {"t": "li", "x": "éliminer une CIVD (TP<50%, plaquettes <50 G/L et fibrinogène <1 g/L)", "l": 1}, {"t": "li", "x": "évaluer le score 4T", "l": 1}, {"t": "table", "rows": [["Score 4T", "2 points", "1 point", "0 point"], ["Thrombopénie", "Chute >50% ou nadir entre 20-100 G/L sans chirurgie dans les 3 jours", "Chute entre 30 et 50% ou nadir entre 10-20 G/L ou chute > 50% dans les 3 jours post op", "Chute de 30% ou nadir < 10 G/L"], ["Timing", "5 à 10 jours après introduction de l'héparine ou 24h si exposition récente (5 à 30 jours) à l'héparine", "- Après >10jours \nOu \n- 24 si exposition semi récente (31 à 100 jours)", "Avant 4 jours de traitement sans héparine dans les 100 derniers jours"], ["Thrombose", "Thrombose artérielle ou veineuse \nNécrose cutanée \nHémorragie des surrénales", "Extension ou récidive d'une thrombose pré existante ou suspicion nouvelle thrombose ou érythème cutané après injection d'héparine", "Pas d'évènement thrombotique"], ["Autres causes de thrombopénie ?", "Aucune", "Possible", "Certaine"]]}, {"t": "p", "x": "Score 0 à 3 : faible (poursuite de l'héparine). Pas de tests biologiques"}, {"t": "p", "x": "Score 4 à 5 : Intermédiaire. Arrêt héparine. Tests biologiques (antiPF4 et test d'activation)"}, {"t": "p", "x": "S  {"t": "li", "x": "Rx thorax le jour même (J0) sauf chgt boitier", "l": 0}, {"t": "li", "x": "Lever H6 avec IDE sauf si anesthésie", "l": 0}, {"t": "li", "x": "Gestion des anticoagulants :", "l": 0}, {"t": "li", "x": "Poursuite AVK", "l": 1}, {"t": "li", "x": "Reprise le lendemain soir des AOD sauf indication contraire dans CR", "l": 1}, {"t": "li", "x": "Rediscuter ttt anticoagulant avec rythmo si hématome", "l": 1}, {"t": "li", "x": "Pas d'HBPM", "l": 1}, {"t": "p", "x": "Suites Postopératoires"}, {"t": "p", "x": "Radio thorax le lendemain systématique (y compris les chgt de boitier)"}, {"t": "p", "x": "Lever lendemain matin si anesthésie sinon J0 à H6 avec IDE"}, {"t": "p", "x": "Compressif 48H"}, {"t": "p", "x": "Vérifier que le patient a bien eu son carnet de PM/DAI"}, {"t": "p", "x": "Reprogrammation avant sortie (faite au bloc pour chgt boitier) : appeler un rythmologue"}, {"t": "p", "x": "Pour CRT :"}, {"t": "p", "x": "Contrôle péricarde avant sortie si CRT et si symptômes"}, {"t": "p", "x": "ECG de Sortie pour CRT"}, {"t": "p", "x": "Hospitalisation pour opti-CRT à prévoir"}, {"t": "p", "x": "Pour PM/DAI/changement de sonde :"}, {"t": "p", "x": "CS rythmo M3-6 de reprogrammation (sauf si suivi dans un centre qui a des rythmologues)"}, {"t": "p", "x": "Sortie à 48h si RàS"}, {"t": "p", "x": "Pour chgt de boitier :"}, {"t": "p", "x": "CS rythmo M6"}, {"t": "p", "x": "Sortie à 24h si RàS"}]}]}, {"title": "Maladie coronaire", "fiches": [{"title": "Infarctus du myocarde - STEMI", "blocks": [{"t": "h4", "x": "Diagnostic initial"}, {"t": "p", "x": "STEMI = douleur thoracique typique + sus-décalage du segment ST dans au moins 2 dérivations correspondant au même territoire coronaire"}, {"t": "li", "x": "En V2/V3 :", "l": 0}, {"t": "li", "x": "≥ 2.5mm chez les hommes < 40 ans", "l": 1}, {"t": "li", "x": "≥ 2mm chez les hommes ≥ 40 ans", "l": 1}, {"t": "li", "x": "≥ 1.5mm chez les femmes", "l": 1}, {"t": "li", "x": "Dans toutes les autres dérivations : ≥ 1mm quel que soit l'âge ou le sexe", "l": 0}, {"t": "p", "x": "Autres présentations électriques :"}, {"t": "li", "x": "Bloc de branche de novo", "l": 0}, {"t": "li", "x": "Anomalie du ST (concordant) sur bloc de branche connu", "l": 0}, {"t": "li", "x": "Rythme électro-entrainé", "l": 0}, {"t": "p", "x": "Autres présentations cliniques atypiques : sujets âgés, femmes, diabétiques, choc cardiogénique"}, {"t": "h4", "x": "Gestion des anti-thrombotiques"}, {"t": "li", "x": "Patient sous Aspirine au long cours : recharger par aspirine 250 mg IVD.", "l": 0}, {"t": "li", "x": "Patient sous inhibiteur P2Y12 au long cours :", "l": 0}, {"t": "li", "x": "Sous clopidogrel : switch pour ticagrelor avec dose de charge 180 mg per os (Classe I, B)", "l": 0}, {"t": "li", "x": "Sous ticagrelor : pas de nouvelle dose de charge", "l": 0}, {"t": "li", "x": "Patient déjà sous anticoagulation curative (AVK ou NACO) : pas de ticagrelor ni prasugrel ++", "l": 0}, {"t": "li", "x": "Dose de charge en aspirine 250 mg IV", "l": 0}, {"t": "li", "x": "Dose de charge en clopidogrel : 600 mg PO (8 comprimés)", "l": 0}, {"t": "li", "x": "Bolus HNF 5000 UI IVD (si INR < 2,5 et quel que soit le temps depuis la dernière prise de NACO) puis poursuite de l'anticoagulation curative", "l": 0}, {"t": "h4", "x": "Revascularisation coronaire : différents modes"}, {"t": "p", "x": "Angioplastie primaire percutanée : méthode de choix < 120 min après le premier contact médical."}, {"t": "p", "x": "Fibrinolyse : uniquement dans les centres > 120 minutes d'une salle de cathétérisme ET en l'absence de contre-indications (IA) :"}, {"t": "li", "x": "PROTOCOLE ACTILYSE", "l": 0}, {"t": "table", "rows": [["", "Bolus IV", "30 min", "60 min"], ["65 kg et +", "15 mg", "50 mg", "35 mg"], ["< 65 kg", "15 mg", "0.75 mg/kg (max 50 mg)", "0.5 mg/kg (max 35 mg)"]]}, {"t": "li", "x": "Contre-indications à la fibrinolyse (ESC 2017) :", "l": 0}, {"t": "table", "rows": [["Absolues", "Relatives"], ["Antécédent d'hémorragie intracranienne\nMAV ou néoplasie cérébrale \nAVC ischémique < 6 mois\nTC/trauma/chirurgie < 1 mois\nDissection aortique\nHémorragie digestive < 1 mois\nSaignement actif\nPoints de ponction non compressibles < 24h (PBH, PL...)", "HTA non contrôlée (> 180mmHg / 110 mmHg)\nAIT < 6 mois\nIntervention chirurgicale< 3 mois\nGrossesse / < 1 mois post partum\nUlcère gastro-duodénal actif\nAnticoagulation curative en cours\nInsuffisance hépatocellulaire avancée\nEndocardite infectieuse\nRéanimation ACR prolongée / trauma"]]}, {"t": "h4", "x": "Prise en charge en USIC"}, {"t": "li", "x": "Bilan biologique d'entrée complet : NFS, plaquettes, hémostase, iono, BHC, CPK, troponine, NT-proBNP. Le bilan lipidique et l'HbA1c sont à réaliser le matin à jeun.", "l": 0}, {"t": "li", "x": "Radio de thorax", "l": 0}, {"t": "li", "x": "Hospitalisation d'au moins 24h en USIC ± passage en post-USIC à J1 si stabilité et SCA non compliqué, le tout pour un total de 3 jours minimum.", "l": 0}, {"t": "li", "x": "Surveillance ECG et scope/télémétrie chaque jour.", "l": 0}, {"t": "li", "x": "Pour les ST+ antérieurs, ETT+Sonovue à J3 afin d'éliminer un thrombus intra VG avant la sortie.", "l": 0}, {"t": "li", "x": "Revascularisation des lésions résiduelles à discuter avec le coronarographiste avant sa sortie d'hospitalisation.", "l": 0}]}, {"title": "NSTEMI", "blocks": [{"t": "p", "x": "Quelques chiffres :"}, {"t": "li", "x": "1ère cause de DT (210.000/an France) - Mortalité à un an de 5-6%", "l": 0}, {"t": "li", "x": "12% de MACE (DC, IDM, AVC) à un an (maximum les 30 premiers jours)", "l": 0}, {"t": "li", "x": "3% hémorragie grave la 1e année sous bithérapie (maximum les 30 premiers jours)", "l": 0}, {"t": "li", "x": "6% hémorragie grave la 1e année sous trithérapie (AVK-aspirine et clopidogrel)", "l": 0}, {"t": "h4", "x": "Objectif #1 : Etablir la probabilité diagnostique d'une douleur thoracique"}, {"t": "h4", "x": "Objectif #2 : établir le niveau de risque"}, {"t": "p", "x": "Clinique : arrêt cardiaque, état de cho
