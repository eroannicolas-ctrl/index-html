c, insuffisance cardiaque, douleur persistante ou récidivante."}, {"t": "p", "x": "Examen à réaliser : ECG dans les 10 minutes (IB) - troponine dans l'heure (IA) -Echographie cardiaque (IC) - D-Dimères et RX thorax pour le diagnostic différentiel -NFS- Iono-créatinémie -Hémostase."}, {"t": "p", "x": "Interprétation de la troponine"}, {"t": "p", "x": "Troponine >5 fois valeur de référence : VPP de 90% pour un IDM"}, {"t": "p", "x": "Troponine=3 fois valeur de référence : VPP=50% pour un IDM"}, {"t": "p", "x": "Troponine <0 ou < valeur de référence (<14 pour la norme à Henri Mondor) :"}, {"t": "p", "x": "- Forte VPN pour exclure un IDM"}, {"t": "p", "x": "- Valable sur un dosage >6H de la douleur"}, {"t": "p", "x": "- ou <6H avec une deuxième tropo H+3 stable (∆<14)"}, {"t": "li", "x": "Stratégie diagnostique", "l": 0}, {"t": "li", "x": "Si probabilité diagnostique <5% : rechercher un diagnostic alternatif", "l": 0}, {"t": "li", "x": "Si probabilité diagnostique 5-15% : faire un test fonctionnel avec imagerie si FDRCV, ECG anormal, score calcique coronaire >0", "l": 0}, {"t": "li", "x": "Si probabilité diagnostique >15% : faire un test fonctionnel avec imagerie", "l": 0}, {"t": "li", "x": "Si signes de gravité (Objectif 2) : coronarographie", "l": 0}, {"t": "h4", "x": "Objectif #3 : traitement (stabiliser la plaque, réduire travail cardiaque et revasculariser)"}, {"t": "li", "x": "Risordan IVSE  1 mg/h avec un objectif de PAM=70mmHg si douleur", "l": 0}, {"t": "li", "x": "Bisoce 5 mg : en l'absence d'insuffisance cardiaque, dysfonction VG sévère, BAV et asthme", "l": 0}, {"t": "li", "x": "Fondaparinux 2.5 mg matin et soir ou héparine 5000 UI en bolus", "l": 0}, {"t": "li", "x": "Atorvastatine 80 mg/jour (objectif LDL <0.7g/L)", "l": 0}, {"t": "li", "x": "Antiagrégant plaquettaire #1 : Aspirine 250 mg en dose de charge puis 75 mg/J", "l": 0}, {"t": "li", "x": "Antiagrégant #2 : Prasugrel [selon la coronarographie] 60mg en charge puis 10mg/J (5 mg si <60 kg et > 75 ans) pendant un an.", "l": 0}, {"t": "p", "x": "Coronarographie"}, {"t": "li", "x": "Dans les 2H en cas d'instabilité hémodynamique, rythmique ou d'insuffisance cardiaque", "l": 0}, {"t": "li", "x": "Dans les 24H en cas d'élévation de la troponine ou modification de l'ECG ou score de GRACE>140 (hypotension, tachycardie, insuffisance cardiaque, arrêt cardiaque, troponine+, ∆ECG)", "l": 0}]}, {"title": "Traitement du coronarien en sortie d'USIC", "blocks": [{"t": "p", "x": "Traitement médicamenteux"}, {"t": "li", "x": "Anti-thrombotiques : bithérapie pendant 12 mois. En cas de de risque hémorragique élevé, la durée pourra être réduite à 6 mois. Un traitement par Aspirine 75 mg/j seul A VIE sera poursuivi au bout des 12 mois.", "l": 0}, {"t": "p", "x": "Patient sous anticoagulants :"}, {"t": "p", "x": "Ne pas utiliser le ticagrelor ni le prasugrel"}, {"t": "p", "x": "Trithérapie par anticoagulant + aspirine + clopidogrel pendant 3 à 6 mois puis bithérapie par anticoagulant + clopidogrel selon la balance entre risque hémorragique et thrombotique."}, {"t": "p", "x": "La dose de NACO peut être ajustée au risque hémorragique et CHADS-VASC2 (IIa, ELIQUIS 2.5 mg x 2/jour)"}, {"t": "li", "x": "IPP : en cas de bi-antiagrégation plaquettaire.", "l": 0}, {"t": "li", "x": "ß-bloquants : débutés à J1 chez tous les patients (Classe IA si FEVG<40% et/ou insuffisance cardiaque ; Classe IIaB chez les autres) en l'absence de contre-indication (choc cardiogénique, insuffisance cardiaque aigue, troubles conductifs de haut degré, asthme) avec titration progressive selon la tolérance. Objectif FC 60/min.", "l": 0}, {"t": "p", "x": "Infarctus inférieur ou extension VD : introduction différée à 48h (voire contre-indiquée !)"}, {"t": "p", "x": "Contre-indication aux ß-bloquants (asthme ou BPCO stade III à IV) : inhibiteur calcique bradycardisant (Verapamil, Isoptine) si FEVG >50% et en l'absence d'insuffisance cardiaque."}, {"t": "li", "x": "Inhibiteur de l'enzyme de conversion (IEC) : débutés à J1 chez tous les patients (Classe IA si FEVG<40%, insuffisance cardiaque clinique, diabétique, ou HTA, classe IIaA chez les autres).", "l": 0}, {"t": "p", "x": "Si PAS<100 mmHg, l'introduction des IEC doit être retardée."}, {"t": "p", "x": "Si insuffisance rénale sévère, instauration prudente (on tolère 30% de variation de la créatinine)."}, {"t": "p", "x": "Si mauvaise tolérance ou d'allergie aux IEC, utiliser un ARA II."}, {"t": "p", "x": "Patient déjà sous ARA II  laisser l'ARA II."}, {"t": "li", "x": "Anti-aldostérone : dès J1 si FEVG<40% (Classe IB), en l'absence de contre-indication (DFG<30 mL/min et hyperkaliémie >5 mmol/L).", "l": 0}, {"t": "li", "x": "Statine : à fortes doses dans les 24h quelque soit le LDL-c du patient à l'entrée. Objectif LDL-c <0,7 g/ L ou diminution d'au moins 50%. Chez les patients déjà sous statines à l'arrivée, la dose doit être majorée à la posologie maximale. En cas de mauvaise tolérance aux statines : Ezetimibe (Ezetrol) 10 mg/j.", "l": 0}, {"t": "p", "x": "En cas de thrombus intra-VG : trithérapie pour une durée d'au moins 6 mois. Seuls les AVK ont l'AMM, en discuter au cas par cas."}, {"t": "p", "x": "Prise en charge des facteurs de risque (+++)"}, {"t": "li", "x": "Arrêt du tabac +++ (IA) : Proposer substituts nicotiniques (Nicopatch 15mg/ j à adapter selon la consommation). Contacter l'addictologie (IDE 13272) si volonté et après accord du patient. Les patients seront revus par le service d'addictologie d'Albert Chenevier.", "l": 0}, {"t": "li", "x": "Contrôle de la pression artérielle : objectif PA < 140/90 mmHg.", "l": 0}, {"t": "li", "x": "Contrôle du bilan lipidique : objectif LDLc<0.7 g/L", "l": 0}, {"t": "li", "x": "Diabète : objectif HbA1c < 7%. En cas de découverte de diabète au cours de l'hospitalisation ou si diabète très déséquilibré sous traitement, prendre un avis auprès du service de diabétologie (Dr Droumaguet 36 258).", "l": 0}, {"t": "li", "x": "Règles hygiéno-diététiques et perte de poids : régime méditerranéen et équilibré, faible en graisse saturée. Faire une prescription Orbis (dans l'onglet demandes/prescriptions) pour consultation par la diététicienne du service au lit du patient.", "l": 0}, {"t": "li", "x": "Arrêt de l'alcool", "l": 0}, {"t": "li", "x": "Activité physique quotidienne", "l": 0}, {"t": "li", "x": "Cas particulier du patient âgé :", "l": 0}, {"t": "li", "x": "Anti agrégation plaquettaire : privilégier aspirine + clopidogrel si risque hémorragique élevé", "l": 0}, {"t": "li", "x": "HTA : Objectif de PAS moins strict", "l": 0}, {"t": "li", "x": "Diabète : Cible HbA1c 7-7,5%", "l": 0}, {"t": "li", "x": "Si comorbidités / perte d'autonomie : appeler Dr Krypciak (gériatrie, DECT 36555)", "l": 0}, {"t": "li", "x": "Oxazepam en cas d'agitation (demi-vie courte)", "l": 0}, {"t": "li", "x": "Anticiper le devenir : UGA, UMG, faire SSR", "l": 0}, {"t": "p", "x": "Réadaptation cardiaque :"}, {"t": "p", "x": "Bénéfice sur la réduction de la mortalité cardiovasculaire (Classe I, A). Assure une réhabilitation à l'effort, la titration des thérapeutiques, la poursuite de l'éducation du patient et le contrôle des facteurs de risques cardio-vasculaires. Elle doit être réalisée chez tous les patients en prenant compte de leur âge et de leur capacité fonctionnelle à l'effort (patients les plus susceptibles d'en profiter : STEMI, dysfonction VG ou troubles de cinétique persistants)."}, {"t": "p", "x": "Réalisée dans le service de réadaptation cardiaque de l'Hôpital Albert Chenevier, avec 2 modalités :"}, {"t": "li", "x": "Hospitalisation complète (HDS ou hospitalisation conventionnelle) : sujets jeunes avec dysfonction VG<40% ou infarctus compliqué. Faire une demande trajectoire dès J1 et appeler le responsable de l'unité (Dr Sandrine Peyrot, DECT 13182).", "l": 0}, {"t": "li", "x": "HDJ : patient autonome sans trouble cognitifs, infarctus non compliqué avec FEVG conservée ou souhait du patient : remettre une prescription de réadaptation cardiaque en externe à la sortie avec le n° de téléphone, le patient appelle pour prendre rendez-vous (Tél : 01.49.81.30.27).", "l": 0}, {"t": "p", "x": "NB : Arrêt de travail d'un mois."}, {"t": "p", "x": "Suivi au long cours"}, {"t": "li", "x": "Cardiologue traitant :", "l": 0}, {"t": "li", "x": "Si cardiologue traitant : le patient sera revu par son cardiologue traitant", "l": 0}, {"t": "li", "x": "Si pas de suivi cardiologique antérieur : une liste des cardiologues de ville correspondant du service est disponible en USIC, possibilité aussi de suivi en USIC avec l'un des médecins de l'USIC ou coronarographiste", "l": 0}, {"t": "li", "x": "En cas de dysfonction VG :", "l": 0}, {"t": "li", "x": "Prévoir HDJ cardio-métabolique à 6 semaines avec :", "l": 1}, {"t": "li", "x": "ETT : réévaluation de la FEVG sous traitement médical", "l": 2}, {"t": "li", "x": "Consultation rythmologie (discuter DAI)", "l": 2}, {"t": "li", "x": "Holter ECG", "l": 2}, {"t": "li", "x": "+/- test d'ischémie si lésion résiduelle à tester.", "l": 2}, {"t": "li", "x": "Prévoir également consultation de titration des traitements en CCICC (prendre RDV auprès de la secrétaire hospitalière d'USIC)", "l": 1}, {"t": "li", "x": "En cas de lésion résiduelle à tester : test d'ischémie à 3 mois à programmer", "l": 0}, {"t": "li", "x": "Prise en charge des facteurs de risque cardiovasculaires :", "l": 0}, {"t": "li", "x": "En cas de nombreux facteurs de risques associés, un HDJ cardio-métabolique à distance peut être programmé.", "l": 0}, {"t": "li", "x": "Une programmation avec au moins 3 examens et une prise de sang complète doit être remplie et remise à la secrétaire hospitalière à la sortie du patient (programmatrice : Marie-Line au 78149).", "l": 0}]}, {"title": "Indications de revascularisation dans l'angor stable et l'ischémie silencieuse", "blocks": [{"t": "p", "x": "Les chiffres :"}, {"t": "li", "x": "8% de mortalité à 5 ans dans COURAGE (70% de bi ou tritronculaires)", "l": 0}, {"t": "li", "x": "9% de mortalité à 5 ans d'un TC revascularisé par chirurgie", "l": 0}, {"t": "li", "x": "13% de mortalité à 5 ans pour un TC revascularisé par ATL", "l": 0}, {"t": "li", "x": "8-9% de mortalité à 5 ans dans SYNTAX pour les tritronculaires traités par ATL ou pontage", "l": 0}, {"t": "li", "x": "11% de mortalité à 5 ans pour un diabétique tritronculaire traité par pontage", "l": 0}, {"t": "li", "x": "16% de mortalité à 5 ans pour un diabétique tritronculaire traité par ATL", "l": 0}, {"t": "li", "x": "30% pour les tritronculaires avec dysfonction VG<35%", "l": 0}, {"t": "p", "x": "Objectif: Le but de la revascularisation est d'améliorer le pronostic ou les symptômes. L'efficacité du traitement médical sur la mortalité a été démontré dans l'étude COURAGE, cependant 30% des patients auront recours à une revascularisation. Ces patients peuvent être identifiés par un test d'ischémie (FFR ou imagerie). L'ATL d'une lésion avec FFR<0.8 (étude FAME2) permet de réduire le taux de revascularisation urgente sans impact sur la mortalité et le risque IDM."}, {"t": "table", "rows": [["Lésions coronaires à revasculariser avec une ischémie identifiée", "Lésions coronaires à revasculariser avec une ischémie identifiée", "Classe", "Niveau"], ["Pronostic", "Tronc commun serré (>50%)", "I", "A"], ["Pronostic", "IVA proximale serrée (>50%)", "I", "A"], ["Pronostic", "Bi- ou tri- tronculaires avec FEVG ≤35%", "I", "A"], ["Pronostic", "Ischémie >10% du VG ou FFR ≤0.80", "I", "B"], ["Pronostic", "Artère unique fonctionnelle serrée >50%", "I", "C"], ["Symptômes", "Sténose symptomatique malgré un traitement médical optimal", "I", "A"]]}]}]}, {"title": "Urgences cardio-vasculaires", "fiches": [{"title": "Maladie thrombo-embolique veineuse", "blocks": [{"t": "p", "x": "Dans la mesure du possible, toute EP doit être hospitalisée en USIC ou en aval d'USIC. En l'absence de place, ces patients peuvent être hospitalisés en salle de cardiologie, en chirurgie cardiaque (hébergement), au département d'aval des urgences ou en médecine interne."}, {"t": "p", "x": "Recueillir systématiquement dans l'observation d'entrée :"}, {"t": "p", "x": "ATCD familiaux et personnels de thrombose veineuse et artérielle et de tbl de l'hémostase"}, {"t": "p", "x": "arguments pour une néoplasie sous-jacente (altération de l'état général, signes fonctionnels, saignements digestifs, urinaires ou gynécologiques,…)"}, {"t": "p", "x": "existence éventuelle d'un facteur déclenchant :"}, {"t": "p", "x": "Pour toutes les EP, la durée du traitement anticoagulant et l'indication éventuelle d'un bilan de thrombophilie ou d'explorations étiologiques complémentaires doivent être systématiquement discutées en RCP Thrombose. A titre d'information :"}, {"t": "table", "rows": [["Présence d'un facteur déclenchant identifié", "Présence d'un facteur déclenchant identifié"], ["Premier épisode", "3 mois"], ["≥ 2ème épisode", "Au long cours, selon risque hémorragique"], ["Absence de facteur déclenchant identifié", "Absence de facteur déclenchant identifié"], ["Premier épisode", "Au moins 3 mois, au long cours si possible*"], ["≥ 2ème épisode", "Au long cours, selon risque hémorragique*"], ["En cas de cancer associé", "En cas de cancer associé"], ["Tant que le cancer est considéré comme actif (HBPM uniquement)", "Tant que le cancer est considéré comme actif (HBPM uniquement)"]]}, {"t": "p", "x": "Toutes les embolies pulmonaires doivent être revues en consultation à 3 mois par l'un des médecins de l'USIC avec une échographie cardiaque de contrôle (préférentiellement Dr FARD, Dr HUGUET, Pr LIM)."}, {"t": "p", "x": "Les embolies pulmonaires ou TVP traitées de manière ambulatoire doivent être revues sous 7 jours par un cardiologue (plages de consultation urgence thrombose) pour refaire le point sur la situation clinique, avec une échographie cardiaque si elle n'a pas été réalisée lors du diagnostic  prendre impérativement une étiquette du patient aux urgences s'il sort directement +++"}, {"t": "h4", "x": "EMBOLIE PULMONAIRE GRAVE"}, {"t": "p", "x": "Définition : EP accompagnée de"}, {"t": "p", "x": "choc cardiogénique (obstructif) : PAS < 90 mmHg pendant > 15 minutes, à l'exclusion des autres causes d'état de choc (septique, hypovolémique, trouble du rythme)"}, {"t": "p", "x": "et/ou arrêt cardio-circulatoire"}, {"t": "p", "x": "Stratégie diagnostique"}, {"t": "p", "x": "Patient transportable : angioscanner thoracique en urgence ;"}, {"t": "p", "x": "Patient non transportable : échographie cardiaque en urgence par le cardiologue de garde. La mise en évidence d'un coeur pulmonaire aigu (ventricule droit dilaté, septum paradoxal, HTP systolique) dans un contexte d'état de choc cardiogénique permet d'affirmer le diagnostic d'EP grave (rechercher visualisation du thrombus dans l'AP ou dans l'une de ses branches proximales)."}, {"t": "p", "x": "L'échographie cardiaque peut être une alternative à l'angioscanner thoracique en cas d'insuffisance rénale, mais dans la mesure du possible et en fonction de la balance bénéfice/risque, il est préférable de confirmer le diagnostic grâce à un angioscanner thoracique."}, {"t": "p", "x": "Stratégie thérapeutique de l'EP grave"}, {"t": "p", "x": "Orientation du patient : réanimation ou USIC, éviter la mise en place de KT centraux ou artériels chez le malade thrombolysé (risque de saignements++)"}, {"t": "p", "x": "Traitement de référence : thrombolyse intraveineuse, en respectant les contre-indications"}, {"t": "table", "rows": [["Contre-indications absolues (peuvent devenir relatives si traitement de sauvetage)", "Antécédent d'AVC hémorragique ou d'AVC sans cause retrouvée, quelle qu'en soit l'ancienneté\nAntécédent d'AVC ischémique dans les 6 mois précédents\nLésion ou néoplasie du système nerveux central\nTraumatisme, chirurgie ou traumatisme crânien majeurs dans les 3 semaines précédentes\nSaignement digestif dans les 30 derniers jours\nRisque hémorragique accru connu"], ["Contre-indications relatives", "Accident ischémique transitoire dans les 6 mois précédents\nTraitement anticoagulant en cours\nGrossesse (en incluant les 7 jours post-partum)\nPoint de ponction incompressible\nArrêt cardiaque / réanimation dans un contexte traumatologique\nHypertension artérielle réfractaire (PAS > 180 mmHg)\nPathologie hépatique avancée\nUlcère gastroduodénal évolutif"]]}, {"t": "p", "x": "Conduite pratique de la thrombolyse :"}, {"t": "p", "x": "ACTILYSE® (altéplase) : 100 mg sur 2 heures ou 0,6 mg/kg sur 15 min (dose maximale 50 mg sur 15 minutes si ce protocole d'injection est choisi)"}, {"t": "p", "x": "Débuter héparine IVSE dès que TCA < 3, à une posologie curative (débuter à 300 UI/kg/24h puis adapter toutes les 4 à 6 h pour anti-Xa HNF entre 0,3 et 0,6)"}, {"t": "p", "x": "A la suite d'un traitement thrombolytique :"}, {"t": "li", "x": "héparine IVSE pendant 24 à 48 heures ou jusqu'à stabilisation hémodynamique", "l": 0}, {"t": "li", "x": "relais par des AVK (AOD non testés dans ce contexte d'EP grave)", "l": 0}, {"t": "p", "x": "En cas de contre-indication ou d'échec de la thrombolyse :"}, {"t": "p", "x": "Débuter le traitement anticoagulant par héparine IVSE"}, {"t": "p", "x": "Discuter avec le radiologue interventionnel d'une éventuelle thrombectomie percutanée (appel du radiologue de garde qui contactera le radiologue interventionnel d'astreinte)"}, {"t": "p", "x": "Discuter avec le réanimateur de chirurgie cardiaque et le chirurgien cardiaque d'une éventuelle thrombectomie chirurgicale et/ou assistance circulatoire"}, {"t": "p", "x": "Traitement associé : mesures symptomatiques"}, {"t": "p", "x": "oxygénothérapie si besoin"}, {"t": "p", "x": "remplissage vasculaire très prudent (au maximum 500 cc de sérum salé isotonique, l'urgence étant la désobstruction artérielle pulmonaire)"}, {"t": "p", "x": "dobutamine en cas de dysfonction VD sévère (débuter à 5 gamma/kg/min) et noradrénaline pour optimiser la perfusion rénale et coronaire droite (cible PAM>65 mmHg)"}, {"t": "p", "x": "les mesures associées ne doivent pas retarder la désobstruction artérielle pulmonaire ++"}, {"t": "h4", "x": "EMBOLIE PULMONAIRE NON GRAVE"}, {"t": "p", "x": "Détermination de la probabilité pré-test : score de Genève"}, {"t": "table", "rows": [["Item", "Points"], ["ATCD d'EP ou de thrombose veineuse profonde", "1"], ["Fréquence cardiaque\n75 à 94/min\n≥ 95/min", "1\n2"], ["Chirurgie ou fracture dans les 30 jours précédents", "1"], ["Hémoptysie", "1"], ["Cancer actif", "1"], ["Douleur unilatérale d'un membre inférieur (MI)", "1"], ["Douleur à la palpation d'un MI et oedème unilatéral du MI", "1"]]}, {"t": "p", "x": "Stratégie diagnostique résumée :"}, {"t": "p", "x": "D-Dimères :"}, {"t": "li", "x": "La valeur prédictive négative des D-Dimères n'est acceptable qu'en cas d'embolie pulmonaire non-probable ;", "l": 0}, {"t": "li", "x": "Au-delà de 50 ans, le seuil de positivité est ajusté et vaut 10 fois l'âge ;", "l": 0}, {"t": "li", "x": "La négativité des D-Dimères en cas de grossesse et de cancer permet d'exclure l'embolie pulmonaire avec la même validité.", "l": 0}, {"t": "p", "x": "Angioscanner thoracique :"}, {"t": "p", "x": "En cas de contre-indications relatives ou absolues à l'angioTDM thoracique (grossesse, antécédent d'allergie sévère aux produits de contraste iodés, insuffisance rénale sévère avec clairance de la créatinine < 30 mL/min), les alternatives sont :"}, {"t": "li", "x": "la scintigraphie de ventilation/perfusion (si radiographie thoracique normale, il est possible de ne réaliser qu'une scintigraphie de perfusion, notamment chez la femme enceinte)", "l": 0}, {"t": "li", "x": "l'écho-doppler veineux des 4 points : une TVP proximale (supra-poplitée) permet de retenir le diagnostic d'EP sans nécessité d'angioTDM", "l": 0}, {"t": "li", "x": "l'échographie cardiaque : la valeur prédictive positive n'est acceptable qu'en cas de choc cardiogénique. Dans les autres situations, cet examen n'a pas une valeur prédictive positive ou négative suffisantes pour être recommandé pour le diagnostic.", "l": 0}, {"t": "p", "x": "Rôle de l'échographie cardiaque : signes échographiques à rechercher"}, {"t": "h4", "x": "ORIENTATION DU PATIENT ATTEINT DE MTEV DANS LA FILIERE DE SOINS"}, {"t": "p", "x": "Faut-il hospitaliser le patient ? Calcul du score sPESI :"}, {"t": "table", "rows": [["Item", "Points"], ["Age > 80 ans", "1"], ["Cancer actif", "1"], ["Insuffisance cardiaque ou pathologie respiratoire chroniques", "1"], ["Fréquence cardiaque ≥ 110/min", "1"], ["Pression artérielle systolique < 100 mmHg", "1"], ["Saturation artérielle en oxygène < 90%", "1"]]}, {"t": "p", "x": "Si sPESI = 0 → mortalité à 30 jours < 1 % → PEC ambulatoire (c'est une EP non grave) si un traitement par AOD est possible, en l'absence de comorbidités importantes rendant l'hospitalisation nécessaire (sinon il faut vraisemblablement hospitaliser le patient pour relais héparine/AVK)."}, {"t": "p", "x": "Si sPESI ≥ 1 → mortalité à 30 jours 10% → hospitalisation"}, {"t": "p", "x": "A noter que la décision d'hospitaliser ou non ne dépend pas, dans un premier temps, du dosage du NT-pro-BNP, de la troponine ni de l'échographie cardiaque."}, {"t": "p", "x": "Ces paramètres permettent l'affinement du risque afin de décider si le patient doit être hospitalisé en soins intensifs ou non."}, {"t": "p", "x": "Où hospitaliser le patient ? (ESC Guidelines 2019)"}, {"t": "p", "x": "Rechercher des marqueurs de souffrance ventriculaire droite aiguë :"}, {"t": "li", "x": "Dilatation VD (scanner ou échographie cardiaque)", "l": 0}, {"t": "li", "x": "Élévation du NT-pro-BNP et/ou de la troponine (l'élévation de l'un des deux suffit)", "l": 0}, {"t": "table", "rows": [["", "Dilatation VD", "Élévation d'un marqueur biologique", "Signes de sévérité clinique et/ou comorbidités (sPESI ≥ 1)", "Prise en charge"], ["Bas risque", "NON", "NON", "NON", "Ambulatoire si sPESI = 0\nSalle si sPESI ≥ 1"], ["Risque intermédiaire BAS", "Un seul des 2 critères", "Un seul des 2 critères", "+", "Salle conventionnelle"], ["Risque intermédiaire HAUT", "+", "+", "+", "USIC"], ["Haut risque", "INSTABILITE HEMODYNAMIQUE :\nLe diagnostic est posé sur l'état de choc, ne pas attendre les résultats des examens biologiques pour lancer le traitement", "INSTABILITE HEMODYNAMIQUE :\nLe diagnostic est posé sur l'état de choc, ne pas attendre les résultats des examens biologiques pour lancer le traitement", "INSTABILITE HEMODYNAMIQUE :\nLe diagnostic est posé sur l'état de choc, ne pas attendre les résultats des examens biologiques pour lancer le traitement", "USIC ou réanimation \n(à discuter avec le réanimateur)"]]}, {"t": "h4", "x": "TRAITEMENT DE L'EP NON GRAVE"}, {"t": "p", "x": "Que faire en garde ?"}, {"t": "p", "x": "- Si traitement ambulatoire : AOD si possible, sinon hospitaliser pour relais héparine/AVK"}, {"t": "p", "x": "- Si hospitalisation : débuter un traitement parentéral, et relais oral dès que possible++"}, {"t": "p", "x": "Pour les EP de gravité intermédiaire, traitement parentéral pendant 24 à 48h, et relais par AOD ou AVK dès que la stabilité clinique est confirmée."}, {"t": "p", "x": "En cas de doute sur la fonction rénale, il est toujours préférable de débuter par l'héparine non fractionnée. De même si incertitude sur le traitement au long cours (poids extrêmes, cancer, grossesse…)."}, {"t": "p", "x": "Héparines de bas poids moléculaires (CI absolue si DFG < 15 mL/min) :"}, {"t": "li", "x": "Enoxaparine (Lovenox®) :", "l": 0}, {"t": "li", "x": "Pleine dose : 0,01 mL/kg (100 UI/kg), 2 fois par jour", "l": 1}, {"t": "li", "x": "Demi-dose : 0,01 mL/kg (100 UI/kg), 1 fois par jour (soit 100 UI/kg/jour), surveillance de l'activité anti-Xa (cf. ci-dessous)", "l": 1}, {"t": "li", "x": "Tinzaparine (Innohep®) : 0,01 mL/kg (175 UI/kg), 1 fois par jour, à prescrire s'il est prévu de laisser le patient sous HBPM au long cours ou en cas d'insuffisance rénale car meilleur profil de stabilité.", "l": 0}, {"t": "li", "x": "Surveillance des HBPM :", "l": 0}, {"t": "li", "x": "numération plaquettaire toutes les semaines", "l": 1}, {"t": "li", "x": "arrêt du traitement en cas de diminution de plus de 30% de la valeur initiale des plaquettes", "l": 1}, {"t": "li", "x": "anti-Xa HBPM uniquement en cas de DFG < 30 mL/min car très peu de variabilité inter-individuelle, à doser après la 3e injection, à mi-chemin entre 2 injections", "l": 1}, {"t": "p", "x": "Héparine non fractionnée (en cas de DFG < 30 mL/min) :"}, {"t": "p", "x": "Débuter à 300 UI/kg/24h, cible d'anti-Xa entre 0,3 et 0,6  ou un TCA entre 2 et 3 (selon normes du laboratoire). Possibilité de débuter le traitement par un bolus de 30 à 50 UI/kg (généralement 3000 UI, ou 4000 UI pour les sujets corpulents), pour atteindre plus vite l'équilibre."}, {"t": "p", "x": "Le 1er anti-Xa est dosé 6h après le début de la perfusion, et ensuite 4 à 6 heures après chaque changement de posologie, puis tous les jours quand l'équilibre est atteint :"}, {"t": "li", "x": "Si anti-Xa HNF < 0,3 : + 2000 UI/24h.", "l": 0}, {"t": "li", "x": "Si anti-Xa HNF > 0,6 : - 2000 UI/24h", "l": 0}, {"t": "li", "x": "Si anti-Xa HNF > 0,9 : pause 4 h puis - 2000 UI/24h", "l": 0}, {"t": "p", "x": "Surveillance hebdomadaire (au moins) de la numération plaquettaire."}, {"t": "p", "x": "Et ensuite ?"}, {"t": "p", "x": "Pour les cas compliqués (cancer, sujet âgés, poids extrêmes, grossesse et post-partum, hépatopathie chornique), décision du mode de traitement en staff thrombose."}, {"t": "p", "x": "En pratique, autant que possible, privilégier un traitement par AOD :"}, {"t": "li", "x": "Les seuls anticoagulants oraux directs (AOD) ayant été validés pour un traitement sans relais par HBPM sont l'apixaban et le rivaroxaban :", "l": 0}, {"t": "li", "x": "Apixaban : 10 mg x 2/jour pendant 7 jours puis 5 mg x 2/jour", "l": 1}, {"t": "li", "x": "Rivaroxaban : 15 mg x 2/jour pendant 21 jours puis 20 mg/jour en 1 prise", "l": 1}, {"t": "li", "x": "Les AOD sont formellement contre-indiqués en cas de clairance de la créatinine < 30 mL/min (aucune adaptation thérapeutique n'est nécessaire dans les autres cas).", "l": 0}, {"t": "p", "x": "Si le relais par AOD n'est pas possible, alors traitement par AVK avec une cible d'INR entre 2 et 3."}, {"t": "p", "x": "Conduite pratique des relais (en partant du principe que l'AOD correspond à rivaroxaban ou apixaban) :"}, {"t": "p", "x": "HBPM  AOD : donner l'AOD à la place de la prochaine prise prévue d'HBPM"}, {"t": "p", "x": "AOD  HBPM : débuter l'HBPM à la place de la prochaine prise prévue d'AOD"}, {"t": "p", "x": "Pas de chevauchement HBPM/AOD++."}, {"t": "p", "x": "AOD  HNF : débuter l'HNF à la place de la prochaine prise prévue d'AOD."}, {"t": "p", "x": "HNF  AOD : arrêter l'HNF et donner immédiatement l'AOD."}, {"t": "p", "x": "HNF  AVK : débuter les AVK à J1 du traitement par héparine, interrompre l'héparine après 2 INR de suite en zone cible (2 à 3 pour la MTEV), on recommande généralement 5 jours de chevauchement HNF/AVK."}, {"t": "p", "x": "AVK  HNF : arrêter les AVK, débuter l'HNF à la place de la prochaine prise prévue des AVK."}, {"t": "p", "x": "AOD  AVK : débuter l'AVK, poursuivre la bithérapie par AVK/AOD jusqu'à ce que INR > 2 et arrêter l'AOD à ce moment-là (il y a donc un chevauchement AVK/AOD)"}, {"t": "p", "x": "AVK  AOD : arrêter l'AVK, débuter l'AOD dès que :"}, {"t": "li", "x": "Rivaroxaban : INR ≤ 2,5 si l'indication est AVK est la MTEV, INR ≤ 3 si l'indication des AVK est la FA ;", "l": 0}, {"t": "li", "x": "Apixaban : INR < 2", "l": 0}, {"t": "p", "x": "Situations cliniques particulières (en gras sont indiquées les options prioritaires) :"}, {"t": "table", "rows": [["Situation clinique", "Traitement proposé"], ["Cancer actif", "HBPM (idéalement tinzaparine)"], ["Pathologie hépatique, coagulopathie", "HBPM (énoxaparine ou tinzaparine)"], ["Insuffisance rénale (clairance < 30 mL/min)", "AVK"], ["Pathologie coronarienne", "Rivaroxaban (ou apixaban)"], ["Dyspepsie ou ATCD d'hémorragie digestive", "Apixaban (ou AVK) + IPP"], ["Thrombolyse", "HNF IVSE, relais AVK (pas d'AOD)"], ["Grossesse ou risque de grossesse", "HPBM (ou HNF si insuffisance rénale)"]]}, {"t": "h4", "x": "BILAN ETIOLOGIQUE MTEV"}, {"t": "p", "x": "En général, les indications à un bilan étiologique spécifique doivent être discutés en RCP thrombose."}, {"t": "p", "x": "Thrombose veineuse profonde isolée : Pas d'indication à la recherche systématique d'une EP chez le patient atteint de TVP sauf en cas de symptomatologie évocatrice."}, {"t": "p", "x": "Bilan d'hémostase (recommandations 2009) : Ne concerne que les MTEV idiopathiques. Indications probables :"}, {"t": "p", "x": "- 1er épisode survenant < 60 ans"}, {"t": "p", "x": "- Récidive si 1er épisode < 60 ans"}, {"t": "p", "x": "- MTEV de la femme en âge de procréer (SAPL +++)"}, {"t": "p", "x": "Il n'est actuellement pas démontré que la découverte d'une thrombophilie change l'attitude thérapeutique chez ces patients car une MTEV idiopathique est déjà une indication théorique à un traitement au long cours. Il semble que les seuls examens susceptibles de changer la prise en charge concernent les femmes en âge de procréer qui tireront bénéfice d'un diagnostic éventuel de SAPL ou d'une thrombophilie pour leur(s) future(s) grossesse(s)."}, {"t": "p", "x": "Bilan carcinologique"}, {"t": "p", "x": "Pas de bénéfice aux screenings extensifs : pas de « pêche au cancer »."}, {"t": "p", "x": "Le bilan recommandé est :"}, {"t": "li", "x": "Interrogatoire et examen physique approfondis (rechercher altération de l'état général, saignements occultes digestifs ou gynécologiques, adénopathies) ;", "l": 0}, {"t": "li", "x": "Vérifier que les dépistages organisés par la HAS sont à jour, les programmer le cas échéant (colorectal, sein, col de l'utérus et éventuellement prostate).", "l": 0}, {"t": "h4", "x": "MTEV et grossesse"}, {"t": "p", "x": "La stratégie diagnostique peut s'appuyer sur le dosage des D-Dimères (même VPN que chez la patiente non enceinte) et une échographie-doppler veineuse des membres inférieurs qui en cas de positivité suffira à débuter le traitement anticoagulant sans nécessité d'imagerie thoracique."}, {"t": "p", "x": "Si l'échographie n'est pas concluante, il faut poursuivre les investigations :"}, {"t": "li", "x": "La modalité la moins irradiante est la scintigraphie de perfusion seule dans la mesure où dans l'immense majorité des cas il n'y a pas de pathologie respiratoire sous-jacente.", "l": 0}, {"t": "li", "x": "S'il n'y a pas d'autre option réalisable, l'angioscanner thoracique pourra tout de même être réalisé dans la mesure où l'irradiation foetale subie (0,24 à 0,66 mSv) est très inférieure au seuil toxique pour le foetus (50 mSv)", "l": 0}, {"t": "p", "x": "Le seul traitement anticoagulant validé pendant la grossesse est l'HBPM. En cas de nécessité de thrombolyse, le peu de données existantes suggère une sécurité d'utilisation. Si la thrombolyse est nécessaire, il faut la réaliser selon la balance bénéfice/risque, en milieu spécialisé, dans ou à proximité d'une maternité de niveau III capable de prendre en charge les éventuelles complications obstétricales."}]}, {"title": "Choc cardiogénique", "blocks": [{"t": "p", "x": "Les chiffres : La définition commune du choc cardiogénique associe obligatoirement :"}, {"t": "li", "x": "une hypoperfusion tissulaire (hypotension <90 mmHg de systolique ou >90 mmHg nécessitant un support catécholergique, marbrures, troubles neurologiques, oligo-anurie ou augmentation des lactates) malgré une volémie optimisée", "l": 0}, {"t": "li", "x": "un bas débit cardiaque (<2.2 L/min/m²). Les chocs cardiogéniques sont l'expression clinique de l'inadéquation entre les apports et les besoins en oxygène. Cette inadéquation s'exprime par une ScvO2<60-65%.", "l": 0}, {"t": "p", "x": "Les chocs cardiogéniques constituent un ensemble de syndromes dont les étiologies, pronostics et traitements sont spécifiques. La mortalité à 30 jours des chocs cardiogéniques est de 80% pour l'amylose cardiaque, de 50% pour un IDM et de 30% pour une cardiopathie dilatée."}, {"t": "p", "x": "Devant un choc cardiogénique, il faut prévenir rapidement l'équipe médico-chirurgicale si un projet de greffe et d'assistance est envisageable pour le patient."}, {"t": "h4", "x": "Objectif #1 - Assurer le monitoring"}, {"t": "p", "x": "La restauration de l'adéquation entre les apports et besoins nécessite l'identification de l'étiologie du choc."}, {"t": "li", "x": "L'échographie cardiaque doit être réalisée en urgence et les résultats interprétés dans le contexte clinique. Dans le cadre de la CMD, l'objectif premier de l'échographie est de s'assurer que le choc soit bien d'origine cardiogénique (c'est-à-dire non septique avec dysfonction VG pré-existante). Un choc cardiogénique sur CMD s'accompagne constamment d'une dysfonction ventriculaire droite et d'une dilatation non compliante de la veine cave inférieure.", "l": 0}, {"t": "li", "x": "Un cathéter veineux central en territoire cave supérieur doit être rapidement mis en place pour s'assurer que la ScvO2 est bien altérée (<60%) et la PVC élevée (>10 mmHg). Si la PVC<5mmHg, le diagnostic d'hypovolémie ou de choc septique doit être envisagé. La ScvO2 mesurée en territoire cave inférieur n'est pas fiable.", "l": 0}, {"t": "h4", "x": "Objectif #2 - Optimiser la volémie et la post charge"}, {"t": "p", "x": "La réponse aux diurétiques dépend de la dose de diurétique et de la fonction rénale. Il n'y a pas de consensus sur la dose optimale. Le protocole local est de débuter :"}, {"t": "li", "x": "Furosémide 1000 mg IVSE avec un objectif de 4 L de diurèse (penser à contrôler la kaliémie)", "l": 0}, {"t": "li", "x": "Si diurèse >4L, diminuer de moitié dose jusqu'à obtenir une PVC < 10 mmHg puis relais per os à (dose habituelle±50% selon le poids ou 40±40mg si le patient est naïf de diurétiques)", "l": 0}, {"t": "li", "x": "Spironolactone 100mg IVD sur deux jours pour contrôler la kaliémie", "l": 0}, {"t": "h4", "x": "Objectif #3 - Restaurer le débit"}, {"t": "li", "x": "La Dobutamine (2.5-5 gamma/kg/min) ne doit être introduite qu'en cas de persistance des signes d'hypoperfusion tissulaire (III-B) et après avoir optimisé la post-charge du VG. Elle doit être délivrée par voie veineuse centrale avec une surveillance biquotidienne de la gazométrie artérielle (lactates) et veineuse (ScvO2). L'objectif est d'obtenir une ScvO2>60%.", "l": 0}, {"t": "li", "x": "Le sevrage progressif de la Dobutamine (0.1 gamma/h soit 2.4 gamma/J) doit être réalisé si :", "l": 0}, {"t": "li", "x": "Volémie optimisée avec une PVC<10mmHg", "l": 0}, {"t": "li", "x": "Disparition des signes d'hypoperfusion", "l": 0}, {"t": "li", "x": "ScvO2>60%", "l": 0}, {"t": "li", "x": "Le Levosimendan (0.2 gamma/kg/min IVSE durant 24h), sans bolus, peut être introduit si la ScvO2 reste < 60% malgré 3 jours de traitement par Dobutamine 5 gamma/kg/min.", "l": 0}, {"t": "li", "x": "Le sevrage de la Dobutamine peut ensuite être débuté à dose progressive (0.1 gamma/h) si la ScvO2>60%", "l": 0}, {"t": "li", "x": "Sinon, une seconde cure de lévosimendan sans bolus (0.2 gamma/kg/min durant 24h IVSE) peut être envisagée.", "l": 0}, {"t": "h4", "x": "Objectifs #4 - Induire le remodelage inverse"}, {"t": "li", "x": "IEC: les IEC (Ramipril 1.25 mg x 2) et les anti-aldostérones (Eplérénone 25 mg/jour) peuvent être introduits même sous Dobutamine une fois la pression artérielle stabilisée.", "l": 0}, {"t": "li", "x": "Les β-bloquants doivent être arrêtés à la phase initiale puis repris au moins deux semaines après la sortie d'hospitalisation en USIC.", "l": 0}, {"t": "li", "x": "Cures répétées de Lévosimendan : le Lévosimendan présente une action inotrope prolongée de deux semaines. Les cures répétées évaluées sur 3 études randomisées de faibles effectifs permettent de stabiliser les patients et peuvent permettre d'introduire le traitement d'insuffisance cardiaque. Compte tenu du coût du traitement, cette stratégie doit être réservée aux patients présentant une difficulté de sevrage aux catécholamines ou ceux nécessitant des hospitalisations répétées.", "l": 0}, {"t": "li", "x": "Réadaptation cardiaque et consultation de titration : Un choc cardiogénique est un tournant de l'évolution de la cardiopathie dilatée. Le patient doit bénéficier d'un suivi rapproché pour décider de la stratégie d'assistance cardiaque et la greffe et de la nécessité de mettre en place une resynchronisation cardiaque ou un défibrillateur.", "l": 0}]}, {"title": "Myocardite aiguë", "blocks": [{"t": "p", "x": "Définition"}, {"t": "p", "x": "La myocardite est une maladie inflammatoire du myocarde."}, {"t": "p", "x": "Étiologie la plus fréquente : virale (Parvovirus B19, entérovirus, HHV6+++), peut aussi être idiopathique (lymphocytaire, à cellules géantes, post-partum) ou dysimmunitaire (sarcoïdose, LED, sclérodermie…)"}, {"t": "p", "x": "Orientation du patient"}, {"t": "p", "x": "Tout patient présentant une suspicion de myocardite doit être hospitalisé en USIC au moins 72 heures (bilan étiologique, surveillance scopée)."}, {"t": "table", "rows": [["Bilan systématique d'une suspicion de myocardite", "Bilan systématique d'une suspicion de myocardite"], ["ECG 12 dérivations", "Ondes T négatives, sus-ST concave diffus et sans miroir, BBG"], ["ETT complète", "FEVG, trouble de la cinétique, Strain Global Longitudinal et régional, débit cardiaque, péricarde. Aspect hypertrophié et brillant en cas de myocardite fulminante (oedème myocardique++).\nA répéter au cours de l'hospitalisation en cas d'instabilité hémodynamique ou rythmique afin de ne pas méconnaître une aggravation de la FEVG"], ["Radio de thorax", "Diagnostic différentiel de la douleur thoracique"], ["Bilan biologique", "NFS/plaquettes, Ionogramme sanguin, urée, créatinine, BHC, troponine, CPK, VS, CRP, NT-pro BNP\nL'élévation de la troponine est souvent le marqueur biologique soulevant le diagnostic de myocardite en l'absence de maladie coronaire existante. Cependant, cette élévation n'est présente que dans les myocardites étendues et une troponine normale n'élimine pas le diagnostic."], ["Bilan auto-immun", "FAN, ANCA\n± à adapter selon le terrain et les ATCD ou si suspicion de maladie systémique sous-jacente"], ["Bilan virologique", "Sérologie VIH, VHB, VHC\nPCR multiplex nasopharyngé avec panel complet \nSi immunodéprimé : PCR sanguine HSV, CMV, EBV, adénovirus, entérovirus, HHV6, Parvovirus B19"], ["Eliminer une coronaropathie", "Selon l'âge, les facteurs de risque cardiovasculaire et le terrain :\nCoro-TDM : lésions de myocardite de topographie sous-épicardique sur une acquisition tardive à 5 minutes\nCoronarographie diagnostique"], ["IRM myocardique", "Recherche une inflammation myocardique (critères de Lake Louise)\nOEdème régional ou global sous forme d'un hypersignal T2\nAugmentation du signal myocardique sur les séquences de réhaussement précoce en T1 gado\nRehaussement tardif focal sous-épicardique ou médio-pariétal en T1 gado\nImagerie paramétrique\nSensibilité 80% donc une IRM normale n'exclut pas le diagnostic\nA répéter à 1 ou 2 semaines si la suspicion reste élevée"]]}, {"t": "p", "x": "Les examens d'imagerie nucléaire (PET-TDM et PET-IRM) ne sont pas réalisés en routine ni de manière systématique devant une myocardite. Leurs indications doivent être discutées au cas par cas et sont réservées à des situations spécifiques, en particulier lorsqu‘une maladie systémique sous-jacente est suspectée."}, {"t": "p", "x": "L'indication à la réalisation d'une biopsie VD et/ou VG doit systématiquement être discutée devant toute myocardite aigue. Sa réalisation est limitée à :"}, {"t": "p", "x": "Suspicion de myocardite aigue avec une dysfonction VG (FEVG <50%) et âge < 70 ans"}, {"t": "p", "x": "Myocardite fulminante en choc cardiogénique ou sous ECMO, si patient stabilisé et transportable"}, {"t": "p", "x": "CMD à coronaires saines idiopathique (coronarographie normale et IRM myocardique non contributive) avec dysfonction VG et âge < 70 ans"}, {"t": "p", "x": "Choc cardiogénique sur cardiopathie à coronaires saines idiopathique et âge < 70 ans, si patient stabilisé et transportable."}, {"t": "table", "rows": [["Biopsie myocardique", "Biopsie myocardique"], ["Modalités = au moins 4 fragments sont prélevés", "Envoi en anapath (x2) et en virologie (x2) systématique : \n2 prélèvements en anapath après fixation dans le formol\n2 prélèvements en virologie dans tube sec (pas de formol)\nde 2 mm chacun \navant 17h30"], ["Localisation", "Biopsie VD et/ou VG selon la localisation de l'inflammation à l'IRM (si possible). Bien préciser sur la demande si localisation exclusive du VG à l'IRM car la réalisation de biopsies VG ne majore pas le taux de complications et augmente la rentabilité diagnostique.\nSous anesthésie locale en salle de cathétérisme"], ["Préparation de l'examen", "A jeun depuis minuit\nPréparation et désinfection cutanée (scarpa+jugulaire)"]]}, {"t": "p", "x": "En cas d'instabilité hémodynamique et/ou rythmique, l'IRM myocardique ne doit pas retarder la réalisation de la biopsie qui doit être réalisée le plus précocement possible une fois le patient transportable."}, {"t": "table", "rows": [["ANALYSE VIROLOGIQUE", "ANALYSE VIROLOGIQUE"], ["Analyse virologique sur biopsie myocardique", "Analyse virologique sur biopsie myocardique"], ["Modalités de prélèvements", "Biopsie VD ou VG (selon le site)\n2 prélèvements\nde 2 mm chacun \ndans un tube sec sans pour congélation à -80° \nEnvoi au laboratoire de virologie avec feuille de virologie remplie 24/24h"], ["Analyses demandées\n(à cocher sur feuille \njaune de virologie)", "Protocole myocardite : \nPCR sur biopsies HHV6, Parvovirus B19, entérovirus, adénovirus\n+ Si immunodéprimé rajouter PCR sur biopsie HSV, CMV, EBV.\nEn fonction des résultats virologiques, une demande de métagénomique microbienne pourra être complétée (attention nécessité du consentement signé du patient)."], ["Analyse virologique sérique", "Analyse virologique sérique"], ["Systématique", "Sérologies sériques VIH, VHB et VHC \nPCR multiplex nasopharyngé avec panel complet.\nSi immunodéprimé : PCR sanguine HSV, CMV, EBV, adénovirus, entérovirus, HHV6, Parvovirus B19, mais pas d'indication à réaliser ces PCR de manière systématique si la biopsie myocardique n'a pas été faite\nPas d'indication à réaliser un bilan virologique sérique complet car un panel important de virus peut être responsable de myocardite virale et la présence d'ADN viral dans le sang n'affirme pas son implication dans la myocardite."], ["Si biopsie myocardique réalisée", "PCR sanguines HHV6, parvovirus B19, entérovirus, adénovirus\n+ Si immunodéprimé PCR sanguines HSV, CMV, EBV."]]}, {"t": "p", "x": "Prise en charge et traitement"}, {"t": "table", "rows": [["Résumé du traitement de la myocardite", "Résumé du traitement de la myocardite"], ["Traitement symptomatique", "Diurétiques si insuffisance cardiaque \nTraitement anti-inflammatoire par Aspegic + Colchicine si péricardite associée"], ["Traitement de l'insuffisance cardiaque", "Si dysfonction VG (FEVG < 50%) et stable sur le plan hémodynamique : \nß-bloquants cardio-sélectifs (Bisoprolol, avec titration)\nIEC ou ARA2\n± Anti-Aldostérone (Inspra)"], ["Traitement immunosuppresseur \nA discuter avec les internistes en staff+++", "Myocardite aigue lymphocytaire à virus négatif avec dysfonction VG : corticothérapie ± si échec à 1 mois : Azathioprine\nMyocardite à éosinophiles, à cellules géantes, sarcoïdose, maladie de système : corticothérapie"], ["Repos", "Contre-indication au sport pour une durée d'au moins 6 mois, que ce soit de l'activité physique de loisir ou de compétition\nReprise autorisée à 6 mois si :\nAbsence de symptôme\nAbsence de trouble de cinétique segmentaire en ETT \nDisparition du rehaussement tardif en IRM\nHolter-ECG chez le sportif (recherche de trouble ventriculaire ou ESV à l'effort)"]]}, {"t": "p", "x": "En cas d'instabilité hémodynamique"}, {"t": "p", "x": "Devant une myocardite fulminante avec instabilité hémodynamique évoluant vers un tableau de choc cardiogénique avec dysfonction VG et/ou une instabilité rythmique avec un tableau d'orage rythmique, l'implantation d'une assistance circulatoire (ECMO) doit rapidement être discutée avec les réanimateurs (« bridge to recovery » ou « to transplantation »)."}, {"t": "p", "x": "Traitement immunosuppresseur"}, {"t": "p", "x": "Après discussion avec l'équipe de médecine interne (indications principales : myocardite à cellules géantes, myocardites à éosinophiles, sarcoïdose avec atteinte cardiaque, myocardite associée à une maladie systémique, myocardite aiguë lymphocytaire à virus négatif avec dysfonction VG)."}, {"t": "p", "x": "Protocole d'immunosuppression"}, {"t": "p", "x": "Corticothérapie par Prednisone 1 mg/kg /j per os pendant au moins 1 mois puis décroissance de 10 mg en 10 mg tous les 15 jours jusqu'à 30 mg/j puis de 5 mg en 5 mg tous les 15 jours jusqu'à 10 mg/j puis arrêt à discuter à M6."}, {"t": "p", "x": "Si échec à 1 mois, association à Azathioprine (Imurel) 2 mg/kg/j pendant 6 mois. Débuter l'Imurel à 50 mg/j pendant 7 jours puis augmenter à 2mg/kg/j si bonne tolérance."}, {"t": "p", "x": "Surveillance : NFS, créatinine, BHC toutes les semaines pendant 1 mois puis 1 fois par mois"}, {"t": "p", "x": "Prophylaxie associée par Bactrim faible 1 cp/j + acide folique (Speciafoldine 5mg/j)."}, {"t": "p", "x": "Après avoir éliminé une étiologie virale (PCR virales sur biopsies négatives)"}, {"t": "p", "x": "Réévaluation à 1, 3 et 6 mois par ETT et IRM cardiaque"}, {"t": "p", "x": "Suivi conjoint avec la médecine interne"}, {"t": "p", "x": "Durée totale du traitement : au moins 6 mois"}, {"t": "p", "x": "Sortie d'hospitalisation"}, {"t": "p", "x": "En l'absence de de dysfonction VG sévère et de trouble du rythme ventriculaire soutenu et si disparition des douleurs et de la symptomatologie avec une cinétique décroissante de la troponine, un retour à domicile est autorisé après 72h d'hospitalisation scopée en USIC."}, {"t": "p", "x": "Devant une myocardite avec dysfonction VG ou complication hémodynamique / rythmique, transfert en réadaptation cardiaque (Albert Chenevier) pour titration et réadaptation à l'effort."}, {"t": "p", "x": "Traitement antiviral"}, {"t": "p", "x": "Devant le peu de données disponibles et le faible niveau preuve, il n'y a pas d'indication, à l'heure actuelle, à instaurer un traitement antiviral devant une myocardite aigue."}, {"t": "p", "x": "Suivi"}, {"t": "p", "x": "Surveillance clinique : Suivi clinique pluri-disciplinaire (en HDJ)"}, {"t": "p", "x": "Consultation de titration avec un IDE de la CCICC tous 15 les jours"}, {"t": "p", "x": "Consultation de cardiologie à 1, 3 et 6 mois avec l'un des médecins de l'USIC"}, {"t": "p", "x": "Si corticothérapie / immunosuppresseur introduit : avis de médecine interne pendant l'hospitalisation puis consultation à 1, 3 et 6 mois."}, {"t": "p", "x": "Suivi biologique : Biologie mensuelle (tolérance du traitement)"}, {"t": "p", "x": "Systématique : ionogramme sanguin, urée, créatinine, NT pro BNP, CRP, CPK, troponine"}, {"t": "p", "x": "Si immunosuppresseur : NFS, ionogramme sanguin, GAJ et BHC à 1 semaine puis mensuel"}, {"t": "p", "x": "Surveillance imagerie :"}, {"t": "p", "x": "ETT à 1 ,3 puis 6 mois (suivi de la fonction VG, cinétique segmentaire et Strain)"}, {"t": "p", "x": "IRM ou PET IRM  myocardique de contrôle à 6 mois (+ 1 et 3 mois si immunosuppresseur)"}, {"t": "p", "x": "Suivi rythmologique :"}, {"t": "p", "x": "ECG à 1,3 puis 6 mois"}, {"t": "p", "x": "Holter ECG et épreuve d'effort à 6 mois avant reprise de l'activité physique si trouble du rythme ventriculaire à la phase initiale ou si hyperexcitabilité ventriculaire persistante et chez le sportif de haut de niveau."}, {"t": "p", "x": "Synthèse du suivi de la myocardite"}, {"t": "table", "rows": [["Suivi myocardite", "Avec dysfonction VG", "Sans dysfonction VG"], ["1 semaine", "Bilan biologique : NFS/ plaquettes, ionogramme sanguin urée, créatinine, BHC, NT pro BNP, CRP, CPK, troponine", "/"], ["1 mois\net\n3 mois", "ECG, ETT\nBilan biologique\nConsultation de cardiologie\nConsultation de titration (IDE du CCICC)\n± si traitement immunosuppresseur :  consultation de médecine interne + IRM myocardique", "ECG, ETT\nBilan biologique\nConsultation de cardiologie"], ["6 mois", "ECG, ETT\nIRM myocardique ou PET IRM\nBilan biologique\nConsultation de cardiologie\n± Holter ECG si sportif avant reprise de l'activité\n± si traitement immunosuppresseur :  consultation de médecine interne", "ECG, ETT\nIRM myocardique ou PET IRM\nBilan biologique\n± Holter ECG \nConsultation de cardiologie"]]}]}, {"title": "Péricardite aiguë et tamponnade", "blocks": [{"t": "h4", "x": "Péricardite aiguë sans instabilité hémodynamique"}, {"t": "p", "x": "Étiologies principales : Virale (enterovirus, herpesvirus, adenovirus, parvovirus B19), auto-immune, néoplasique ou bactérienne (tuberculose, Coxiella burnetii, Borrelia burgdorferi)."}, {"t": "p", "x": "Parmi les causes plus rares : fungique, parasitaire, métabolique, traumatique, post-radique, post-interventionnel, amylose."}, {"t": "p", "x": "Classification :"}, {"t": "p", "x": "Péricardite Aiguë :"}, {"t": "p", "x": "Critères diagnostiques (nécessité de 2 critères) :"}, {"t": "p", "x": "Douleur péricarditique"}, {"t": "p", "x": "Frottement péricardique à l'auscultation"}, {"t": "p", "x": "Apparition d'un sus-décalage du segment ST diffus ou sous-décalage du PR"}, {"t": "p", "x": "Apparition ou aggravation d'un épanchement péricardique"}, {"t": "p", "x": "Critères additionnels pouvant appuyer le diagnostic :"}, {"t": "p", "x": "Élévation des marqueurs biologiques d'inflammation"}, {"t": "p", "x": "Mise en évidence d'une inflammation myocardique en IRM ou scanner"}, {"t": "p", "x": "Péricardite incessante : durée > 4-6 semaines et < 3 mois sans intervalle libre"}, {"t": "p", "x": "Péricardite récidivante : récidive de péricardite après un intervalle libre de 4 à 6 semaines."}, {"t": "p", "x": "Péricardite chronique : durée > 3 mois."}, {"t": "p", "x": "Quoi faire aux urgences si suspicion de péricardite :"}, {"t": "p", "x": "ECG, Rx thorax, biologie standard avec CRP et NFS"}, {"t": "p", "x": "Echoscopie (recherche et quantification de l'épanchement)."}, {"t": "p", "x": "Critères d'hospitalisation : fièvre > 38°C, début subaigu, épanchement péricardique abondant ou tamponnade, absence de réponse à l'aspirine/AINS au bout d'une semaine, myopéricardite, immunodépression, épanchement post-traumatique ou post-interventionnel, traitement anticoagulant."}, {"t": "p", "x": "En cas de retour à domicile autorisé : sortie avec consultation avec le cardiologue ou à défaut médecin traitant à une semaine avec traitement anti-inflammatoire."}, {"t": "p", "x": "TRAITEMENT de la PERICARDITE AIGUE : bithérapie par aspirine + Colchicine"}, {"t": "p", "x": "Aspirine 1 gramme x 3/jour per os, débuter la décroissance dès que CRP < 5 mg/L : 1 gramme x 2/jour pendant 1 semaine puis 500 mg x 2/jour pendant 1 semaine puis arrêt (tout en surveillant la CRP). Si CRP > 5 mg/L, poursuivre à 1 gramme x 3/jour."}, {"t": "p", "x": "Colchicine 0.5 mg/jour (poids < 70 kg) ou 0.5 mg x 2/jour (poids ≥ 70 kg), à poursuivre pendant 3 mois sans décroissance."}, {"t": "p", "x": "Alternative à l'aspirine : Ibuprofène 600 mg x 3/jour. Décroitre de 600 mg/semaine dès que CRP < 5 mg/L."}, {"t": "p", "x": "TRAITEMENT de la PERICARDITE RECIVIANTE : idem sauf que"}, {"t": "p", "x": "La décroissance de l'AINS est plus lente (diminuer de 500 mg/semaine l'aspirine et de 300 mg/semaine l'ibuprofène)"}, {"t": "p", "x": "Le traitement par Colchicine est prolongé pendant 6 mois"}, {"t": "p", "x": "Si corticothérapie (à discuter avec équipe de Médecine Interne, Dr LIMAL) : dose recommandée de 0,25 à 0,5 mg/kg jusqu'à disparition des symptômes et négativation complète du syndrome inflammatoire puis décroissance :"}, {"t": "p", "x": "50 mg/jour : diminuer de 10 mg/j toutes les semaines"}, {"t": "p", "x": "Entre 50 et 25 mg/jour : diminuer de 5 mg/j toutes les semaines"}, {"t": "p", "x": "Entre 25 et 15 mg/jour : diminuer 2,5 mg/j toutes les 2 à 4 semaines"}, {"t": "p", "x": "< 15 mg : diminuer de 1.25 à 2.5 mg/j toutes les 2 à 6 semaines."}, {"t": "p", "x": "Mesures associées"}, {"t": "p", "x": "Pas d'activité physique tant que symptôme."}, {"t": "p", "x": "Pas d'indication à des explorations infectieuses si péricardite aiguë virale sans immunodépression."}, {"t": "h4", "x": "Tamponnade"}, {"t": "p", "x": "La tamponnade correspond à une adiastolie aiguë résultant de la compression des cavités cardiaques droites par un épanchement péricardique."}, {"t": "p", "x": "La tamponnade peut être secondaire à l'abondance de l'épanchement ou à la rapidité de constitution de celui-ci (épanchements post-procéduraux +++)."}, {"t": "p", "x": "La tamponnade est une définition clinique correspondant à un état de choc droit obstructif : tachycardie, hypotension artérielle, collapsus du VD et VCI dilatée à l'échographie (témoignant de l'incapacité du VD à se remplir +++), retentissement biologique rénal et hépatique  c'est une indication à un drainage urgent (soit percutané, soit par voie chirurgicale), en présence du chirurgien ++."}]}, {"title": "Urgences aortiques", "blocks": [{"t": "h4", "x": "Dissection aortique"}, {"t": "p", "x": "Urgence cardiovasculaire +++"}, {"t": "p", "x": "Confirmer la dissection (ETO ou TDM)"}, {"t": "p", "x": "En cas de dissection confirmée, ces patients ne doivent pas transiter par l'USIC mais aller directement en salle de réveil centrale dans le cadre du SOS AORTE"}, {"t": "p", "x": "S'assurer de la possibilité d'une prise en charge chirurgicale avant d'admettre le patient : contacter l'anesthésiste de la salle de réveil dans le cadre du SOS AORTE (DECT 36045)"}, {"t": "p", "x": "Laisser le patient à jeun, pas d'anticoagulant ni d'antiagrégants."}, {"t": "p", "x": "Bilan pré-oprératoire : 2 déterminations groupe sanguin, rhésus, RAI, NFS, TP, TCA, CPK, troponine, ionogramme sanguin."}, {"t": "p", "x": "Contrôle de la pression artérielle : Loxen IVSE à débuter à 1mg/h et augmenter tous les 30' avec pour objectif de PAS<120mmHg"}, {"t": "p", "x": "Contrôle de la FC<60/min (BB en l'absence d'IA importante)"}, {"t": "p", "x": "Chirurgie en urgence pour les dissections de l'aorte ascendante et/ou de la crosse."}, {"t": "p", "x": "Indication chirurgicale pour les dissections de l'aorte descendante : souffrance viscérale, anévrisme>55mm, PAS ou douleur non contrôlée par le traitement médical (après exclusion d'une urgence chirurgicale, ces patients peuvent être admis en USIC si nécessaire)"}, {"t": "p", "x": "Dans tous les cas, à discuter avec le chirurgien cardiaque et vasculaire +++"}, {"t": "p", "x": "Ne pas hésiter à appeler l'astreinte ETO pour l'ETO per-opératoire"}, {"t": "h4", "x": "Hématomes aortiques"}, {"t": "p", "x": "Aorte ascendante"}, {"t": "p", "x": "Les hématomes de l'aorte ascendante doivent être traités comme une dissection de l'aorte ascendante. Une ETO permettra devra être réalisée pour vérifier l'intégrité de la valve aortique."}, {"t": "p", "x": "Aorte descendante"}, {"t": "p", "x": "Les hématomes de l'aorte descendante sont de bon pronostic et peuvent être surveillés par une imagerie de contrôle pendant la première semaine. Le contrôle de la tension doit être strict."}]}]}, {"title": "Valvulopathies et structurel", "fiches": [{"title": "Bilan pré-interventionnel d'une valvulopathie", "blocks": [{"t": "h4", "x": "Interrogatoire et examen clinique"}, {"t": "p", "x": "Déterminer le caractère symptomatique du patient :"}, {"t": "p", "x": "Dyspnée : stade de la NYHA, ou la performance au test de marche de 6 minutes"}, {"t": "p", "x": "Douleur thoracique à l'effort, évaluée par un périmètre de marche sans douleur"}, {"t": "p", "x": "Malaise et syncope d'effort, trouble conductif associé"}, {"t": "p", "x": "L'auscultation pulmonaire et les signes d'insuffisance cardiaque congestive"}, {"t": "p", "x": "Comorbidités et fragilité, pour évaluer le risque opératoire :"}, {"t": "p", "x": "Antécédents de chirurgie cardiaque : nombre de sternotomies, type de chirurgies"}, {"t": "p", "x": "Pathologie vasculaire associée : sténose des TSA ou des membres inférieurs"}, {"t": "p", "x": "Population gériatrique : autonomie (vitesse de marche), troubles cognitifs (MMS/MoCA) et état de dénutrition (IMC)"}, {"t": "p", "x": "BPCO ou insuffisance respiratoire chronique restrictive : utilisation de bronchodilatateurs, oxygène à domicile, hypertension pulmonaire"}, {"t": "p", "x": "Insuffisance rénale chronique : DFG / dialyse"}, {"t": "p", "x": "Cirrhose : score de Child-Pugh"}, {"t": "p", "x": "Anémie, thrombopénie, troubles de l'hémostase, hémopathie à risque hémorragique"}, {"t": "p", "x": "Accident vasculaire cérébral : séquelles motrices pouvant limiter la rééducation"}, {"t": "p", "x": "ATCD oncologiques : néoplasie active/en rémission, espérance de vie, antécédents de radiothérapie médiastinale"}, {"t": "p", "x": "Fibrillation atriale ? Ablation, exclusion auricule gauche, anticoagulant ?"}, {"t": "p", "x": "Discuter du substitut valvulaire : désir de grossesse chez les femmes en âge de procréer, anticoagulation au long cours pour une autre indication, souhait du patient, activités à risque hémorragique"}, {"t": "h4", "x": "Évaluation non invasive :"}, {"t": "p", "x": "Biologie systématique :"}, {"t": "li", "x": "NT-pro-BNP : valeur pronostique dans le RAC et l'IM, notamment chez les patients asymptomatiques", "l": 0}, {"t": "li", "x": "NFS : recherche d'une anémie à compenser avant l'intervention", "l": 0}, {"t": "li", "x": "Hémostase : évaluation du risque hémorragique", "l": 0}, {"t": "li", "x": "Fonction rénale (calcul de la clairance selon CKD-EPI)", "l": 0}, {"t": "li", "x": "Albumine : recherche d'une dénutrition (< 30 g/l, 35 g/l chez la personne âgée)", "l": 0}, {"t": "p", "x": "L'ETT doit comprendre :"}, {"t": "li", "x": "Évaluation de la sévérité de la valvulopathie principale", "l": 0}, {"t": "li", "x": "Mécanisme (sténose et/ou fuite) et étiologie de la valvulopathie principale", "l": 0}, {"t": "li", "x": "Évaluation de la valve mitrale", "l": 0}, {"t": "li", "x": "Recherche et quantification systématique d'une insuffisance tricuspide associée et mesure de la taille de l'anneau tricuspide en diastole", "l": 0}, {"t": "li", "x": "Mesure précise de l'aorte ascendante", "l": 0}, {"t": "li", "x": "Mesure des dimensions du VG et de la FEVG", "l": 0}, {"t": "li", "x": "Mesure des dimensions et de la fonction systolique du ventricule droit, évaluation PAPs", "l": 0}, {"t": "p", "x": "L'ETO préopératoire doit être demandée lorsque :"}, {"t": "li", "x": "L'anatomie, l'étiologie ou le mécanisme de la valvulopathie est incertain", "l": 0}, {"t": "li", "x": "La sévérité de la valvulopathie est incertaine : apport de l'ETO 3D pour le calcul de surface en planimétrie, de la PISA en 3D (++ si jets multiples, fuites commissurales)", "l": 0}, {"t": "li", "x": "Pour évaluer la faisabilité d'une réparation valvulaire aortique, mitrale ou tricuspide", "l": 0}, {"t": "li", "x": "Recherche de thrombus de l'auricule/oreillette gauche en cas de rétrécissement mitral (avant cardioversion ou commissurotomie percutanée)", "l": 0}, {"t": "li", "x": "En cas de suspicion d'endocardite ou de dysfonction de prothèse", "l": 0}, {"t": "p", "x": "Radiographie de thorax systématique : rechercher la présence d'une aorte porcelaine, évaluation de la silhouette cardiaque et du parenchyme pulmonaire."}, {"t": "p", "x": "Explorations fonctionnelles respiratoires : rechercher un trouble ventilatoire à risque pour la réanimation postopératoire en cas de chirurgie cardiaque en cas d'antécédent pulmonaire ou de traitement bronchodilatateur au long cours. Doit également être demandé pour distinguer la part respiratoire et cardiaque d'une dyspnée en cas de pathologie respiratoire chronique."}, {"t": "p", "x": "Échographie-doppler des troncs supra-aortiques systématique en cas de chirurgie cardiaque. Elle est demandée si antécédent de coronaropathie ou si présence de plus d'un facteur de risque cardio-vasculaire pour dépister une sténose/occlusion carotidienne. Si un TAVI par voie artérielle supra-aortique est envisagé, il faudra réaliser un angioscanner."}, {"t": "p", "x": "Bilan stomatologique systématique : panoramique dentaire et consultation stomatologique pour recherche de foyers infectieux dentaires (même si pas de dents apparente). En cas de nécessité d'extraction dentaire, elle devra être réalisée au moins 2 semaines avant l'intervantion valvulaire, sauf en cas de chirurgie urgente. L'antibioprophylaxie de l'endocardite ne doit être prescrite qu'en cas de présence de prothèse valvulaire (percutanée et/ou chirurgicale), de matériel de fermeture d'auricule/CIA/FOP datant de moins de 6 mois, d'antécédent d'endocardite infectieuse, ou de cardiopathie congénitale cyanogène non opérée (recommandations ESC 2015)."}, {"t": "p", "x": "Recherche de Staphylococcus aureus nasal systématique en cas de chirurgie cardiaque : augmente le risque de médiastinite. Décontamination nécessaire si recherche positive (muporocine 1 application dans chaque narine 3 fois par jour pendant 5 jours)."}, {"t": "p", "x": "L'échographie d'effort doit être demandé en cas de doute sur le caractère symptomatique de la valvulopathie, ou en cas de discordance entre l'échographie de repos (fuite non sévère) et les symptômes (dyspnée marquée)."}, {"t": "p", "x": "L'échographie dobutamine à faible dose doit être réalisée en cas de rétrécissement aortique serré (< 1 cm2) discordant (gradient moyen < 40 mmHg) avec altération de la FEVG (< 50%). Elle permet de rechercher une réserve contractile (augmentation de 20% du débit cardiaque) et de confirmer la sévérité du rétrécissement (uniquement si présence d'une réserve contractile)."}, {"t": "p", "x": "Le score calcique aortique par scanner sans injection doit être réalisée en cas de rétrécissement aortique serré (< 1 cm2) discordant (gradient moyen < 40 mmHg) avec FEVG altérée sans réserve contractile (< 50 %) ou FEVG préservée (≥ 50 %)."}, {"t": "p", "x": "L'IRM cardiaque peut être demandée dans les cas suivants :"}, {"t": "li", "x": "doute sur la sévérité d'une IA en ETT/ETO (quantification de la fraction régurgitante),", "l": 0}, {"t": "li", "x": "dimensions cavitaires (VG et/ou VD) en cas d'échogénicité limitée,", "l": 0}, {"t": "li", "x": "recherche d'étiologie non valvulaire à une dilatation ou une dysfonction ventriculaire gauche", "l": 0}, {"t": "li", "x": "recherche de thrombus intra-cardiaque", "l": 0}, {"t": "p", "x": "Angio-TDM aortique/cardiaque :"}, {"t": "li", "x": "Systématique en cas de traitement valvulaire percutané : évaluation de la voie d'abord artérielle évaluation des complications potentielles, et permet de déterminer la taille de la prothèse à implanter", "l": 0}, {"t": "li", "x": "Permet de préciser les dimensions de l'aorte ascendante, indispensable si la mesure échographique est ≥ 40 mm", "l": 0}, {"t": "li", "x": "Recherche de thrombus intra-auriculaire gauche en cas de doute ETO", "l": 0}, {"t": "li", "x": "Éliminer des sténoses coronaires significatives pour sursoir à la coronarographie chez les patients jeunes (< 40 ans) et sans facteur de risque cardiovasculaire", "l": 0}, {"t": "li", "x": "Si suspicion de dysfonction de prothèse mécanique : recherche de thrombus ou de panus", "l": 0}, {"t": "p", "x": "TDM thoracique sans injection : pourra être utile pour évaluer les rapports anatomiques de la paroi thoracique avec le ventricule droit et les artères coronaires en cas d'antécédent de sternotomie. Il peut également être demandé pour évaluer le parenchyme pulmonaire."}, {"t": "h4", "x": "Évaluation invasive :"}, {"t": "p", "x": "Coronarographie indiquée si :"}, {"t": "li", "x": "Antécédent de coronaropathie", "l": 0}, {"t": "li", "x": "Suspicion d'ischémie myocardique", "l": 0}, {"t": "li", "x": "Altération de la FEVG < 50%", "l": 0}, {"t": "li", "x": "♂ > 40 ans et ♀ ménopausée", "l": 0}, {"t": "li", "x": "≥ 1 FDR cardiovasculaire", "l": 0}, {"t": "p", "x": "Cathétérisme cardiaque droit pour préciser l'origine et la sévérité d'une hypertension pulmonaire avec la mesure des résistances vasculaires pulmonaires."}, {"t": "h4", "x": "Évaluation du risque opératoire"}, {"t": "p", "x": "A l'issue du bilan, il est nécessaire d'évaluer un score de risque opératoire, de préférence l'Euroscore II (http://www.euroscore.org/calc.html)"}, {"t": "p", "x": "La consultation d'anesthésie est demandée par les secrétaires de chirurgie cardiaque ou de cardiologie interventionnelle selon la décision thérapeutique à l'issu du Staff médico-chirurgical. En cas de chirurgie valvulaire urgente, notamment pour les patients d'USIC, elle devra être demandée par le médecin référent du patient."}]}, {"title": "Insuffisance aortique et anévrysme de l'aorte ascendante", "blocks": [{"t": "h4", "x": "Évaluation de l'anatomie valvulaire et de la fuite aortique (ETT  ETO)"}, {"t": "li", "x": "Morphologie de la valve : tricuspide, bicuspide, unicuspide ou quadricuspide (classification de Sievers)", "l": 0}, {"t": "li", "x": "Déterminer l'origine (centrale ou commissural) et la direction du jet (central ou excentrée)", "l": 0}, {"t": "li", "x": "Mécanisme de la fuite :", "l": 0}, {"t": "li", "x": "Type I : mouvement conservé des feuillets mais coaptation insuffisante par dilatation de l'anneau ou par perforation valvulaire (endocardite)", "l": 1}, {"t": "li", "x": "Type II : prolapsus d'une ou plusieurs cusps (++ bicuspidie), ou rupture de fenestration du bord libre d'une cusp", "l": 1}, {"t": "li", "x": "Type III : restriction des feuillets par tenting suite à une dilatation de la racine aortique (maladie annulo-ectasiante) ou par rétractation d'une cusp (atteinte médicamenteuse ou rhumatismale)", "l": 1}, {"t": "li", "x": "Structures adjacentes : diamètres de la chambre de chasse du VG et de l'aorte ascendante au niveau du sinus de Valsalva, de la jonction sino-tubulaire, et de l'aorte tubulaire, en différenciant les anévrysmes de la racine aortique (dilatation des sinus de Valsalva > 45 mm), des anévrysmes de l'aorte ascendante (sinus de Valsalva compris entre 40 et 45 mm), des fuites aortiques isolées (sinus de Valsalva < 35 mm)", "l": 0}, {"t": "li", "x": "Intérêt de l'ETO pour évaluer la faisabilité d'une plastie aortique : évaluation de la qualité des feuillets (bords libres, calcifications, mobilité, épaisseur, rétraction/destruction), l'orientation commissurale, la hauteur de coaptation (≥ 4 mm) et la hauteur effective (entre le plan de l'anneau et le bord libre, ≥ 10 mm).", "l": 0}, {"t": "table", "rows": [["Critères de sévérité d'une IA"], ["Critères quantitatifs :\nETT :\nSOR  0,30cm2,\nVolume régurgitant  60 ml/mn,\nVena contracta > 6 mm,\nPHT (temps de ½ pression) < 200 ms,\nReflux télé-diastolique dans l'isthme aortique > 20 cm/s\nDébit cardiaque > 10L/min\nIRM cardiaque : fraction régurgitante > 50%"], ["Critères qualitatifs :\nRetentissement ventriculaire gauche : dysfonction ou dilatation VG, altération du SLG\nPetits morphotypes (BSA < 1,68 m2) : indexer les dimensions à la surface corporelle\nAspect de la valve en ETT : présence d'un défaut de coaptation ou d'une éversion d'une cusp\nAspect du flux en doppler couleur (jet large, plusieurs jets excentrés) ou continu (jet dense)"]]}, {"t": "table", "rows": [["Indications opératoires urgentes\nInsuffisance aortique aiguë symptomatique (VG non dilaté++)\nInsuffisance aortique chronique sévère en OAP ou en choc cardiogénique"], ["Indications opératoires concernant l'insuffisance aortique chronique sévère"]]}, {"t": "table", "rows": [["Indications opératoires : anévrysmes de la racine aortique et de l'aorte ascendante\n\nFacteurs de risque de dissection aortique : antécédent familial de dissection aortique (ou antécédent personnel de dissection artérielle spontanée autre), présence d'une IA ou d'une IM sévère, désir de grossesse, hypertension artérielle et/ou augmentation de taille de l'anévrysme > 3 mm/an"]]}, {"t": "p", "x": "Remplacement valvulaire par voie mini-invasive : superposable à une chirurgie conventionnelle mais sternotomie plus petite (environ 5 cm)."}, {"t": "p", "x": "Les plasties aortiques sont des chirurgies conservatrices permettant de palier aux complications des valves prothétiques. Elles comprennent :"}, {"t": "li", "x": "Les doubles annuloplasties sous et sus-valvulaires", "l": 0}, {"t": "li", "x": "L'utilisation de patch de péricarde pour réparer une perforation ou étendre une surface", "l": 0}, {"t": "li", "x": "La plicature du bord libre d'une cusp ou la plastie sub-commissurale", "l": 0}, {"t": "p", "x": "L'intervention de Ross est une alternative au remplacement valvulaire aortique prothétique chez le patient jeune de moins de 45 ans chez qui la plastie aortique n'est pas réalisable. Elle consiste en un remplacement valvulaire aortique par autogreffe de la valve pulmonaire (issu du patient), qui elle sera remplacée par homogreffe aortique (issu d'un donneur décédé)"}, {"t": "p", "x": "Intervention de Bentall : remplacement valvulaire aortique (biologique ou mécanique) avec remplacement de la racine aortique et de l'aorte ascendante (tube en dacron) avec réimplantation des coronaires."}, {"t": "p", "x": "Interventions conservatrices de la valve aortique en cas d'anévrysme isolée de la racine aortique : Intervention de Yacoub (implantation du tube aortique sur les sinus de Valsalva natifs avec annuloplastie aortique sous-annulaire) ou de Tirone-David (implantation du tube aortique en dacron autour de l'anneau aortique natif). Ces deux techniques nécessitent une réimplantation coronaire."}, {"t": "p", "x": "Tube sus-coronaire : anévrysme isolé de l'aorte ascendante"}, {"t": "h4", "x": "Traitement médical"}, {"t": "li", "x": "Pas de traitement médical curatif.", "l": 0}, {"t": "li", "x": "Insuffisance aortique : IEC/ARAII et b-bloquants en cas de dysfonction VG ou HTA", "l": 0}, {"t": "li", "x": "Dilatation de la racine aortique : B-bloquants et/ou du losartan (ARAII) chez les patients atteints de Marfan en pré- et post-opératoire. Les B-bloquants sont discutés si bicuspidie.", "l": 0}]}, {"title": "Rétrécissement aortique serré", "blocks": [{"t": "table", "rows": [["Critères de sévérité", "Critères de sévérité"], ["RAC serré « haut gradient »", "RAC serré « bas gradient »"], ["Critères hémodynamiques en ETT :\nVmax  4 m/s\nGradient moyen  40 mmHg\n\nAprès avoir éliminé un facteur confondant :\nAnémie\nHyperthyroïdie\nShunt artério-veineux\nHTA non contrôlée", "Évaluation de la surface aortique : \nSAo  1 cm2 ou   0,6 cm2/m2\nET du débit cardiaque :\nVESi   35 ml/m2\nET absence des critères hémodynamiques (Vmax < 4 m/s et gradient moyen < 40 mmHg)\n\nDeux cas de figure :\nFEVG < 50% : ETT dobutamine pour éliminer un RAC pseudo-sévère en présence de réserve contractile (augmentation de la SAo > 1 cm2) ou mesure du score calcique valvulaire\nFEVG  50% = bas débit paradoxal, à confirmer par mesure du score calcique valvulaire"], ["Score calcique valvulaire = TDM cardiaque SANS injection (< 1 mSv)\nRAC serré probable si ≥ 2000 Au chez l'homme ou ≥ 1200 Au chez la femme\nRAC serré très probable si > 3000 Au chez l'homme ou ≥ 1600 Au chez la femme\n\nDernier recours en cas de résultats discordants : évaluation du gradient pic à pic (= gradient moyen) transvalvulaire aortique par cathétérisme cardiaque gauche", "Score calcique valvulaire = TDM cardiaque SANS injection (< 1 mSv)\nRAC serré probable si ≥ 2000 Au chez l'homme ou ≥ 1200 Au chez la femme\nRAC serré très probable si > 3000 Au chez l'homme ou ≥ 1600 Au chez la femme\n\nDernier recours en cas de résultats discordants : évaluation du gradient pic à pic (= gradient moyen) transvalvulaire aortique par cathétérisme cardiaque gauche"]]}, {"t": "table", "rows": [["Indications opératoires urgentes :\nRAC serré en oedème aigu pulmonaire\nRAC serré en choc cardiogénique  après valvuloplastie aortique au ballon (IIb)\nRAC serré syncopal"], ["Indications opératoires pour le rétrécissement aortique serré symptomatique"]]}, {"t": "table", "rows": [["TAVI ou remplacement valvulaire aortique chirurgical : décision multi-disciplinaire", "TAVI ou remplacement valvulaire aortique chirurgical : décision multi-disciplinaire"], ["Plutôt en faveur du TAVI", "Plutôt en faveur de la Chirurgie"], ["Score risque opératoire intermédiaire/élevé :\nEuroscore II > 4%\nEuroscore I > 10%\nSTS score > 4%\nAge > 75 ans\nAntécédent de chirurgie cardiaque et proximité PAC/sternum\nComorbidités nombreuses\nLimitation de mobilité pour réadaptation\nATCD de radiothérapie thoracique\nAbord fémoral possible\nPrésence d'une aorte porcelaine\nMismatch patient-prothèse sévère probable\nDéformation thoracique ou scoliotique", "Score de risque opératoire faible\nAge < 75 ans\nSuspicion d'endocardite\nAnatomie de l'anneau aortique non favorable :\nDistance insuffisante aux ostia coronaires\nTrop grande taille d'anneau\nValve bicuspide\nPrésence de thrombus aortique/intra VG\nMorphologie anormale de la racine aortique\nLésions coronaires relevant d'un PAC\nMaladie mitrale organique sévère\nInsuffisance tricuspide sévère\nDilatation de l'aorte ascendante\nHVG obstructive nécessitant une myomectomie"]]}, {"t": "p", "x": "Cas particulier des RAC asymptomatiques : prise en charge CHIRURGICALE uniquement"}, {"t": "li", "x": "En l'absence d'autre indication chirurgicale :", "l": 0}, {"t": "li", "x": "FEVG < 50% (sans autre étiologie), possiblement < 55/60% dans les prochaines recommandations", "l": 1}, {"t": "li", "x": "Faux asymptomatique : apparition de symptômes (dyspnée ou chute de PA systolique > 20 mmHg) à l'épreuve d'effort (IIa)", "l": 1}, {"t": "li", "x": "A discuter en staff si risque chirurgical bas (IIa) :", "l": 1}, {"t": "li", "x": "RAC très serré : Vmax > 5,5 m/s (à discuter dès que Vmax > 5 m/s)", "l": 2}, {"t": "li", "x": "RAC à progression rapide : augmentation de la V max  0,3m/s par an", "l": 2}, {"t": "li", "x": "Élévation du NTproBNP (sans autre étiologie)", "l": 2}, {"t": "li", "x": "Élévation de la PAPS > 60 mmHg confirmé au KT droit (sans autre étiologie)", "l": 2}, {"t": "li", "x": "En cas d'une autre indication chirurgicale : pontage aorto-coronaire, chirurgie de l'aorte ascendante, ou une autre chirurgie valvulaire", "l": 0}, {"t": "li", "x": "A proposer systématiquement si RAC serré", "l": 1}, {"t": "li", "x": "A discuter si RAC modéré défini par une surface entre 1 et 1,5 cm2 ou un gradient moyen entre 25 et 40 mmHg (IIa)", "l": 1}]}, {"title": "TAVI", "blocks": [{"t": "p", "x": "Indications :"}, {"t": "li", "x": "RAC serré et symptomatique", "l": 0}, {"t": "li", "x": "Contre-indication chirurgicale (aorte porcelaine, thorax hostile…), haut risque chirurgical (Euroscore II > 8%) ou risque chirurgical intermédiaire (Euroscore II > 4%)", "l": 0}, {"t": "p", "x": "Principales contre- indications :"}, {"t": "li", "x": "Espérance de vie < 1 an", "l": 0}, {"t": "li", "x": "Thrombus intra-VG", "l": 0}, {"t": "p", "x": "Tous les dossiers doivent être présentés au staff médico-chirugical du jeudi, hormis les patients de plus de 80 ans avec un Euroscore II > 4% et un abord fémoral possible."}, {"t": "p", "x": "Bilan pré-implantation :"}, {"t": "li", "x": "ETT avec mesure de l'anneau aortique", "l": 0}, {"t": "li", "x": "AngioTDM cardiaque, de l'aorte et des artères des membres inférieurs (relecture systématique des scanners effectués à H. Mondor ou à l'extérieur par les coronarographistes : Pr Teiger, Dr Gallet, Dr Mouillet, Dr Boukantar). Principaux points évalués :", "l": 0}, {"t": "li", "x": "Mesure de l'aorte ascendante (N  45 mm)", "l": 1}, {"t": "li", "x": "Mesure de l'anneau aortique (diamètre sagittal et coronal), planimétrie valvulaire", "l": 1}, {"t": "li", "x": "Score calcique valvulaire", "l": 1}, {"t": "li", "x": "Mesure de la distance ostia coronaires-anneau aortique (N > 10 mm)", "l": 1}, {"t": "li", "x": "Analyse des coronaires", "l": 1}, {"t": "li", "x": "Masure du diamètre des artères fémorales communes (N > 6 mm) + reconstruction du trépied aorto-illiaque", "l": 1}, {"t": "li", "x": "Calcifications fémorales", "l": 1}, {"t": "li", "x": "Echodoppler des TSA", "l": 0}, {"t": "li", "x": "Coronarographie diagnostique :  en cas de lésion coronaire, une angioplastie sera à discuter avec les coronarographistes avant le remplacement valvulaire (généralement angioplastie des troncs proximaux", "l": 0}, {"t": "li", "x": "Bilan stomatologique avec panoramique dentaire + consultation stomatologique, avec avulsion dentaire > 15 jours avant la procédure", "l": 0}, {"t": "li", "x": "Bilan ORL uniquement en cas d'antécédent de sinusite", "l": 0}, {"t": "p", "x": "Avant l'implantation en HDS (hospitalisation 48h avant la procédure) :"}, {"t": "li", "x": "Vérifier l'intégralité du bilan pré opératoire", "l": 0}, {"t": "li", "x": "Consultation d'anesthésie + prélèvement Groupe, Rhésus, RAI", "l": 0}, {"t": "li", "x": "Prescrire « à jeun » pour minuit la veille de la procédure", "l": 0}, {"t": "li", "x": "Prescrire une base (sérum physiologique ou G5%) le matin à 6h pour la procédure", "l": 0}, {"t": "li", "x": "Faire signer le consentement de la procédure", "l": 0}, {"t": "li", "x": "Prévoir la programmation pour l'HDJ de contrôle 3 mois post procédure (cf. plus bas)", "l": 0}, {"t": "p", "x": "Concernant le traitement anticoagulant ou anti-aggrégant plaquettaire :"}, {"t": "p", "x": "1) Si le patient est anticoagulé :"}, {"t": "p", "x": "a) AOD : arrêt 24h avant la procédure pour voie fémorale sinon arrêt 72h avant."}, {"t": "p", "x": "b) AVK : objectif INR 2 à 2,5 le jour de la procédure pour voie fémorale, sinon arrêt 72h avant"}, {"t": "p", "x": "2) Si le patient n'est pas anticoagulé : Kardegic 75 mg et Plavix 75 mg à débuter le jour de la procédure (pas de dose de charge)"}, {"t": "p", "x": "Implantation sous anesthésie locale en salle de cathétérisme au RCH dès 8h30 (mercredi ou vendredi matin)"}, {"t": "p", "x": "Post-implantation en USIC pendant 48 à 72 h :"}, {"t": "li", "x": "SEES non systématique en l'absence de trouble de conduction en fin de procédure.", "l": 0}, {"t": "li", "x": "Contrôle des points de ponction, ablation du compressif à J1.", "l": 0}, {"t": "li", "x": "NFS en retour de procédure", "l": 0}, {"t": "li", "x": "ETT complète réalisée en USIC : FEVG, IA intra ou para-prothétique, gradient trans prothétique, surface valvulaire calculée, péricarde", "l": 0}, {"t": "li", "x": "ECG quotidien", "l": 0}, {"t": "li", "x": "Ablation de la SEES après avis rythmologique et contrôle péricarde au décours", "l": 0}, {"t": "p", "x": "Post-implantation en HDS ou en UICA :"}, {"t": "li", "x": "ECG avant la sortie", "l": 0}, {"t": "li", "x": "NFS avant la sortie", "l": 0}, {"t": "li", "x": "Vérifier l'ordonnance de sortie selon le protocole post TAVI (cf. ci-dessous)", "l": 0}, {"t": "p", "x": "Situations particulières :"}, {"t": "li", "x": "Risque hémorragique majeur ou CI à une bi-AAP : aspirine 75 mg/j seul au long cours.", "l": 0}, {"t": "li", "x": "Pour les Valve-in-Valve / Valve-in-Ring :", "l": 0}, {"t": "li", "x": "Si position aortique : identique à la prise en charge des TAVI", "l": 1}, {"t": "li", "x": "Si position mitrale ou tricuspide : anticoagulation pleine dose ≥ 3 mois, au long cours si indication (FA), et association à une anti-agrégation uniquement si angioplastie < 3 mois.", "l": 1}, {"t": "p", "x": "HDJ à M3"}, {"t": "p", "x": "Programmer une HDJ au 8ème étage (cardio-interventionnelle) à 3 mois sauf pour les patients venant de Reims, Melun, et HPPE : ETT, bilan biologique (+/-contrôle PM, ou consultation gériatrique, ou test de marche…)."}, {"t": "p", "x": "Les complications du TAVI (issues des données de PARTNER 2 et SURTAVI)"}, {"t": "p", "x": "1) Troubles de conduction : entre 8,5 et 25,9%"}, {"t": "p", "x": "2) Saignement majeur ou mettant en jeu le pronostic vital : entre 10,4 et 12,2 %"}]}, {"title": "Insuffisance mitrale", "blocks": [{"t": "p", "x": "Anatomie de la valve mitr
